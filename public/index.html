<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Namochemical QMS</title>

<link rel="stylesheet" href="/css/app.css" />

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f5f7fb;
}
.layout {
  display:flex;
  height:100vh;
}
.sidebar {
  width:240px;
  background:#1f2a44;
  color:#fff;
  padding:20px;
}
.sidebar h2 {
  font-size:18px;
  margin-bottom:20px;
}
.menu button {
  width:100%;
  margin:6px 0;
  padding:10px;
  background:#2c3a5c;
  border:none;
  color:#fff;
  text-align:left;
  cursor:pointer;
  border-radius:6px;
}
.menu button:hover {
  background:#3b4a70;
}

.main {
  flex:1;
  padding:20px;
  overflow:auto;
}

.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.cards {
  display:flex;
  gap:15px;
  margin-bottom:20px;
}

.card {
  flex:1;
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.section {
  background:#fff;
  padding:20px;
  border-radius:10px;
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<div class="layout">

<!-- 좌측 메뉴 -->
<div class="sidebar">
  <h2>Namochemical</h2>

  <div class="menu">
    <button onclick="showPage('dashboard')">대시보드</button>
    <button onclick="showPage('iqc')">수입검사</button>
    <button onclick="showPage('pqc')">공정검사</button>
    <button onclick="showPage('oqc')">출하검사</button>
    <button onclick="showPage('ncr')">부적합관리</button>
    <button onclick="showPage('suppliers')">협력업체</button>
    <button onclick="showPage('worklog')">생산작업일지</button>
  </div>
</div>

<!-- 본문 -->
<div class="main">

  <!-- 상단 -->
  <div class="topbar">
    <h2>QMS 품질관리 시스템</h2>
    <input placeholder="검색..." />
  </div>

  <!-- KPI -->
  <div class="cards">
    <div class="card">수입검사 <h3 id="iqcCount">0</h3></div>
    <div class="card">공정검사 <h3 id="pqcCount">0</h3></div>
    <div class="card">출하검사 <h3 id="oqcCount">0</h3></div>
  </div>

  <!-- ======================== -->
  <!-- 대시보드 -->
  <!-- ======================== -->
  <div id="dashboard" class="section">
    <h3>대시보드</h3>
    <canvas id="iqcChart" height="100"></canvas>
  </div>

  <!-- ======================== -->
  <!-- 수입검사 -->
  <!-- ======================== -->
  <div id="iqc" class="section hidden">
    <h3>수입검사 등록</h3>

    <input id="iqcDate" type="date">
    <input id="iqcLot" placeholder="LOT">
    <input id="iqcSupplier" placeholder="협력사">
    <input id="iqcItem" placeholder="품목">
    <input id="iqcIncomingQty" placeholder="입고수량">
    <input id="iqcQty" placeholder="검사수량">

    <button onclick="saveIqc()">저장</button>

    <table border="1" width="100%">
      <thead><tr><th>LOT</th><th>수량</th><th>작업</th></tr></thead>
      <tbody id="iqcTable"></tbody>
    </table>
  </div>

  <!-- ======================== -->
  <!-- 공정검사 -->
  <!-- ======================== -->
  <div id="pqc" class="section hidden">
    <h3>공정검사</h3>
    <input id="pqcProduct" placeholder="제품">
    <input id="pqcLot" placeholder="LOT">
    <input id="pqcQty" placeholder="수량">
    <button onclick="savePqc()">저장</button>
    <tbody id="pqcTable"></tbody>
  </div>

  <!-- ======================== -->
  <!-- 출하검사 -->
  <!-- ======================== -->
  <div id="oqc" class="section hidden">
    <h3>출하검사</h3>
    <input id="oqcProduct">
    <input id="oqcQty">
    <button onclick="saveOqc()">저장</button>
    <tbody id="oqcTable"></tbody>
  </div>

  <!-- ======================== -->
  <!-- 부적합 -->
  <!-- ======================== -->
  <div id="ncr" class="section hidden">
    <h3>부적합관리</h3>
    <input id="ncContent">
    <button onclick="saveNc()">저장</button>
    <tbody id="ncTable"></tbody>
  </div>

  <!-- ======================== -->
  <!-- 협력사 -->
  <!-- ======================== -->
  <div id="suppliers" class="section hidden">
    <h3>협력업체</h3>
    <input id="supName">
    <button onclick="saveSupplier()">저장</button>
    <tbody id="supplierTable"></tbody>
  </div>

  <!-- ======================== -->
  <!-- 작업일지 -->
  <!-- ======================== -->
  <div id="worklog" class="section hidden">
    <h3>생산작업일지</h3>
    <input id="wlLot">
    <input id="wlQty">
    <button onclick="saveWorklog()">저장</button>
    <tbody id="worklogTable"></tbody>
  </div>

</div>
</div>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/iqc.js"></script>
<script src="/js/pqc.js"></script>
<script src="/js/oqc.js"></script>
<script src="/js/suppliers.js"></script>
<script src="/js/nonconform.js"></script>
<script src="/js/worklog.js"></script>

<script>
// 페이지 전환
function showPage(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
</script>

</body>
</html>
