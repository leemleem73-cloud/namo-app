html{font-size:17px;}
html,body{background:#050D1B;}
/* ── 프리미엄 다크(네이비) 마감 ── */
body{font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',system-ui,sans-serif;
background:
 radial-gradient(1100px 480px at 14% -10%, rgba(0,170,210,.10), transparent 60%),
 radial-gradient(820px 400px at 92% -4%, rgba(51,193,232,.06), transparent 55%),
 linear-gradient(180deg,#071226 0%,#050D1B 100%);
background-attachment:fixed;}
::-webkit-scrollbar{height:10px;width:10px}
::-webkit-scrollbar-thumb{background:#24405F;border-radius:8px;border:2px solid #071226}
::-webkit-scrollbar-track{background:transparent}

/* 카드 — 다크 입체감 */
.bg-slate-900{box-shadow:0 1px 2px rgba(0,0,0,.35),0 12px 32px -20px rgba(0,0,0,.6);transition:box-shadow .25s ease}
.bg-slate-900:hover{box-shadow:0 2px 4px rgba(0,0,0,.4),0 20px 48px -22px rgba(0,0,0,.7)}

/* 슬림 헤더 — 다크 유리 질감 */
header{backdrop-filter:blur(12px);box-shadow:0 6px 22px -14px rgba(0,0,0,.7);border-bottom:1px solid rgba(255,255,255,.06)!important}
aside{border-right:1px solid rgba(255,255,255,.06)}
aside::-webkit-scrollbar{width:6px}
aside::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}

/* 주요 버튼 — 그라데이션 광택 */
.bg-sky-600{background-image:linear-gradient(180deg,#00A2D8 0%,#007BA8 100%);box-shadow:0 1px 2px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.22)}
.hover\:bg-sky-500:hover{background-image:linear-gradient(180deg,#00B4EA 0%,#008BBC 100%)}
.bg-emerald-600{background-image:linear-gradient(180deg,#0FA968 0%,#0B8653 100%)}
.bg-red-600{background-image:linear-gradient(180deg,#E5484D 0%,#C2363B 100%)}

/* 인쇄 — 선택한 성적서만 A4 세로 첫 페이지 중앙 출력 */
#qmes-print-root{display:none}

@page{
  size:A4 portrait;
  margin:8mm;
}
@media print{
  html,body{
    width:auto!important;
    min-height:0!important;
    margin:0!important;
    padding:0!important;
    background:#fff!important;
    overflow:visible!important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }

  /* 기존 화면은 공간까지 완전히 제거하고, 인쇄용 복제본만 출력 */
  body.print-doc #root{display:none!important}
  body.print-doc #qmes-print-root{
    display:block!important;
    width:194mm!important;
    margin:0 auto!important;
    padding:0!important;
    background:#fff!important;
  }

  body.print-doc #qmes-print-root .doc-paper{
    position:static!important;
    display:block!important;
    width:194mm!important;
    max-width:194mm!important;
    min-height:0!important;
    margin:0 auto!important;
    padding:5mm!important;
    border:0!important;
    border-radius:0!important;
    box-shadow:none!important;
    box-sizing:border-box!important;
    overflow:visible!important;
    background:#fff!important;
    font-size:10px!important;
    line-height:1.25!important;
    break-inside:avoid-page!important;
    page-break-inside:avoid!important;
  }

  body.print-doc #qmes-print-root .doc-paper .text-xl{font-size:16px!important;line-height:1.2!important}
  body.print-doc #qmes-print-root .doc-paper .text-sm{font-size:11px!important;line-height:1.25!important}
  body.print-doc #qmes-print-root .doc-paper .text-xs{font-size:9.5px!important;line-height:1.25!important}
  body.print-doc #qmes-print-root .doc-paper .text-\[10px\]{font-size:8.5px!important;line-height:1.2!important}
  body.print-doc #qmes-print-root .doc-paper .p-6,
  body.print-doc #qmes-print-root .doc-paper .md\:p-8{padding:0!important}
  body.print-doc #qmes-print-root .doc-paper .mt-5{margin-top:3mm!important}
  body.print-doc #qmes-print-root .doc-paper .mt-4{margin-top:2.5mm!important}
  body.print-doc #qmes-print-root .doc-paper .pb-4{padding-bottom:2.5mm!important}
  body.print-doc #qmes-print-root .doc-paper .py-2{padding-top:1.5mm!important;padding-bottom:1.5mm!important}
  body.print-doc #qmes-print-root .doc-paper .px-3{padding-left:2mm!important;padding-right:2mm!important}
  body.print-doc #qmes-print-root .doc-paper .h-14{height:12mm!important}

  body.print-doc #qmes-print-root .doc-paper table{
    width:100%!important;
    table-layout:fixed!important;
    border-collapse:collapse!important;
    break-inside:avoid-page!important;
    page-break-inside:avoid!important;
  }
  body.print-doc #qmes-print-root .doc-paper tr,
  body.print-doc #qmes-print-root .doc-paper thead,
  body.print-doc #qmes-print-root .doc-paper tbody,
  body.print-doc #qmes-print-root .doc-paper > *{
    break-inside:avoid-page!important;
    page-break-inside:avoid!important;
  }
}

.doc-paper .border-slate-900{border-color:#1c1917}.doc-paper .border-slate-400{border-color:#a8a29e}.doc-paper .border-slate-300{border-color:#d6d3d1}.doc-paper .border-slate-200{border-color:#e7e5e4}
.doc-paper .bg-slate-50{background:#fafaf9}
.doc-paper{box-shadow:0 2px 6px rgba(28,25,23,.08),0 24px 60px -24px rgba(28,25,23,.25)!important}

/* CTQ 관리도 점 표시: 규격 내 파랑, 규격 이탈 빨강 */
function SpecDot({ cx, cy, payload, lo = null, hi = null }) {
  const value = Number(payload?.v);
  const isOut = Number.isFinite(value) && ((lo != null && value < lo) || (hi != null && value > hi));
  return <circle cx={cx} cy={cy} r={4} fill={isOut ? "#ef4444" : "#38bdf8"} stroke={isOut ? "#fecaca" : "#bae6fd"} strokeWidth={1.5} />;
}

function spcStats(values, lsl, usl) {
  const n = values.length;
  const mean = values.reduce((a, b) => a + b, 0) / n;
  const sd = Math.sqrt(values.reduce((a, b) => a + (b - mean) ** 2, 0) / (n - 1));
  const cp = lsl != null && usl != null ? (usl - lsl) / (6 * sd) : null;
  const cpu = usl != null ? (usl - mean) / (3 * sd) : null;
  const cpl = lsl != null ? (mean - lsl) / (3 * sd) : null;
  const cpk = Math.min(...[cpu, cpl].filter((v) => v != null));
  return { mean, sd, cp, cpk, n };
}

function qmesCloneWithScreenStyles(source) {
  const clone = source.cloneNode(true);
  const sourceNodes = [source, ...source.querySelectorAll("*")];
  const cloneNodes = [clone, ...clone.querySelectorAll("*")];

  sourceNodes.forEach((node, index) => {
    const clonedNode = cloneNodes[index];
    if (!clonedNode || node.nodeType !== 1) return;

    const computed = window.getComputedStyle(node);
    for (let i = 0; i < computed.length; i += 1) {
      const prop = computed[i];
      try {
        clonedNode.style.setProperty(prop, computed.getPropertyValue(prop), "important");
      } catch (_) {}
    }
  });

  clone.setAttribute("data-qmes-screen-print", "true");
  return clone;
}

function printDoc(sourceEl) {
  const source = sourceEl || Array.from(document.querySelectorAll(".doc-paper"))
    .find((el) => el.offsetParent !== null && el.id !== "qmes-label-print-root");
  const printRoot = document.getElementById("qmes-print-root");

  if (!source || !printRoot) {
    alert("인쇄할 성적서 내용을 찾을 수 없습니다.");
    return;
  }

  /* ── 화면 미리보기 = 실제 인쇄 결과 ──
     화면에 렌더링된 계산 스타일(computed style)을 요소별 인라인으로 복제해
     인쇄 전용 CSS 재정의(글자/여백/표 높이 등)의 영향을 완전히 차단하고,
     화면 모습 그대로를 A4에 맞게 비율만 축소하여 출력합니다. */
  const clone = qmesCloneWithScreenStyles(source);
  clone.classList.add("qmes-a4-preview-clone");

  /* 캔버스(QR 등) 내용은 cloneNode로 복사되지 않으므로 비트맵을 직접 복사 */
  const srcCanvases = source.querySelectorAll("canvas");
  const cloneCanvases = clone.querySelectorAll("canvas");
  srcCanvases.forEach((c, i) => {
    const cc = cloneCanvases[i];
    if (!cc) return;
    try {
      cc.width = c.width;
      cc.height = c.height;
      cc.getContext("2d").drawImage(c, 0, 0);
    } catch (_) {}
  });

  /* 인쇄에 불필요한 요소 제거 */
  clone.querySelectorAll("button, .qmes-modal-close, .qmes-print-actions, [data-no-print='true']")
    .forEach((el) => el.remove());

  /* 배경색·표 음영이 미리보기와 동일하게 인쇄되도록 강제 */
  [clone, ...clone.querySelectorAll("*")].forEach((el) => {
    try {
      el.style.setProperty("-webkit-print-color-adjust", "exact", "important");
      el.style.setProperty("print-color-adjust", "exact", "important");
    } catch (_) {}
  });

  /* 화면 크기 측정 후 A4(210×297mm)에 맞는 축소 배율 계산 */
  const rect = source.getBoundingClientRect();
  const MM_TO_PX = 96 / 25.4;
  const PAGE_W = 210 * MM_TO_PX;
  const PAGE_H = 297 * MM_TO_PX;
  const MARGIN = 8 * MM_TO_PX; /* 상하좌우 8mm 여백 */
  const availW = PAGE_W - MARGIN * 2;
  const availH = PAGE_H - MARGIN * 2;
  const scale = Math.min(availW / rect.width, availH / rect.height, 1);

  /* 복제본을 화면 폭 그대로 두고 transform으로만 축소 → 레이아웃 재계산 없음 */
  clone.style.setProperty("width", rect.width + "px", "important");
  clone.style.setProperty("margin", "0", "important");
  clone.style.setProperty("box-shadow", "none", "important");
  clone.style.setProperty("transform", "scale(" + scale + ")", "important");
  clone.style.setProperty("transform-origin", "top left", "important");

  const stage = document.createElement("div");
  stage.className = "qmes-screen-print-stage";
  /* 수입·공정·출하검사 성적서 모두 용지 상단에서 1.2cm 추가 하향 배치 */
  const extraTop = (source.classList.contains("qmes-iqc-doc") ||
                    source.classList.contains("qmes-pqc-doc") ||
                    source.classList.contains("qmes-oqc-doc")) ? 12 * MM_TO_PX : 0;
  stage.style.setProperty("width", (rect.width * scale) + "px", "important");
  stage.style.setProperty("height", (rect.height * scale) + "px", "important");
  stage.style.setProperty("margin", (MARGIN + extraTop) + "px auto 0", "important");
  stage.style.setProperty("overflow", "visible", "important");
  stage.appendChild(clone);

  printRoot.innerHTML = "";
  printRoot.appendChild(stage);

  document.body.classList.remove("print-label", "print-doc");
  document.body.classList.add("qmes-screen-exact-print");

  let cleaned = false;
  const cleanup = () => {
    if (cleaned) return;
    cleaned = true;
    document.body.classList.remove("qmes-screen-exact-print");
    printRoot.innerHTML = "";
    window.removeEventListener("afterprint", cleanup);
  };

  window.addEventListener("afterprint", cleanup);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    window.print();
    setTimeout(cleanup, 1500);
  }));
}

function downloadQmesBackup() {
  const payload = {
    format: "QMES_BACKUP_V1",
    exportedAt: new Date().toISOString(),
    data: DB,
    users: (() => {
      try { return JSON.parse(localStorage.getItem("qmes-users-v3") || "[]"); }
      catch (e) { return []; }
    })(),
    ui: {
      currentTab: localStorage.getItem("qmes_current_tab") || "dash",
      openMenu: localStorage.getItem("qmes_open_menu") || "",
      selectedWo: localStorage.getItem("qmes_selected_wo") || "",
    },
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}_${String(d.getHours()).padStart(2,"0")}${String(d.getMinutes()).padStart(2,"0")}`;
  a.href = url;
  a.download = `QMES_BACKUP_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function restoreQmesBackup() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.onchange = () => {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const payload = JSON.parse(String(reader.result || ""));
        if (payload.format !== "QMES_BACKUP_V1" || !payload.data) throw new Error("QMES 백업 파일이 아닙니다.");
        if (!confirm("현재 로컬 데이터를 백업 파일 내용으로 교체할까요?")) return;
        localStorage.setItem(DB_KEY, JSON.stringify({ ...dbDefault(), ...payload.data }));
        if (Array.isArray(payload.users)) localStorage.setItem("qmes-users-v3", JSON.stringify(payload.users));
        if (payload.ui?.currentTab) localStorage.setItem("qmes_current_tab", payload.ui.currentTab);
        if (payload.ui?.openMenu) localStorage.setItem("qmes_open_menu", payload.ui.openMenu);
        if (payload.ui?.selectedWo) localStorage.setItem("qmes_selected_wo", payload.ui.selectedWo);
        alert("복원이 완료되었습니다.");
        location.reload();
      } catch (e) {
        alert(`복원 실패: ${e.message || "파일을 확인하세요."}`);
      }
    };
    reader.readAsText(file, "utf-8");
  };
  input.click();
}

function Kpi({ icon: Icon, label, value, unit, delta, deltaUp, tone = "text-sky-400", animated = false, progressValue }) {
  const numeric = Number(String(value).replace(/[^0-9.]/g,"")) || 0;
  const labelKey = String(label || "");
  const calculatedProgress = progressValue !== undefined && progressValue !== null
    ? Number(progressValue)
    : labelKey.includes("합격") ? numeric
    : labelKey.includes("LOT") ? (numeric > 0 ? 100 : 0)
    : labelKey.includes("부적합") || labelKey.includes("반품") ? numeric
    : 58;
  const progress = Math.max(0, Math.min(100, Number.isFinite(calculatedProgress) ? calculatedProgress : 0));
  const [displayProgress, setDisplayProgress] = useState(animated ? 0 : progress);

  useEffect(() => {
    if (!animated) {
      setDisplayProgress(progress);
      return;
    }
    setDisplayProgress(0);
    const timer = window.setTimeout(() => setDisplayProgress(progress), 80);
    return () => window.clearTimeout(timer);
  }, [progress, animated]);

  return (
    <div className={`bg-slate-900 border border-slate-800 rounded-lg qmes-hybrid-kpi-card ${animated ? "qmes-iqc-kpi-card" : ""}`}>
      <div className="qmes-hybrid-donut" style={{"--donut-progress": `${displayProgress}%`}}>
        <div className="qmes-hybrid-ring"></div>
        <div className="qmes-hybrid-ring-inner"></div>
        <Icon className={`qmes-hybrid-icon ${tone}`} />
        {animated && <span className="qmes-hybrid-percent">{Math.round(displayProgress)}%</span>}
      </div>
      <div className="qmes-hybrid-copy">
        <div className="qmes-hybrid-label-row">

          {labelKey.includes("LOT") && "이번 달 누적 입고 실적"}
          {labelKey.includes("부적합") && "즉시 확인이 필요한 항목"}
          {labelKey.includes("반품") && "공급사 반송 처리 건수"}
        </div>
        {delta && (
          <div className={`qmes-hybrid-delta ${deltaUp ? "is-up" : "is-down"}`}>
            {deltaUp ? <TrendingUp size={12} /> : <TrendingDown size={12} />}
            <span>{delta} 전일 대비</span>
          </div>
        )}
      </div>
    </div>
  );
}

function IqcBarcodeQr({ record }) {
  const barcodeRef = React.useRef(null);
  const [qrSrc, setQrSrc] = useState("");
  const inNo = String(record?.inNo || "").trim();
  const qrText = [
    "NAMO CHEMICAL IQC",
    `입고번호: ${inNo || "-"}`,
    `입고일자: ${(record?.recv || "-").slice(0,10)}`,
    `원재료명: ${record?.name || "-"}`,
    `LOT No.: ${record?.lot || "-"}`,
    `업체명: ${record?.supplier || "-"}`,
  ].join("\\n");

  useEffect(() => {
    if (!inNo || !barcodeRef.current) return;
    try {
      window.JsBarcode(barcodeRef.current, inNo, {
        format: "CODE128",
        displayValue: false,
        margin: 0,
        height: 44,
        width: 1.55,
        lineColor: "#111111",
        background: "#ffffff",
      });
    } catch (e) {
      console.warn("Barcode render failed", e);
    }
    if (window.QRCode?.toDataURL) {
      window.QRCode.toDataURL(qrText, {
        width: 180,
        margin: 1,
        errorCorrectionLevel: "M",
        color: { dark: "#111111", light: "#ffffff" },
      }).then(setQrSrc).catch((e) => console.warn("QR render failed", e));
    }
  }, [inNo, qrText]);

  return (
    <div className="qmes-iqc-code-area">
      <div className="qmes-iqc-barcode-wrap">
        <svg ref={barcodeRef} aria-label={`입고번호 바코드 ${inNo}`} />
        <div className="qmes-iqc-code-caption">{inNo || "입고번호 미등록"}</div>
      </div>
      <div className="qmes-iqc-qr-wrap">
        {qrSrc ? <img src={qrSrc} alt={`${inNo} QR 코드`} /> : <div className="w-16 h-16 border border-slate-300" />}
        
      </div>
    </div>
  );
}


function IqcLabelViewer({ record, onClose }) {
  if (!record) return null;

  const labelJudge = [record.visual, record.label, record.weight, record.coa].every(v => v === "합격")
    ? "합격"
    : "불합격";
  const labelJudgeTop = labelJudge === "합격" ? "합격" : "불합격";
  const judgeReasons = [];
  if (record.visual !== "합격") judgeReasons.push("외관 이상");
  if (record.label !== "합격") judgeReasons.push("라벨 이상");
  if (record.weight !== "합격") judgeReasons.push("중량 기준 이탈");
  if (record.coa !== "합격") judgeReasons.push("COA 불일치");
  const judgeReason = judgeReasons.length ? judgeReasons.join(", ") : "이상 없음";

  const printLabel = () => {
    const source = document.getElementById("qmes-label-print-root");
    const printRoot = document.getElementById("qmes-print-root");

    if (!source || !printRoot) {
      alert("인쇄할 라벨을 찾을 수 없습니다.");
      return;
    }

    const clone = source.cloneNode(true);
    clone.id = "qmes-label-print-copy";
    clone.classList.add("qmes-label-print-copy");

    printRoot.innerHTML = "";
    printRoot.appendChild(clone);

    document.body.classList.remove("print-doc", "qmes-screen-exact-print");
    document.body.classList.add("print-label");

    let cleaned = false;
    const cleanup = () => {
      if (cleaned) return;
      cleaned = true;
      document.body.classList.remove("print-label");
      printRoot.innerHTML = "";
      window.removeEventListener("afterprint", cleanup);
    };

    window.addEventListener("afterprint", cleanup);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      window.print();
      setTimeout(cleanup, 1500);
    }));
  };

  return (
    <div className="qmes-modal-backdrop" onClick={onClose}>
      <div className="qmes-label-viewer" onClick={(e)=>e.stopPropagation()}>
        <div className="qmes-wo-viewer-head">
          <div>
            <div className="text-sm font-semibold text-slate-100">수입 원재료 라벨 미리보기</div>
            <div className="text-[11px] text-slate-500 mt-0.5">{record.inNo || "-"}</div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={printLabel}
              className="px-3 py-1.5 rounded bg-sky-600 hover:bg-sky-500 text-xs text-white inline-flex items-center gap-1.5">
              <Printer size={13} /> 인쇄
            </button>
            <button onClick={onClose} className="qmes-modal-close">×</button>
          </div>
        </div>

        <div id="qmes-label-print-root" className="doc-paper qmes-iqc-label-paper bg-white text-stone-900">
          <div className="qmes-iqc-label-head">
            <div className="qmes-iqc-label-title">수입검사 원재료 라벨</div>
            <div className={`qmes-iqc-label-judge ${labelJudge === "합격" ? "pass" : "fail"}`} data-judge={labelJudgeTop}>
              {labelJudgeTop}
            </div>
          </div>

          <div className="qmes-iqc-label-grid">
            <div className="qmes-iqc-label-key">원재료명</div>
            <div className="qmes-iqc-label-value">{record.name || "-"}</div>

            <div className="qmes-iqc-label-key">LOT No.</div>
            <div className="qmes-iqc-label-value font-mono">{record.lot || "-"}</div>

            <div className="qmes-iqc-label-key">입고번호</div>
            <div className="qmes-iqc-label-value font-mono">{record.inNo || "-"}</div>

            <div className="qmes-iqc-label-key">업체명</div>
            <div className="qmes-iqc-label-value">{record.supplier || "-"}</div>

            <div className="qmes-iqc-label-key">입고일자</div>
            <div className="qmes-iqc-label-value">{String(record.recv || "-").slice(0,10)}</div>

            <div className="qmes-iqc-label-key">검사일자</div>
            <div className="qmes-iqc-label-value">{String(record.inspectedAt || record.recv || "-").slice(0,10)}</div>

            <div className="qmes-iqc-label-key">입고수량</div>
            <div className="qmes-iqc-label-value">{record.qty || "-"}</div>

            <div className="qmes-iqc-label-key">검사자</div>
            <div className="qmes-iqc-label-value">{record.inspector || record.by || "-"}</div>

            <div className="qmes-iqc-label-key">판정</div>
            <div
              className={`qmes-iqc-label-value qmes-label-check-value ${labelJudge === "합격" ? "is-pass" : "is-fail"}`}
              data-label-check={labelJudge}
            >
              {labelJudge}
            </div>

            <div className="qmes-iqc-label-key">판정사유</div>
            <div className={`qmes-iqc-label-value qmes-iqc-label-reason ${labelJudge === "합격" ? "is-pass" : "is-fail"}`}>
              {judgeReason}
            </div>
          </div>

          <div className="qmes-iqc-label-code">
            <IqcBarcodeQr record={record} />

function QualityInspectionViewer({ type, record, records = [], onClose }) {
  if (!record) return null;
  const isIqc = type === "IQC";
  const title = isIqc ? "수입검사 성적서" : type === "PQC" ? "공정검사 성적서" : "출하검사 성적서";
  const lotRows = isIqc ? [] : records.filter((r) => r.lot === record.lot);
  const latestByItem = {};
  lotRows.forEach((r) => { if (!latestByItem[r.check]) latestByItem[r.check] = r; });
  const orderedRows = isIqc ? [] : Object.values(latestByItem);
  /* 성적서 고정 항목: 검사 이력이 없어도 4행(PQC)/8행(OQC)을 항상 표시 */
  const reportKeys = isIqc ? [] : (type === "PQC" ? ["외관", "점도", "고형분", "입도(Dmax)"] : OQC_KEYS);
  const reportRows = reportKeys.map((k) => ({ key: k, rec: latestByItem[k] || null }));
  const roundCount = Math.min(5, Math.max(3, ...reportRows.map((x) => Array.isArray(x.rec && x.rec.measurements) ? x.rec.measurements.length : 0)));
  const ITEM_UNITS = { "점도": "점도 (cP)", "고형분": "고형분 (wt%)", "입도(Dmax)": "입도 Dmax (µm)" };
  const AVG_DECIMALS = { "점도": 0, "고형분": 1, "입도(Dmax)": 2 };
  const finalJudge = isIqc ? record.judge
    : reportKeys.every((k) => latestByItem[k]?.judge === "합격") ? "합격"
    : reportKeys.some((k) => latestByItem[k]?.judge === "불합격") ? "불합격" : "검사중";

  return (
    <div className="qmes-modal-backdrop" onClick={onClose}>
      <div className="qmes-wo-viewer" onClick={(e) => e.stopPropagation()}>
        <div className="qmes-wo-viewer-head">
          <div>
            <div className="text-sm font-semibold text-slate-100">{title} 미리보기</div>
            <div className="text-[11px] text-slate-500 mt-0.5">{isIqc ? record.inNo : record.lot}</div>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={() => printDoc()}
              className="px-3 py-1.5 rounded bg-sky-600 hover:bg-sky-500 text-xs text-white inline-flex items-center gap-1.5"><Printer size={13} /> 인쇄</button>
            <button onClick={onClose} className="qmes-modal-close">×</button>
          </div>
        </div>

        <div className={`doc-paper ${isIqc ? "qmes-iqc-doc" : type === "PQC" ? "qmes-pqc-doc" : "qmes-oqc-doc"} bg-white max-w-4xl mx-auto mt-4 p-6 rounded text-stone-900`}>

function localISODate(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function nextInspectionNo(prefix, dateValue, rows, fieldName) {
  const fullDate = String(dateValue || "").replaceAll("-", "").slice(0, 8);
  const dateKey = fullDate.length === 8 ? fullDate.slice(2) : fullDate;
  const base = `${prefix}-${dateKey}-`;
  const maxSeq = (rows || []).reduce((max, row) => {
    const value = String(row?.[fieldName] || "");
    if (!value.startsWith(base)) return max;
    const seq = Number(value.slice(base.length));
    return Number.isFinite(seq) ? Math.max(max, seq) : max;
  }, 0);
  return `${base}${String(maxSeq + 1).padStart(4, "0")}`;
}

function InspectionTab({ docName, itemKeys, initial, lotOptions, idPrefix, idStart, notice, storeKey, traceStage }) {
  const today = new Date().toISOString().slice(0, 10);
  const isOqc = storeKey === "OQC";

    date: today,

    value1: "",
    value2: "",
    value3: "",

  });
  const [measurementRows, setMeasurementRows] = useState([]);
  const [measurementInput, setMeasurementInput] = useState("");
  const makeInitialPqcValues = () => ({ "점도":["","",""], "고형분":["","",""], "입도(Dmax)":["","",""], "외관":["이상없음"] });
  const [pqcValues, setPqcValues] = useState(makeInitialPqcValues());
  const [tried, setTried] = useState(false);
  const [nextId, setNextId] = useState(DB.seqs[storeKey] || idStart);
  const [editingId, setEditingId] = useState(null);
  const [recordSearch, setRecordSearch] = useState("");
  const [recordYear, setRecordYear] = useState("ALL");
  const [recordMonth, setRecordMonth] = useState("ALL");
  const [recordPage, setRecordPage] = useState(1);
  const [viewingRecord, setViewingRecord] = useState(null);
  const [measurementPreviewRows, setMeasurementPreviewRows] = useState(null);
  const [showRegisterModal, setShowRegisterModal] = useState(false);
  const recordPageSize = 10;
  const availableLots = Array.from(new Set((DB.batches || []).map((b) => b.no).filter(Boolean)));
  const selectedBatch = (DB.batches || []).find((b) => b.no === form.lot);
  const rawSelectedProduct = selectedBatch?.itemName || selectedBatch?.item || "";
  const selectedProduct = isOqc
    ? (rawSelectedProduct === "절연 슬러리" ? "" : rawSelectedProduct)
    : form.product;
  const numberLabel = isOqc ? "출하번호" : "공정번호";
  const previewNo = editingId || nextInspectionNo(storeKey, form.date, records, "id");

  const pass = records.filter((r) => r.judge === "합격").length;
  const rate = records.length ? ((pass / records.length) * 100).toFixed(1) : "—";
  const spec = QC_ITEMS[form.check];
  const isNumericItem = spec.lo != null || spec.hi != null;
  const pendingMeasurement = String(measurementInput || "").trim();
  const measurementValues = [
    ...measurementRows.map((v) => String(v || "").trim()),
    ...(pendingMeasurement ? [pendingMeasurement] : [])
  ].filter((v) => v !== "");
  const measurementComplete = measurementValues.length > 0;
  const numericMeasurementValues = measurementValues
    .map((v) => v.replace(/,/g, ""))
    .filter((v) => /^[-+]?\d+(?:\.\d+)?$/.test(v));
  const measurementAverage = measurementComplete
    && numericMeasurementValues.length === measurementValues.length
    ? numericMeasurementValues.reduce((sum, v) => sum + Number(v), 0) / numericMeasurementValues.length
    : null;
  const trimmedVal = measurementComplete ? measurementValues.join(" / ") : "";
  const inputError = null;
  const autoJ = isNumericItem && measurementAverage != null && !inputError
    ? autoJudge(form.check, String(measurementAverage))
    : null;
  const pqcItems = ["점도", "고형분", "입도(Dmax)", "외관"];
  const pqcComplete = pqcItems.every((k) => {
    const vals = Array.isArray(pqcValues[k]) ? pqcValues[k] : [pqcValues[k]];
    return vals.length > 0 && vals.every((v) => String(v || "").trim() !== "");
  });
  const pqcJudges = Object.fromEntries(pqcItems.map((k) => {
    const vals = (Array.isArray(pqcValues[k]) ? pqcValues[k] : [pqcValues[k]]).map((v)=>String(v||"").trim()).filter(Boolean);
    if (k === "외관") return [k, vals[0] === "이상없음" ? "합격" : "불합격"];
    const allPass = vals.length > 0 && vals.every((v) => autoJudge(k, v) === "합격");
    return [k, allPass ? "합격" : "불합격"];
  }));
  const pqcOverallJudge = pqcItems.every((k) => pqcJudges[k] === "합격") ? "합격" : "불합격";
  const lotErr = isOqc && form.lot.trim() !== "" && availableLots.length > 0 && !availableLots.includes(form.lot.trim())
    ? "작업지시에서 발행된 LOT를 선택하세요." : null;
  const triedErrors = [];
  if (tried && form.lot.trim() === "") triedErrors.push("작업지시 LOT를 선택하세요.");
  if (tried && form.date.trim() === "") triedErrors.push("검사일자를 입력하세요");
  if (isOqc && tried && form.shipDate.trim() === "") triedErrors.push("출하일자를 입력하세요");
  if (!isOqc && tried && form.product.trim() === "") triedErrors.push("제품명을 입력하세요");
  if (!isOqc && tried && !pqcComplete) triedErrors.push("점도, 고형분, 입도, 외관 측정값을 모두 입력하세요");
  if (isOqc && tried && trimmedVal === "") triedErrors.push("측정값을 1개 이상 입력하세요");
  const canAdd = isOqc
    ? (trimmedVal !== "" && !inputError && !lotErr && form.date.trim() !== "" && form.lot.trim() !== "" && form.shipDate.trim() !== "")
    : (pqcComplete && form.date.trim() !== "" && form.lot.trim() !== "" && form.product.trim() !== "");

  const addRecord = () => {
    if (!canAdd) { setTried(true); return; }
    if (!isOqc) {
      const now = new Date();
      const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
      const date = form.date;
      const lotNo = form.lot.trim();
      const product = form.product.trim();
      const baseNo = editingId || nextInspectionNo(storeKey, date, records, "id");
      const inspector = (window.__QMES_USER__ || "현재 사용자");
      const newRows = pqcItems.map((check, idx) => {
        const values = (Array.isArray(pqcValues[check]) ? pqcValues[check] : [pqcValues[check]])
          .map((v)=>String(v||"").trim()).filter(Boolean);
        const nums = values.map((v)=>Number(v.replace(/,/g,""))).filter((v)=>Number.isFinite(v));
        return {
          id: editingId && idx === 0 ? editingId : `${baseNo}-${idx + 1}`,
          groupId: baseNo,
          date, shipDate:"", time, lot:lotNo, product, check,
          value:values.join(" / "),
          measurements:values,
          average:check === "외관" || nums.length !== values.length ? null : nums.reduce((a,b)=>a+b,0)/nums.length,
          judge:pqcJudges[check], note:`${QC_ITEMS[check]?.stage || "공정"}`, inspector
        };
      });
      const next = editingId ? [...records.filter((r)=>r.id!==editingId), ...newRows] : [...newRows, ...records];
      setRecords(next); DB.insp[storeKey]=next;
      newRows.forEach((rec)=>auditLog(storeKey, editingId ? "수정" : "등록", rec.id, `${rec.lot} / ${rec.check} / ${rec.value} / ${rec.judge}`));
      const L=DB.lots[lotNo];
      if(L){
        newRows.forEach((rec)=>{L.steps=[...L.steps,{stage:traceStage,name:`${docName.replace(" 성적서","")} — ${rec.check}`,time,detail:`측정값 ${rec.value} · 규격 ${QC_ITEMS[rec.check]?.spec || "-"}`,result:rec.judge,by:inspector}]});
        if(pqcOverallJudge==="불합격") L.status="홀드 — 부적합 발생 (게이트 차단)";
        else {L.stage="생산"; if(!L.status.includes("홀드")) L.status="생산중";}
      }
      if(pqcOverallJudge==="불합격"){
        DB.holds=[{id:`HLD-${String(Date.now()).slice(-6)}`,target:lotNo,type:"제품 Lot",gate:"공정 게이트",reason:`공정검사 부적합 항목 발생`,since:time,cond:"재검사 합격 + 품질부장 승인",status:"차단중",ncr:"-"},...DB.holds];
      }
      dbSave(); setEditingId(null); setPqcValues(makeInitialPqcValues()); setTried(false); setShowRegisterModal(false); return;
    }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const date = form.date;
    const judge = form.judge;
    const lotNo = form.lot.trim();
    const prev = editingId ? records.find((r) => r.id === editingId) : null;
    const inspectionNo = editingId || nextInspectionNo(storeKey, date, records, "id");
    const matchedProduct = (DB.batches || []).find((b) => b.no === lotNo)?.itemName || (DB.batches || []).find((b) => b.no === lotNo)?.item || prev?.product || "";
    const product = isOqc
      ? (matchedProduct === "절연 슬러리" ? "" : matchedProduct)
      : form.product.trim();
    const recordedValue = measurementValues.join(" / ");
    const rec = {
      id: inspectionNo,
      date,
      shipDate: isOqc ? form.shipDate : (prev?.shipDate || ""),
      time,
      lot: lotNo,
      product,
      check: form.check,
      value: recordedValue,
      measurements: measurementValues,
      average: measurementAverage,
      judge,
      note: `${spec.stage}`,
      inspector: (window.__QMES_USER__ || "현재 사용자")
    };
    const next = editingId ? records.map((r) => r.id === editingId ? rec : r) : [rec, ...records];
    setRecords(next);
    DB.insp[storeKey] = next;
    auditLog(storeKey, editingId ? "수정" : "등록", rec.id, `${rec.lot} / ${rec.check} / ${rec.value} / ${rec.judge}`);

    /* Lot 이력 자동 반영 */
    const L = DB.lots[lotNo];
    if (L) {
      L.steps = [...L.steps, { stage: traceStage, name: `${docName.replace(" 성적서", "")} — ${form.check}`, time, detail: `측정값 ${recordedValue}${measurementAverage != null ? ` · 평균 ${measurementAverage.toFixed(3)}` : ""} · 규격 ${spec.spec}`, result: judge, by: rec.inspector }];
      if (judge === "불합격") L.status = "홀드 — 부적합 발생 (게이트 차단)";
      else if (traceStage === "출하") L.stage = "출하";
      else { L.stage = "생산"; if (!L.status.includes("홀드")) L.status = "생산중"; }
    }
    /* 불합격 → 자동 홀드 (게이트 차단) */
    if (judge === "불합격") {
      DB.holds = [{ id: `HLD-${String(Date.now()).slice(-6)}`, target: lotNo, type: "제품 Lot", gate: traceStage === "출하" ? "출하 게이트" : "공정 게이트", reason: `${form.check} ${recordedValue}${measurementAverage != null ? ` (평균 ${measurementAverage.toFixed(3)})` : ""} — 규격(${spec.spec}) 부적합`, since: time, cond: "재검사 합격 + 품질부장 승인", status: "차단중", ncr: "-" }, ...DB.holds];
    }
    /* OQC 8항목 전부 합격 → CoA 자동 발행 */
    if (storeKey === "OQC" && L) {
      const passed = {};
      DB.insp.OQC.filter((r) => r.lot === lotNo && r.judge === "합격").forEach((r) => { passed[r.check] = r; });
      if (OQC_KEYS.every((k) => passed[k])) {
        const d = decodeLot(lotNo);
        DB.coa[lotNo] = {
          no: `COA-${lotNo}`, customer: "K배터리솔루션", product: L.itemName,
          mfg: d ? `${d.year}-${String(d.month).padStart(2, "0")}-${String(d.day).padStart(2, "0")}` : "-",
          ship: "-", shipNo: "-", qty: L.qty,
          results: OQC_KEYS.map((k) => ({ item: k, spec: QC_ITEMS[k].spec, val: passed[k].value, judge: "합격" })),
        };
        L.status = "OQC 전 항목 합격 — CoA 발행 대상";
      }
    }
    dbSave();
    setEditingId(null);
    setForm({ ...form, value: "", value1: "", value2: "", value3: "", judge: "합격" });
    setMeasurementRows([]);
    setMeasurementInput("");
    setTried(false);
    setShowRegisterModal(false);
  };

  const editRecord = (r) => {
    setEditingId(r.id);
    const savedMeasurements = Array.isArray(r.measurements)
      ? r.measurements
      : String(r.value || "").split("/").map((v) => v.trim());
    setForm({
      date: r.date || today,
      shipDate: r.shipDate || today,
      lot: r.lot,
      product: r.product || "",

    setMeasurementRows(savedMeasurements.filter((v) => String(v || "").trim() !== ""));

    setTried(false);
    setShowRegisterModal(true);
  };

    const reason = askDeleteReason(`${docName} ${r.id}`);
    if (reason === null) return;
    const next = records.filter((x) => x.id !== r.id);
    setRecords(next); DB.insp[storeKey] = next;
    auditLog(storeKey, "삭제", r.id, reason); dbSave();
  };

  const recordYears = Array.from(new Set(
    records
      .map((r) => String(r.date || r.shipDate || "").slice(0, 4))
      .filter((v) => /^\d{4}$/.test(v))
  )).sort((a, b) => b.localeCompare(a));

  const filteredRecords = records.filter((r) => {
    const q = recordSearch.trim().toLowerCase();
    const dateText = String(r.date || r.shipDate || "");
    const year = dateText.slice(0, 4);
    const month = dateText.slice(5, 7);
    const searchOk = !q || [r.id, r.lot, r.product, r.check, r.inspector, r.judge]
      .some((v) => String(v || "").toLowerCase().includes(q));
    const yearOk = recordYear === "ALL" || year === recordYear;
    const monthOk = recordMonth === "ALL" || month === recordMonth;
    return searchOk && yearOk && monthOk;
  });
  const recordPageCount = Math.max(1, Math.ceil(filteredRecords.length / recordPageSize));
  const safeRecordPage = Math.min(recordPage, recordPageCount);
  const pagedRecords = filteredRecords.slice((safeRecordPage - 1) * recordPageSize, safeRecordPage * recordPageSize);
  const displayRecords = isOqc ? pagedRecords : pagedRecords.filter((r, idx, arr) => {
    const key = r.groupId || String(r.id || "").replace(/-\d+$/, "");
    return arr.findIndex((x) => (x.groupId || String(x.id || "").replace(/-\d+$/, "")) === key) === idx;
  });
  const getPqcGroupRows = (record) => {
    const key = record.groupId || String(record.id || "").replace(/-\d+$/, "");
    return records.filter((x) => {
      const xKey = x.groupId || String(x.id || "").replace(/-\d+$/, "");
      return xKey === key && String(x.lot || "") === String(record.lot || "") && String(x.date || "") === String(record.date || "");
    });
  };

  return (
    <div className={isOqc ? "qmes-oqc-page flex flex-col gap-4" : "qmes-pqc-page flex flex-col gap-4"}>

        <Kpi animated icon={XCircle} label="부적합" value={records.length - pass} unit="건" tone="text-red-400" progressValue={records.length ? ((records.length - pass) / records.length) * 100 : 0} />

              <div><span>{isOqc ? "OUTGOING INSPECTION" : "PROCESS INSPECTION"}</span><strong>{editingId ? (isOqc ? "출하검사 수정" : "공정검사 수정") : (isOqc ? "출하검사 신규등록" : "공정검사 신규등록")}</strong></div>

                      aria-label={`측정값 ${value} 삭제`}
                      title="측정값 삭제">×</button>
                  </span>
                )) : <span className="qmes-measurement-placeholder">추가된 값이 표시됩니다</span>}
              </div>
              {form.check === "전해액 안정성" ? (
                <select
                  value={measurementInput}
                  onChange={(e) => setMeasurementInput(e.target.value)}
                  className="qmes-measurement-new-input"
                  aria-label="전해액 안정성 측정값">
                  <option value="">결과 선택</option>
                  <option value="미탈리">미탈리</option>
                  <option value="탈리">탈리</option>
                </select>
              ) : (
                <>
                  <input
                    value={measurementInput}
                    onChange={(e) => setMeasurementInput(e.target.value)}
                    onKeyDown={(e) => {

                        e.preventDefault();
                        const v = measurementInput.trim();
                        if (v) { setMeasurementRows((rows) => [...rows, v]); setMeasurementInput(""); }
                      }
                    }}
                    type="text"
                    inputMode={form.check === "절연저항" ? "text" : "decimal"}
                    autoComplete="off"
                    list={form.check === "절연저항" ? "qmes-insulation-value-options" : undefined}
                    className="qmes-measurement-new-input"
                    placeholder={form.check === "절연저항" ? "측정값 또는 Overflow" : "측정값 입력"}
                    aria-label="추가할 측정값" />
                  {form.check === "절연저항" && (

                </>

              <button type="button"

              className={`qmes-judge-select bg-slate-800 border rounded px-3 py-2 text-sm focus:outline-none ${
                form.judge === "불합격"
                  ? "border-red-500/40 text-red-400"

        {(inputError || lotErr || triedErrors.length > 0) && (

            {[inputError, lotErr, ...triedErrors].filter(Boolean).map((e, i) => (
              <div key={i} className="flex items-center gap-2 text-xs text-red-300"><XCircle size={13} className="shrink-0" /> {e}</div>
            ))}
          </div>
        )}
              </Panel>
            </div>
          </div>
        </div>

                  {isOqc && <td className="py-2.5 px-3 text-xs font-mono text-slate-300 whitespace-nowrap">{r.shipDate || "-"}</td>}
                  <td className="py-2.5 px-3 text-center whitespace-nowrap">
                    <button onClick={() => setViewingRecord(r)} title="성적서 미리보기 및 출력" className="qmes-iqc-action-btn qmes-iqc-action-print mr-1"><Printer size={12} /> 출력</button>
                    <button onClick={() => editRecord(r)} className="qmes-iqc-action-btn qmes-iqc-action-edit mr-1">수정</button>
                    <button onClick={() => deleteRecord(r)} className="qmes-iqc-action-btn qmes-iqc-action-delete">삭제</button>
                  </td>
                </tr>
              )})}
            </tbody>
          </table>
        </div>

        {filteredRecords.length > recordPageSize && (
          <div className="flex items-center justify-center gap-2 mt-3">
            <button onClick={() => setRecordPage((p) => Math.max(1, p - 1))}
              disabled={safeRecordPage === 1}
              className="px-3 py-1.5 rounded border border-slate-700 text-xs text-slate-300 disabled:opacity-40">이전</button>
            <span className="text-xs text-slate-400">{safeRecordPage} / {recordPageCount}</span>
            <button onClick={() => setRecordPage((p) => Math.min(recordPageCount, p + 1))}
              disabled={safeRecordPage === recordPageCount}
              className="px-3 py-1.5 rounded border border-slate-700 text-xs text-slate-300 disabled:opacity-40">다음</button>
          </div>
        )}
      </Panel>
      {measurementPreviewRows && measurementPreviewRows.length > 0 && (
        <div className="qmes-modal-backdrop" onMouseDown={(e)=>{if(e.target===e.currentTarget)setMeasurementPreviewRows(null);}}>
          <div className="qmes-pqc-value-preview-modal">
            <div className="qmes-pqc-value-preview-head"><strong>공정검사 측정값 미리보기</strong><button onClick={()=>setMeasurementPreviewRows(null)}>×</button></div>
            <div className="qmes-pqc-preview-summary">
              <div><span>공정번호</span><strong>{measurementPreviewRows[0].groupId || String(measurementPreviewRows[0].id || "").replace(/-\d+$/, "")}</strong></div>
              <div><span>LOT No.</span><strong>{measurementPreviewRows[0].lot || "-"}</strong></div>
              <div><span>제품명</span><strong>{measurementPreviewRows[0].product || "-"}</strong></div>
              <div><span>검사일자</span><strong>{measurementPreviewRows[0].date || "-"}</strong></div>
              <div><span>최종판정</span><strong>{measurementPreviewRows.every((row)=>row.judge === "합격") ? "합격" : "불합격"}</strong></div>
            </div>
            <table>
              <colgroup><col style={{width:"15%"}}/><col style={{width:"22%"}}/><col style={{width:"51%"}}/><col style={{width:"12%"}}/></colgroup>
              <thead><tr><th>검사항목</th><th>관리기준</th><th>측정값</th><th>판정</th></tr></thead>
              <tbody>{measurementPreviewRows.map((row)=>{
                const values=(row.measurements && row.measurements.length ? row.measurements : String(row.value || "").split("/")).map((v)=>String(v||"").trim()).filter(Boolean);
                return <tr key={row.id}><td>{row.check === "입도(Dmax)" ? "입도" : row.check}</td><td>{QC_ITEMS[row.check]?.spec || "-"}</td><td><div className="qmes-pqc-preview-values">{values.map((value,index)=><span className="qmes-pqc-preview-value" key={`${row.id}-${index}`}><b>{["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩"][index] || `${index+1}.`}</b>{value}</span>)}</div></td><td><Badge tone={row.judge === "합격" ? "green" : "red"}>{row.judge}</Badge></td></tr>;
              })}</tbody>
            </table>
          </div>
        </div>
      )}
      {viewingRecord && (
        <QualityInspectionViewer
          type={storeKey}
          record={viewingRecord}
          records={records}
          onClose={() => setViewingRecord(null)}
        />
      )}
    </div>
  );
}

/* ──────────────────────────── 재고 관리 ──────────────────────────── */

  return (
    <div className="flex flex-col gap-4">
      {short.length > 0 && INVENTORY.some((i) => i.stock > 0) && (
        <div className="flex items-center gap-2.5 bg-amber-500/10 border border-amber-500/30 rounded-lg px-4 py-3">
          <AlertTriangle size={16} className="text-amber-400 shrink-0" />
          <p className="text-sm text-amber-200">
            안전재고 미달 {short.length}건 — {short.map((s) => s.name).join(", ")}. 구매 발주 검토가 필요합니다.
          </p>
        </div>
      )}
      <Panel title="원재료 · 부자재 재고 현황" right={<span className="text-xs text-slate-400">총 {INVENTORY.length}개 품목</span>}>
        <div className="overflow-x-auto -mx-4 px-4">
          <table className="w-full text-sm min-w-[760px]">
            <thead>
              <tr className="text-xs text-slate-400 border-b border-slate-800">
                <th className="text-left py-2 pr-3 font-medium">자재코드</th>
                <th className="text-left py-2 pr-3 font-medium whitespace-nowrap">품명</th>
                <th className="text-right py-2 pr-3 font-medium">현재고</th>
                <th className="text-right py-2 pr-3 font-medium">안전재고</th>
                <th className="text-left py-2 pr-3 font-medium w-36">재고 수준</th>
                <th className="text-left py-2 pr-3 font-medium">보관위치</th>
                <th className="text-left py-2 pr-3 font-medium">보관조건</th>
                <th className="text-left py-2 font-medium">상태</th>
              </tr>
            </thead>
            <tbody>
              {INVENTORY.map((i) => {
                const ratio = Math.min((i.stock / (i.safety * 2)) * 100, 100);

                return (
                  <tr key={i.code} className="border-b border-slate-800/60 hover:bg-slate-800/30">
                    <td className="py-2.5 pr-3 font-mono text-xs text-sky-300">{i.code}</td>
                    <td className="py-2.5 pr-3 text-slate-100">{i.name}</td>
                    <td className="py-2.5 pr-3 text-right tabular-nums text-slate-100 font-medium">
                      {i.stock.toLocaleString()} <span className="text-xs text-slate-500">{i.unit}</span>
                    </td>
                    <td className="py-2.5 pr-3 text-right tabular-nums text-slate-400">{i.safety.toLocaleString()}</td>
                    <td className="py-2.5 pr-3">
                      <div className="h-1.5 bg-slate-800 rounded overflow-hidden">
                        <div className={`h-full rounded ${low ? "bg-amber-400" : "bg-emerald-400"}`} style={{ width: `${ratio}%` }} />
                      </div>
                    </td>
                    <td className="py-2.5 pr-3 text-xs text-slate-400">{i.loc}</td>
                    <td className="py-2.5 pr-3 text-xs text-slate-400">{i.cond}</td>
                    <td className="py-2.5">{low ? <Badge tone="amber">부족</Badge> : <Badge tone="green">정상</Badge>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <p className="text-[11px] text-slate-500 mt-3">
          창고 25±5℃ · 습도 50% 이하, 드라이룸 RH 0.54% 이하 / DP -40℃ · 선입선출(FIFO) 관리 — 관리계획서 공정 30 기준.
        </p>
      </Panel>
    </div>
  );
}

/* ──────────────────────────── 설비 모니터링 ──────────────────────────── */

function EquipmentTab() {
  const TODAY = new Date().toISOString().slice(0, 10);
  if (DB.eqDate !== TODAY) { DB.eqDate = TODAY; DB.eqReadings = {}; dbSave(); } // 일일 점검표 — 날짜가 바뀌면 점검현황 초기화 (기록·알람 이력은 유지)

  const [eqId, setEqId] = useState(EQUIPMENT[0].id);
  const [pk, setPk] = useState(EQUIPMENT[0].params[0].k);
  const [val, setVal] = useState("");
  const [visOk, setVisOk] = useState(null);
  const [tried, setTried] = useState(false);
  const [readings, setReadings] = useState(DB.eqReadings);
  const [logs, setLogs] = useState(DB.eqLogs);
  const [alarms, setAlarms] = useState(DB.eqAlarms);
  const [mode, setMode] = useState("single");
  const [tourIdx, setTourIdx] = useState(0);
  const [tourVals, setTourVals] = useState({});
  const [tourTried, setTourTried] = useState(false);

  const eq = EQUIPMENT.find((e) => e.id === eqId);
  const param = eq.params.find((x) => x.k === pk) || eq.params[0];
  const isVisual = !!param.visual;
  const trimmed = val.trim();
  const numOk = /^-?\d+(\.\d+)?$/.test(trimmed);
  const inputError = !isVisual && trimmed !== "" && !numOk ? "숫자만 입력할 수 있습니다 — 저장 진입 금지" : null;
  const num = parseFloat(trimmed);
  const judge = isVisual
    ? (visOk == null ? null : visOk ? "정상" : "이탈")
    : (trimmed === "" || !numOk ? null : ((param.lo == null || num >= param.lo) && (param.hi == null || num <= param.hi)) ? "정상" : "이탈");
  const triedErrors = [];
  if (tried && judge == null && !inputError) triedErrors.push(isVisual ? "이상 없음 / 이상 발견 중 하나를 선택하세요" : "판독값을 입력하세요");

  const selectParam = (id, k) => { setEqId(id); setPk(k); setVal(""); setVisOk(null); setTried(false); };

  const save = () => {
    if (judge == null || inputError) { setTried(true); return; }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const display = isVisual ? (visOk ? "이상 없음" : "이상 발견") : `${trimmed} ${param.unit || ""}`.trim();
    const nextReadings = { ...readings, [`${eq.id}:${param.k}`]: { v: display, ok: judge === "정상", time } };
    const nextLogs = [{ time, eqName: eq.name, item: param.label, v: display, judge, by: window.__QMES_USER__ || "-" }, ...logs];
    setReadings(nextReadings); setLogs(nextLogs);
    DB.eqReadings = nextReadings; DB.eqLogs = nextLogs;
    if (judge === "이탈") {
      const nextAlarms = [{ time, eq: eq.id, msg: `${param.label} ${display} — 관리기준(${param.spec}) 이탈, 점검·조치 필요`, level: "경고" }, ...alarms];
      setAlarms(nextAlarms); DB.eqAlarms = nextAlarms;
    }
    dbSave();
    setVal(""); setVisOk(null); setTried(false);
  };

  /* ── 순회 점검 (설비 앞에서 PLC 육안 확인 → 전 항목 기록 → 다음 설비) ── */
  const tourEq = EQUIPMENT[tourIdx];
  const tourJudge = (x, raw) => {
    if (x.visual) return raw === true ? "정상" : raw === false ? "이탈" : null;
    const t = String(raw ?? "").trim();
    if (!/^-?\d+(\.\d+)?$/.test(t)) return null;
    const n = parseFloat(t);
    return ((x.lo == null || n >= x.lo) && (x.hi == null || n <= x.hi)) ? "정상" : "이탈";
  };
  const tourSave = () => {
    if (tourEq.params.some((x) => tourJudge(x, tourVals[x.k]) == null)) { setTourTried(true); return; }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    let nr = { ...readings }; let nl = [...logs]; let na = [...alarms];
    tourEq.params.forEach((x) => {
      const raw = tourVals[x.k];
      const j = tourJudge(x, raw);
      const display = x.visual ? (raw ? "이상 없음" : "이상 발견") : `${String(raw).trim()} ${x.unit || ""}`.trim();
      nr[`${tourEq.id}:${x.k}`] = { v: display, ok: j === "정상", time };
      nl = [{ time, eqName: tourEq.name, item: x.label, v: display, judge: j, by: window.__QMES_USER__ || "-" }, ...nl];
      if (j === "이탈") na = [{ time, eq: tourEq.id, msg: `${x.label} ${display} — 관리기준(${x.spec}) 이탈, 점검·조치 필요`, level: "경고" }, ...na];
    });
    setReadings(nr); setLogs(nl); setAlarms(na);
    DB.eqReadings = nr; DB.eqLogs = nl; DB.eqAlarms = na;
    dbSave();
    setTourVals({}); setTourTried(false);
    if (tourIdx < EQUIPMENT.length - 1) setTourIdx(tourIdx + 1);
    else { setMode("single"); setTourIdx(0); }
  };
  const totalParams = EQUIPMENT.reduce((a, e) => a + e.params.length, 0);
  const doneParams = EQUIPMENT.reduce((a, e) => a + e.params.filter((x) => readings[`${e.id}:${x.k}`]).length, 0);

  return (
    <div className="flex flex-col gap-4">
      <div className="flex flex-wrap items-center justify-between gap-3 bg-slate-900 border border-slate-800 rounded-lg px-4 py-3">
        <div className="flex items-center gap-2.5 min-w-0">
          <ClipboardList size={15} className="text-amber-400 shrink-0" />
          <p className="text-sm text-slate-300">
            <span className="text-amber-400 font-medium">PLC·계측기 육안 확인 → iPad 기록</span> 체제 — 판정은 시스템 자동, 이탈 시 즉시 알람. 판독값 항목은 향후 PLC 자동 수집 전환 대상입니다.
          </p>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          {doneParams < totalParams
            ? <Badge tone="amber">금일 점검 {doneParams}/{totalParams} — 미완료</Badge>
            : <Badge tone="green">금일 점검 완료 {doneParams}/{totalParams}</Badge>}
          {mode === "single" && (
            <button onClick={() => { setMode("tour"); setTourIdx(0); setTourVals({}); setTourTried(false); }}
              className="flex items-center gap-1.5 rounded px-3 py-1.5 text-xs font-medium bg-sky-600 hover:bg-sky-500 text-white transition-colors">
              <RotateCw size={13} /> 순회 점검 시작
            </button>
          )}
        </div>
      </div>

      {/* 순회 점검 모드 */}
      {mode === "tour" && (
      <Panel title={`순회 점검 ${tourIdx + 1} / ${EQUIPMENT.length} — ${tourEq.name}`}
        right={<button onClick={() => setMode("single")} className="text-[11px] px-2.5 py-1.5 rounded border border-slate-600 text-slate-300 hover:bg-slate-800 transition-colors">순회 종료</button>}>
        <p className="text-xs text-slate-400 mb-3">설비 앞에서 PLC 패널·계측기를 육안 확인한 뒤 항목을 순서대로 기록하세요. 전 항목 기록 전에는 다음 설비로 진입할 수 없습니다.</p>
        <div className="flex flex-col gap-2.5">
          {tourEq.params.map((x) => {
            const raw = tourVals[x.k];
            const j = tourJudge(x, raw);
            return (
              <div key={x.k} className="flex flex-col md:flex-row md:items-center gap-2 bg-slate-800/50 border border-slate-700/60 rounded-lg px-3 py-2.5">
                <div className="md:w-64 shrink-0">
                  <div className="text-sm text-slate-100">{x.label}</div>
                  <div className="text-[11px] text-slate-500">기준 {x.spec} · {x.src}</div>
                </div>
                {x.visual ? (
                  <div className="flex gap-2 flex-1">
                    <button onClick={() => setTourVals({ ...tourVals, [x.k]: true })}
                      className={`flex-1 rounded border px-3 py-2.5 text-sm font-medium transition-colors ${raw === true ? "bg-emerald-500/20 border-emerald-500/60 text-emerald-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>이상 없음</button>
                    <button onClick={() => setTourVals({ ...tourVals, [x.k]: false })}
                      className={`flex-1 rounded border px-3 py-2.5 text-sm font-medium transition-colors ${raw === false ? "bg-red-500/20 border-red-500/60 text-red-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>이상 발견</button>
                  </div>
                ) : (
                  <input inputMode="decimal" value={raw ?? ""} onChange={(e) => setTourVals({ ...tourVals, [x.k]: e.target.value })}
                    placeholder={`판독값 입력 ${x.unit ? `(${x.unit})` : ""}`}
                    className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-base text-center tabular-nums text-slate-100 placeholder-slate-500 placeholder:text-sm focus:outline-none focus:border-sky-500" />
                )}
                <div className="md:w-16 text-center shrink-0">
                  {j == null ? <Badge tone="gray">대기</Badge> : j === "정상" ? <Badge tone="green">정상</Badge> : <Badge tone="red">이탈</Badge>}
                </div>
              </div>
            );
          })}
        </div>
        {tourTried && tourEq.params.some((x) => tourJudge(x, tourVals[x.k]) == null) && (
          <div className="mt-2 bg-red-500/10 border border-red-500/40 rounded px-3 py-2">
            <div className="flex items-center gap-2 text-xs text-red-300"><XCircle size={13} className="shrink-0" /> 미기록 또는 형식 오류 항목이 있습니다 — 전 항목 기록 전 다음 설비 진입 금지</div>
          </div>
        )}
        <div className="flex items-center justify-between mt-3">
          <button onClick={() => { if (tourIdx > 0) { setTourIdx(tourIdx - 1); setTourVals({}); setTourTried(false); } }}
            className={`px-4 py-2.5 rounded-lg border text-sm transition-colors ${tourIdx === 0 ? "border-slate-800 text-slate-600" : "border-slate-600 text-slate-300 hover:bg-slate-800"}`}>
            ← 이전 설비
          </button>
          <button onClick={tourSave}
            className="px-5 py-2.5 rounded-lg bg-sky-600 hover:bg-sky-500 text-white text-sm font-bold transition-colors">
            {tourIdx < EQUIPMENT.length - 1 ? "이 설비 기록 저장 → 다음 설비" : "이 설비 기록 저장 · 순회 완료"}
          </button>
        </div>
      </Panel>
      )}

      {/* 개별 점검 입력 (단일 모드) */}
      {mode === "single" && (
      <Panel title="설비 점검 입력 (개별)" right={<span className="text-xs text-slate-400">관리기준: <span className="text-sky-300">{param.spec}</span> · {param.src}</span>}>
        <div className="grid grid-cols-2 md:grid-cols-5 gap-2 items-end">
          <div className="flex flex-col gap-1 col-span-2 md:col-span-1">
            <span className="text-[10px] text-slate-500">설비</span>
            <select value={eqId} onChange={(e) => { const ne = EQUIPMENT.find((x) => x.id === e.target.value); setEqId(ne.id); setPk(ne.params[0].k); setVal(""); setVisOk(null); }}
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              {EQUIPMENT.map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
          </div>
          <div className="flex flex-col gap-1">
            <span className="text-[10px] text-slate-500">관리항목</span>
            <select value={param.k} onChange={(e) => { setPk(e.target.value); setVal(""); setVisOk(null); }}
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              {eq.params.map((x) => <option key={x.k} value={x.k}>{x.label}</option>)}
            </select>
          </div>
          {isVisual ? (
            <div className="flex gap-2 col-span-2">
              <button onClick={() => setVisOk(true)}
                className={`flex-1 rounded border px-3 py-2 text-sm font-medium transition-colors ${visOk === true ? "bg-emerald-500/20 border-emerald-500/60 text-emerald-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
                이상 없음
              </button>
              <button onClick={() => setVisOk(false)}
                className={`flex-1 rounded border px-3 py-2 text-sm font-medium transition-colors ${visOk === false ? "bg-red-500/20 border-red-500/60 text-red-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
                이상 발견
              </button>
            </div>
          ) : (
            <div className="flex flex-col gap-1 col-span-2">
              <span className="text-[10px] text-slate-500">판독값 {param.unit && `(${param.unit})`}</span>
              <input inputMode="decimal" value={val} onChange={(e) => setVal(e.target.value)}
                placeholder={`판독값 입력 — 기준 ${param.spec}`}
                className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm tabular-nums text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
            </div>
          )}
          <div className="flex items-center gap-2">
            {judge == null ? <Badge tone="gray">대기</Badge> : judge === "정상" ? <Badge tone="green">정상</Badge> : <Badge tone="red">이탈</Badge>}
            <button onClick={save}
              className="flex-1 flex items-center justify-center gap-1.5 rounded px-3 py-2 text-sm font-medium transition-colors bg-sky-600 hover:bg-sky-500 text-white">
              <Plus size={14} /> 기록
            </button>
          </div>
        </div>
        {(inputError || triedErrors.length > 0) && (
          <div className="mt-2 bg-red-500/10 border border-red-500/40 rounded px-3 py-2">
            {[inputError, ...triedErrors].filter(Boolean).map((e, i) => (
              <div key={i} className="flex items-center gap-2 text-xs text-red-300"><XCircle size={13} className="shrink-0" /> {e}</div>
            ))}
          </div>
        )}
      </Panel>
      )}

      {/* 설비 카드 — 기록값 실시간 반영, 항목 클릭 시 입력으로 연결 */}
      <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
        {EQUIPMENT.map((e) => {
          const rs = e.params.map((x) => readings[`${e.id}:${x.k}`]);
          const bad = rs.some((r) => r && !r.ok);
          const done = rs.filter(Boolean).length;
          const st = bad ? "alarm" : done > 0 ? "run" : "idle";
          const m = statusMeta[st];
          return (
            <div key={e.id} className={`bg-slate-900 border ${m.ring} rounded-lg p-4`}>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2 min-w-0">
                  <Cpu size={16} className="text-slate-400 shrink-0" />
                  <span className="text-sm font-medium text-slate-100 truncate">{e.name}</span>
                </div>
                <span className="flex items-center gap-1.5 shrink-0">
                  <span className={`w-2 h-2 rounded-full ${m.dot} ${st === "run" ? "animate-pulse" : ""}`} />
                  <span className={`text-xs font-medium ${m.text}`}>{st === "run" ? "점검중" : m.label}</span>
                </span>
              </div>
              <div className="text-xs text-slate-500 font-mono mt-0.5">{e.id}</div>
              <div className="mt-3">
                <div className="flex justify-between text-xs mb-1">
                  <span className="text-slate-400">금일 점검</span>
                  <span className="tabular-nums text-slate-200">{done} / {e.params.length}</span>
                </div>
                <div className="h-1.5 bg-slate-800 rounded overflow-hidden">
                  <div className={`h-full rounded ${bad ? "bg-red-400" : "bg-emerald-400"}`} style={{ width: `${(done / e.params.length) * 100}%` }} />
                </div>
              </div>
              <div className="grid grid-cols-1 gap-2 mt-3">
                {e.params.map((x, i) => {
                  const r = readings[`${e.id}:${x.k}`];
                  return (
                    <button key={x.k} onClick={() => selectParam(e.id, x.k)}
                      className="flex items-center justify-between bg-slate-800/60 hover:bg-slate-800 rounded px-2.5 py-2 gap-2 text-left transition-colors">
                      <div className="flex items-center gap-2 min-w-0">
                        {i === 0 ? <Thermometer size={13} className="text-amber-400 shrink-0" /> : <Gauge size={13} className="text-sky-400 shrink-0" />}
                        <span className="text-[11px] text-slate-400 truncate">{x.label} ({x.spec})</span>
                      </div>
                      <div className="flex items-center gap-1.5 shrink-0">
                        <span className={`text-xs tabular-nums ${r ? (r.ok ? "text-slate-200" : "text-red-400 font-medium") : "text-slate-500"}`}>{r ? r.v : "—"}</span>
                        {r && <span className="text-[9px] text-slate-500 font-mono">{r.time}</span>}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* 점검 기록 */}
      <Panel title="설비 점검 기록" right={<span className="text-xs text-slate-400">{logs.length}건 · 기록자 자동 저장</span>}>
        {logs.length === 0 ? (
          <p className="text-sm text-slate-500">점검 기록이 없습니다 — 위 [설비 점검 입력]에서 판독값을 기록하세요. 설비 카드의 항목을 클릭해도 바로 입력으로 연결됩니다.</p>
        ) : (
          <div className="overflow-x-auto -mx-4 px-4">
            <table className="w-full text-sm min-w-[620px]">
              <thead>
                <tr className="text-xs text-slate-400 border-b border-slate-800">
                  <th className="text-left py-2 pr-3 font-medium">시각</th>
                  <th className="text-left py-2 px-3 font-medium">설비</th>
                  <th className="text-left py-2 pr-3 font-medium">관리항목</th>
                  <th className="text-left py-2 pr-3 font-medium">판독값</th>
                  <th className="text-left py-2 pr-3 font-medium">판정</th>
                  <th className="text-left py-2 font-medium">기록자</th>
                </tr>
              </thead>
              <tbody>
                {logs.map((l, i) => (
                  <tr key={i} className="border-b border-slate-800/60 hover:bg-slate-800/30">
                    <td className="py-2.5 pr-3 text-xs font-mono text-slate-400">{l.time}</td>
                    <td className="py-2.5 pr-3 text-slate-100 text-xs">{l.eqName}</td>
                    <td className="py-2.5 pr-3 text-slate-300 text-xs">{l.item}</td>
                    <td className="py-2.5 pr-3 tabular-nums text-slate-200">{l.v}</td>
                    <td className="py-2.5 pr-3"><Badge tone={l.judge === "정상" ? "green" : "red"}>{l.judge}</Badge></td>
                    <td className="py-2.5 text-xs text-slate-400">{l.by}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Panel>

      {/* 알람 이력 */}
      <Panel title="설비 · 공정 알람 이력" right={<Badge tone="red">{alarms.length}건</Badge>}>
        <ul className="flex flex-col divide-y divide-slate-800/60">
          {alarms.length === 0 && <li className="py-1 text-sm text-slate-500">알람 이력이 없습니다 — 관리기준 이탈 기록 시 자동 발생합니다.</li>}
          {alarms.map((a, i) => (
            <li key={i} className="flex items-start gap-3 py-2.5">
              <Badge tone="amber">{a.level}</Badge>
              <span className="text-xs font-mono text-slate-500 w-12 shrink-0 pt-0.5">{a.time}</span>
              <span className="text-xs text-slate-400 w-24 shrink-0 pt-0.5 font-mono">{a.eq}</span>
              <span className="text-sm text-slate-200">{a.msg}</span>
            </li>
          ))}
        </ul>
      </Panel>
    </div>
  );
}

/* ──────────────────────────── Lot 추적 탭 ──────────────────────────── */

const STAGE_META = {
  수입: { icon: ArrowDownToLine, color: "text-violet-400", bg: "bg-violet-500/10 border-violet-500/40", line: "bg-violet-500/40" },
  생산: { icon: FlaskConical, color: "text-sky-400", bg: "bg-sky-500/10 border-sky-500/40", line: "bg-sky-500/40" },
  출하: { icon: Truck, color: "text-emerald-400", bg: "bg-emerald-500/10 border-emerald-500/40", line: "bg-emerald-500/40" },
};

function resultTone(r) {
  if (r.includes("불합격")) return "red";
  if (r.includes("진행중")) return "blue";
  if (r.includes("조건부")) return "amber";
  return "green";
}

        {lot.ship ? (
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
            <div><div className="text-xs text-slate-500">고객사</div><div className="text-sm text-slate-100 mt-0.5">{lot.ship.customer}</div></div>

            <div><div className="text-xs text-slate-500">납품처</div><div className="text-sm text-slate-100 mt-0.5">{lot.ship.dest}</div></div>

            <Boxes size={16} className="text-slate-500" />
            아직 출하되지 않은 Lot입니다. OQC 합격 및 포장 완료 후 출하 정보가 기록됩니다. 파손 용기는 교체 후 수분/고형분/점도 재검사 → 적합 시에만 출하합니다.

      </Panel>

      {lot.item === "NBA20-HM01" && dec && (
        <Panel title="제품 라벨 미리보기 (라벨 예시 양식)">
          <div className="doc-paper bg-white text-slate-900 rounded border border-slate-300 max-w-sm overflow-hidden">

              ["제품명 (Grd.)", "NBA20-HM01"],

              ["제조일 (Mfg. Date)", `${dec.year}.${String(dec.month).padStart(2, "0")}.${String(dec.day).padStart(2, "0")}`],

              <div key={i} className={`grid grid-cols-2 text-sm ${i > 0 ? "border-t border-slate-300" : ""}`}>
                <div className="px-3 py-2 bg-slate-50 text-slate-500 text-xs flex items-center">{k}</div>

              </div>
            ))}
          </div>
          <p className="text-[11px] text-slate-500 mt-2">GHS 경고 그림문자(경고·건강유해성·수생환경유해성) 및 취급주의 문구는 실제 라벨 출력 시 포함됩니다.</p>
        </Panel>
      )}
    </div>
  );
}

/* ──────────────────────────── SPC / 공정능력 (Cpk) 탭 ──────────────────────────── */

function cpkGrade(cpk) {
  if (cpk >= 1.67) return { label: "우수 (≥1.67)", tone: "green" };
  if (cpk >= 1.33) return { label: "적합 (≥1.33)", tone: "blue" };
  if (cpk >= 1.0) return { label: "개선 필요 (<1.33)", tone: "amber" };
  return { label: "부적합 (<1.00)", tone: "red" };
}

function SpcTab() {
  const [item, setItem] = useState("점도");
  const cfg = SPC_CONFIG[item];
  const values = cfg.data.map((d) => d.v);
  const s = values.length >= 2 ? spcStats(values, cfg.lsl, cfg.usl) : null;
  const grade = s ? cpkGrade(s.cpk) : { label: "데이터 없음 (검사 2건 이상 필요)", tone: "gray" };
  const fmt = (v, d = 2) => (v == null ? "—" : v.toFixed(d));

  return (
    <div className="flex flex-col gap-4">
      <div className="flex flex-wrap gap-1.5">
        {Object.keys(SPC_CONFIG).map((k) => (
          <button key={k} onClick={() => setItem(k)}
            className={`px-3 py-1.5 rounded border text-xs transition-colors ${
              item === k ? "bg-sky-500/15 border-sky-500/50 text-sky-300" : "bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500"
            }`}>
            {k} <span className="text-slate-500 ml-1">{SPC_CONFIG[k].spec}</span>
          </button>
        ))}
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
        <Kpi icon={BarChart3} label="평균 (x̄)" value={s ? fmt(s.mean, item === "점도" ? 0 : 2) : "—"} unit={cfg.unit} tone="text-sky-400" />
        <Kpi icon={Activity} label="표준편차 (σ)" value={s ? fmt(s.sd, item === "점도" ? 1 : 3) : "—"} unit={cfg.unit} tone="text-violet-400" />
        <Kpi icon={Gauge} label="Cp" value={s ? fmt(s.cp) : "—"} unit={s && s.cp == null ? "(단측규격)" : ""} tone="text-slate-400" />
        <Kpi icon={Gauge} label="Cpk" value={s ? fmt(s.cpk) : "—"} tone={grade.tone === "green" ? "text-emerald-400" : grade.tone === "blue" ? "text-sky-400" : grade.tone === "amber" ? "text-amber-400" : "text-red-400"} />
        <div className="bg-slate-900 border border-slate-800 rounded-lg p-4 flex flex-col justify-center gap-2">
          <span className="text-xs text-slate-400">공정능력 판정</span>
          <Badge tone={grade.tone}>{grade.label}</Badge>
          <span className="text-[10px] text-slate-500">특별특성(CTQ) 목표 Cpk ≥ 1.67</span>
        </div>
      </div>

      <Panel title={`${item} 관리도 — 최근 ${values.length}배치`} right={<Badge tone="violet">CTQ</Badge>}>
        <ResponsiveContainer width="100%" height={280}>
          <LineChart data={cfg.data}>
            <CartesianGrid stroke="#16283E" strokeDasharray="3 3" />
            <XAxis dataKey="b" stroke="#8AA3C0" fontSize={11} />
            <YAxis stroke="#8AA3C0" fontSize={11} domain={cfg.domain} />
            <Tooltip {...chartTooltip} />
            {cfg.usl != null && <ReferenceLine y={cfg.usl} stroke="#38bdf8" strokeDasharray="4 4" label={{ value: `USL ${cfg.usl.toLocaleString()}`, fill: "#7dd3fc", fontSize: 10, position: "insideTopRight" }} />}
            {cfg.target != null && <ReferenceLine y={cfg.target} stroke="#8AA3C0" strokeDasharray="2 4" label={{ value: `CL ${cfg.target.toLocaleString()}`, fill: "#C5D5E8", fontSize: 10, position: "insideRight" }} />}
            {cfg.lsl != null && <ReferenceLine y={cfg.lsl} stroke="#38bdf8" strokeDasharray="4 4" label={{ value: `LSL ${cfg.lsl.toLocaleString()}`, fill: "#7dd3fc", fontSize: 10, position: "insideBottomRight" }} />}
            {s && <ReferenceLine y={s.mean} stroke="#fbbf24" strokeDasharray="6 3" label={{ value: "x̄", fill: "#fbbf24", fontSize: 10, position: "insideLeft" }} />}
            <Line type="monotone" dataKey="v" name={`${item} (${cfg.unit})`} stroke={cfg.color} strokeWidth={2} dot={{ r: 4 }} />
          </LineChart>
        </ResponsiveContainer>
        <p className="text-[11px] text-slate-500 mt-2">
          관리이탈(규격 초과, 연속 상승/하강 경향 등) 발생 시 알람 및 배치 홀드 — 실제 운영 시 점도계·입도분석기 측정값 자동 수집으로 수기 입력을 제거해야 데이터 무결성 요건을 충족합니다.
        </p>
      </Panel>
    </div>
  );
}

            <div><div className="text-xs text-slate-500">결점 등급</div><div className="mt-1"><Badge tone={n.grade === "중결점" ? "red" : "amber"}>{n.grade}</Badge></div></div>

          </div>

          {/* 8D 진행 단계 */}
          <div className="flex gap-1 mb-2">
            {D_STEPS.map((d, i) => (
              <div key={i} className="flex-1 min-w-0">
                <div className={`h-1.5 rounded ${i < n.d ? (n.status === "완료" ? "bg-emerald-400" : "bg-sky-400") : "bg-slate-800"}`} />

          <p className="text-xs text-slate-300 mt-2 leading-relaxed">

      ))}
      <p className="text-[11px] text-slate-500">
        부적합 처리 절차: 격리·식별 → 임시조치 → 원인분석(특성요인도/5Why) → 시정조치 → 유효성 검증 → 재발방지·표준화 (NMCOP3-SP05). 협력사 원인 부적합은 CAR 발행·회신 관리.
      </p>
    </div>
  );
}

/* ──────────────────────────── 검사 성적서 통합 조회 · 인쇄 ──────────────────────────── */

function InspectionReportsTab() {
  const [type, setType] = useState("IQC");
  const dataByType = {
    IQC: DB.iqc || [],
    PQC: DB.insp?.PQC || [],
    OQC: DB.insp?.OQC || [],
  };

  const reportIds = type === "IQC"
    ? dataByType.IQC.map((r) => r.inNo || r.lot).filter(Boolean)
    : Array.from(new Set(dataByType[type].map((r) => r.lot).filter(Boolean)));
  const [sel, setSel] = useState(reportIds[0] || "");
  const [reportPage, setReportPage] = useState(1);
  const reportPageSize = 10;
  const reportPageCount = Math.max(1, Math.ceil(reportIds.length / reportPageSize));
  const safeReportPage = Math.min(reportPage, reportPageCount);
  const pagedReportIds = reportIds.slice((safeReportPage - 1) * reportPageSize, safeReportPage * reportPageSize);

  useEffect(() => {
    setSel(reportIds[0] || "");
    setReportPage(1);
  }, [type]);

  const iqc = type === "IQC" ? dataByType.IQC.find((r) => (r.inNo || r.lot) === sel) : null;
  const inspectionRows = type === "IQC" ? [] : dataByType[type].filter((r) => r.lot === sel);
  const batch = DB.batches.find((b) => b.no === sel) || {};
  const latestByItem = {};
  inspectionRows.forEach((r) => { if (!latestByItem[r.check]) latestByItem[r.check] = r; });
  const itemOrder = type === "PQC" ? PQC_KEYS : OQC_KEYS;
  const reportTitle = type === "IQC" ? "수입검사 성적서" : type === "PQC" ? "공정검사 성적서" : "출하검사 성적서";
  const reportNo = type === "IQC" ? (iqc?.inNo || "-") : `${type}-${sel || "-"}`;
  const reportDate = type === "IQC" ? (iqc?.recv || "-").slice(0, 10) : (inspectionRows[0]?.date || "-");
  const finalJudge = type === "IQC"
    ? (iqc?.judge || "-")
    : inspectionRows.length && itemOrder.every((k) => latestByItem[k]?.judge === "합격") ? "합격"
      : inspectionRows.some((r) => r.judge === "불합격") ? "불합격" : "검사중";

  const selectReport = (id) => setSel(id);

  return (
    <div className="flex flex-col gap-4">
      <Panel title="검사 성적서 조회 · 인쇄" right={sel && (
        <button onClick={printDoc} className="flex items-center gap-1.5 bg-sky-600 hover:bg-sky-500 text-white rounded px-3 py-1.5 text-xs font-medium transition-colors">
          <Printer size={13} /> 선택 성적서 인쇄
        </button>
      )}>
        <div className="flex flex-wrap gap-2 mb-4">
          {[{id:"IQC",label:"수입검사 성적서"},{id:"PQC",label:"공정검사 성적서"},{id:"OQC",label:"출하검사 성적서"}].map((t) => (
            <button key={t.id} onClick={() => setType(t.id)}
              className={`px-3 py-2 rounded border text-xs font-semibold transition-colors ${type === t.id ? "bg-sky-500/15 border-sky-500/60 text-sky-200" : "bg-slate-800 border-slate-700 text-slate-300 hover:border-slate-500"}`}>
              {t.label}
            </button>
          ))}
        </div>

        {reportIds.length === 0 ? (
          <p className="text-sm text-slate-500">등록된 {reportTitle} 데이터가 없습니다.</p>
        ) : (
          <>
            <div className="overflow-x-auto">
              <table className="w-full text-sm min-w-[720px]">
                <thead><tr className="text-xs text-slate-400 border-b border-slate-700">
                  <th className="text-left py-2 px-3">성적서 번호 / LOT</th>
                  <th className="text-left py-2 px-3">품명</th>
                  <th className="text-center py-2 px-3">검사일자</th>
                  <th className="text-center py-2 px-3">판정</th>
                  <th className="text-center py-2 px-3">관리</th>
                </tr></thead>
                <tbody>
                  {pagedReportIds.map((id) => {
                    const row = type === "IQC" ? dataByType.IQC.find((r) => (r.inNo || r.lot) === id) : null;
                    const rs = type === "IQC" ? [] : dataByType[type].filter((r) => r.lot === id);
                    const b = DB.batches.find((x) => x.no === id) || {};
                    const judge = type === "IQC" ? row?.judge : rs.some((r) => r.judge === "불합격") ? "불합격" : rs.length ? "합격" : "검사중";
                    return <tr key={id} className={`border-b border-slate-800/60 ${sel === id ? "bg-sky-500/10" : "hover:bg-slate-800/30"}`}>
                      <td className="py-2.5 px-3 font-mono text-sky-300">{id}</td>
                      <td className="py-2.5 px-3 text-slate-100">{type === "IQC" ? row?.name : b.item || "-"}</td>
                      <td className="py-2.5 px-3 text-center text-slate-300">{type === "IQC" ? (row?.recv || "-").slice(0,10) : rs[0]?.date || "-"}</td>
                      <td className="py-2.5 px-3 text-center"><Badge tone={judge === "합격" ? "green" : judge === "불합격" || judge === "불합격" ? "red" : "blue"}>{judge || "-"}</Badge></td>
                      <td className="py-2.5 px-3 text-center"><button onClick={() => selectReport(id)} className="px-2.5 py-1 rounded border border-sky-500/50 text-sky-300 text-xs">보기</button></td>
                    </tr>;
                  })}
                </tbody>
              </table>
            </div>
            {reportIds.length > reportPageSize && <div className="flex items-center justify-center gap-2 mt-3">
              <button onClick={() => setReportPage((p) => Math.max(1,p-1))} disabled={safeReportPage===1} className="px-3 py-1.5 rounded border border-slate-700 text-xs text-slate-300 disabled:opacity-40">이전</button>
              <span className="text-xs text-slate-400">{safeReportPage} / {reportPageCount}</span>
              <button onClick={() => setReportPage((p) => Math.min(reportPageCount,p+1))} disabled={safeReportPage===reportPageCount} className="px-3 py-1.5 rounded border border-slate-700 text-xs text-slate-300 disabled:opacity-40">다음</button>
            </div>}
          </>
        )}
      </Panel>

      {sel && (type === "IQC" ? iqc : inspectionRows.length > 0) && (
        <div className={`doc-paper ${type === "IQC" ? "qmes-iqc-doc" : type === "PQC" ? "qmes-pqc-doc" : "qmes-oqc-doc"} bg-white text-slate-900 rounded-lg p-6 md:p-8 shadow-xl max-w-4xl mx-auto w-full`}>

/* ──────────────────────────── 수입검사 (IQC) 탭 ──────────────────────────── */

function iqcTone(v) {
  if (v === "합격") return "green";
  if (v === "검사중") return "blue";
  if (v.includes("조건부")) return "amber";
  return "red"; // 불합격 / 불합격
}

function qmesStripQuantityUnit(value) {
  return String(value ?? "").replace(/\s*(kg|g|t|EA|L|매|장|캔)\s*$/i, "").trim();
}

function qmesQuantityWithUnit(value, unit) {
  const raw = qmesStripQuantityUnit(value).replace(/[^0-9.]/g, "");
  if (!raw) return "";
  const parts = raw.split(".");
  const normalized = parts.length > 1
    ? `${parts.shift()}.${parts.join("")}`
    : raw;
  return `${normalized} ${unit}`;
}

  };

  const monthRows = rows.filter((r) => String(r.recv || "").slice(0, 7) === currentMonth);
