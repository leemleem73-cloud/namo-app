html{font-size:17px;}
html,body{background:#050D1B;}
/* ── 프리미엄 다크(네이비) 마감 ── */
body{font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',system-ui,sans-serif;
background:
 radial-gradient(1100px 480px at 14% -10%, rgba(0,170,210,.10), transparent 60%),
 radial-gradient(820px 400px at 92% -4%, rgba(51,193,232,.06), transparent 55%),
 linear-gradient(180deg,#071226 0%,#050D1B 100%);
background-attachment:fixed;}
::-webkit-scrollbar{height:10px;width:10px}
::-webkit-scrollbar-thumb{background:#24405F;border-radius:8px;border:2px solid #071226}
::-webkit-scrollbar-track{background:transparent}

/* 카드 — 다크 입체감 */
.bg-slate-900{box-shadow:0 1px 2px rgba(0,0,0,.35),0 12px 32px -20px rgba(0,0,0,.6);transition:box-shadow .25s ease}
.bg-slate-900:hover{box-shadow:0 2px 4px rgba(0,0,0,.4),0 20px 48px -22px rgba(0,0,0,.7)}

/* 슬림 헤더 — 다크 유리 질감 */
header{backdrop-filter:blur(12px);box-shadow:0 6px 22px -14px rgba(0,0,0,.7);border-bottom:1px solid rgba(255,255,255,.06)!important}
aside{border-right:1px solid rgba(255,255,255,.06)}
aside::-webkit-scrollbar{width:6px}
aside::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}

/* 주요 버튼 — 그라데이션 광택 */
.bg-sky-600{background-image:linear-gradient(180deg,#00A2D8 0%,#007BA8 100%);box-shadow:0 1px 2px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.22)}
.hover\:bg-sky-500:hover{background-image:linear-gradient(180deg,#00B4EA 0%,#008BBC 100%)}
.bg-emerald-600{background-image:linear-gradient(180deg,#0FA968 0%,#0B8653 100%)}
.bg-red-600{background-image:linear-gradient(180deg,#E5484D 0%,#C2363B 100%)}

/* 인쇄 — 성적서·작업지시서만 출력 */
@media print{
  body.print-doc *{visibility:hidden!important}
  body.print-doc .doc-paper, body.print-doc .doc-paper *{visibility:visible!important}
  body.print-doc .doc-paper{position:absolute!important;left:0;top:0;width:100%;max-width:100%!important;box-shadow:none!important;border-radius:0}
  body.print-doc aside, body.print-doc header{display:none!important}
}


.doc-paper{color:#1c1917;}
.doc-paper .text-slate-900{color:#1c1917}.doc-paper .text-slate-600{color:#57534e}.doc-paper .text-slate-500{color:#78716c}.doc-paper .text-slate-400{color:#a8a29e}
.doc-paper .border-slate-900{border-color:#1c1917}.doc-paper .border-slate-400{border-color:#a8a29e}.doc-paper .border-slate-300{border-color:#d6d3d1}.doc-paper .border-slate-200{border-color:#e7e5e4}
.doc-paper .bg-slate-50{background:#fafaf9}
.doc-paper{box-shadow:0 2px 6px rgba(28,25,23,.08),0 24px 60px -24px rgba(28,25,23,.25)!important}

function spcStats(values, lsl, usl) {
  const n = values.length;
  const mean = values.reduce((a, b) => a + b, 0) / n;
  const sd = Math.sqrt(values.reduce((a, b) => a + (b - mean) ** 2, 0) / (n - 1));

  const cpl = lsl != null ? (mean - lsl) / (3 * sd) : null;
  const cpk = Math.min(...[cpu, cpl].filter((v) => v != null));
  return { mean, sd, cp, cpk, n };
}

const DB_KEY = "qmes-db-v1";
const SUPABASE_URL = "https://fhgzojbstdfikqqbybpo.supabase.co";
const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_EbP9sB_9L_foMD5xSgtKAw_raE_2RRu";
const SUPABASE_ROW_ID = "namochemical-main";
const SUPABASE_TABLE = "qmes_shared_state";
let __qmesSaveTimer = null;
let __qmesLastServerUpdatedAt = null;
let __qmesApplyingRemote = false;

function dbDefault() {
  return { batches: [], woDocs: {}, iqc: [], insp: { PQC: [], OQC: [] }, holds: [], eqReadings: {}, eqLogs: [], eqAlarms: [], complaints: [], lots: {}, coa: {}, popEntries: [], auditLogs: [], seqs: {} };
}
let DB = (() => {
  try { const r = window.localStorage.getItem(DB_KEY); if (r) return { ...dbDefault(), ...JSON.parse(r) }; } catch (e) { /* 무시 */ }
  return dbDefault();
})();

function qmesSyncBadge(state, message) {
  let el = document.getElementById("qmes-sync-status");
  if (!el) {
    el = document.createElement("div");
    el.id = "qmes-sync-status";
    el.style.cssText = "position:fixed;right:14px;bottom:14px;z-index:99999;padding:8px 11px;border-radius:999px;font:600 12px Pretendard,Arial,sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px)";
    document.body.appendChild(el);
  }
  const colors = {
    online: ["#064e3b", "#a7f3d0"],
    syncing: ["#0c4a6e", "#bae6fd"],
    offline: ["#78350f", "#fde68a"],
    error: ["#7f1d1d", "#fecaca"]
  };
  const c = colors[state] || colors.offline;
  el.style.background = c[0]; el.style.color = c[1];
  el.textContent = message;
}

function qmesHeaders(extra = {}) {
  return {
    "apikey": SUPABASE_PUBLISHABLE_KEY,
    "Authorization": `Bearer ${SUPABASE_PUBLISHABLE_KEY}`,
    "Content-Type": "application/json",
    ...extra,
  };
}

async function qmesLoadFromServer({ initial = false } = {}) {
  try {
    if (initial) qmesSyncBadge("syncing", "공용 DB 연결 중...");
    const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?id=eq.${encodeURIComponent(SUPABASE_ROW_ID)}&select=payload,updated_at`;
    const res = await fetch(url, { headers: qmesHeaders(), cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = await res.json();
    const row = rows && rows[0];
    if (row && row.payload && typeof row.payload === "object") {
      const changed = row.updated_at && row.updated_at !== __qmesLastServerUpdatedAt;
      __qmesLastServerUpdatedAt = row.updated_at || null;
      const localEmpty = JSON.stringify(DB) === JSON.stringify(dbDefault());
      if (initial || localEmpty) {
        DB = { ...dbDefault(), ...row.payload };
        localStorage.setItem(DB_KEY, JSON.stringify(DB));
      } else if (changed && !__qmesApplyingRemote) {
        const remoteJson = JSON.stringify({ ...dbDefault(), ...row.payload });
        const localJson = JSON.stringify(DB);
        if (remoteJson !== localJson) {
          __qmesApplyingRemote = true;
          localStorage.setItem(DB_KEY, remoteJson);
          qmesSyncBadge("online", "다른 장치 기록 반영 중...");
          setTimeout(() => location.reload(), 500);
          return;
        }
      }
    }
    qmesSyncBadge("online", "공용 DB 연결");
    return true;
  } catch (e) {
    console.warn("QMES Supabase load failed:", e);
    qmesSyncBadge(navigator.onLine ? "error" : "offline", navigator.onLine ? "공용 DB 연결 실패 · 로컬 저장" : "오프라인 · 로컬 저장");
    return false;
  }
}

async function qmesPushToServer() {
  try {
    qmesSyncBadge("syncing", "공용 DB 저장 중...");
    const url = `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?on_conflict=id`;
    const body = [{ id: SUPABASE_ROW_ID, payload: DB, updated_by: (window.__QMES_USER__ || "현재 사용자") }];
    const res = await fetch(url, {
      method: "POST",
      headers: qmesHeaders({ "Prefer": "resolution=merge-duplicates,return=representation" }),
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
    const rows = await res.json();
    if (rows && rows[0] && rows[0].updated_at) __qmesLastServerUpdatedAt = rows[0].updated_at;
    qmesSyncBadge("online", "공용 DB 저장 완료");
  } catch (e) {
    console.warn("QMES Supabase save failed:", e);
    qmesSyncBadge(navigator.onLine ? "error" : "offline", navigator.onLine ? "서버 저장 실패 · 로컬 보관" : "오프라인 · 로컬 보관");
  }
}

function auditLog(module, action, target, reason = "") {
  const now = new Date();
  DB.auditLogs = [{

    by: (window.__QMES_USER__ || "현재 사용자"),
    at: now.toLocaleString("ko-KR", { hour12: false })
  }, ...(DB.auditLogs || [])].slice(0, 500);
}

function askDeleteReason(label) {
  const reason = window.prompt(`${label} 삭제 사유를 입력하세요.\n※ 삭제 이력은 감사 로그에 남습니다.`);
  if (reason === null) return null;
  if (!reason.trim()) { window.alert("삭제 사유를 입력해야 합니다."); return null; }
  return reason.trim();
}

function dbSave() {
  try { window.localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch (e) { /* 무시 */ }
  clearTimeout(__qmesSaveTimer);
  __qmesSaveTimer = setTimeout(qmesPushToServer, 350);
}
function dbReset() {
  DB = dbDefault();
  try { window.localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch (e) { /* 무시 */ }
  dbSave();
}

async function qmesStart() {
  await qmesLoadFromServer({ initial: true });
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(QMESApp));
  setInterval(() => qmesLoadFromServer(), 15000);
  window.addEventListener("online", () => { qmesSyncBadge("syncing", "인터넷 복구 · 동기화 중..."); qmesPushToServer().then(() => qmesLoadFromServer()); });
  window.addEventListener("offline", () => qmesSyncBadge("offline", "오프라인 · 로컬 저장"));
}

                  <td className="py-2.5 pr-3 text-right tabular-nums text-slate-300">{w.plan.toLocaleString()} {w.unit}</td>
                  <td className="py-2.5 pr-3 text-right tabular-nums text-slate-100 font-medium">{w.done.toLocaleString()} {w.unit}</td>
                  <td className="py-2.5 pr-3">
                    <div className="flex items-center gap-2">
                      <div className="flex-1 h-1.5 bg-slate-800 rounded overflow-hidden">
                        <div className={`h-full rounded ${pct >= 100 ? "bg-emerald-400" : "bg-sky-400"}`} style={{ width: `${Math.min(pct, 100)}%` }} />
                      </div>
                      <span className="text-xs tabular-nums text-slate-400 w-9 text-right">{pct}%</span>
                    </div>
                  </td>
                  <td className="py-2.5 pr-3 text-xs text-slate-300">{w.due}</td>
                  <td className="py-2.5"><Badge tone={stTone[w.status]}>{w.status}</Badge></td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </Panel>
  );
}

/* ──────────────────────────── 품질 관리 ──────────────────────────── */

function InspectionTab({ docName, itemKeys, initial, lotOptions, idPrefix, idStart, notice, storeKey, traceStage }) {
  const [records, setRecords] = useState(DB.insp[storeKey] || initial);
  const [form, setForm] = useState({ lot: "", check: itemKeys[0], value: "", judge: "합격" });
  const [tried, setTried] = useState(false);
  const [nextId, setNextId] = useState(DB.seqs[storeKey] || idStart);
  const [editingId, setEditingId] = useState(null);

  const pass = records.filter((r) => r.judge === "합격").length;
  const rate = records.length ? ((pass / records.length) * 100).toFixed(1) : "—";
  const spec = QC_ITEMS[form.check];
  const isNumericItem = spec.lo != null || spec.hi != null;
  const trimmedVal = form.value.trim();
  const inputError = isNumericItem && trimmedVal !== "" && !/^\d+(\.\d+)?$/.test(trimmedVal.replace(/,/g, ""))
    ? "숫자 형식이 아닙니다 — 오입력 상태에서는 등록(다음 단계 진입)이 금지됩니다"
    : null;
  const autoJ = isNumericItem && trimmedVal !== "" && !inputError ? autoJudge(form.check, trimmedVal) : null;
  const lotErr = form.lot.trim() !== "" && !/^[A-D][A-Z][A-L]\d{4}$/.test(form.lot.trim())
    ? "Lot 형식 오류 — 채번 체계(예: CBG1001)와 불일치, 등록 진입 금지" : null;
  const triedErrors = [];
  if (tried && form.lot.trim() === "") triedErrors.push("Lot 번호를 입력하세요 (예: CBG1001)");
  if (tried && trimmedVal === "") triedErrors.push("측정값을 입력하세요");
  const canAdd = trimmedVal !== "" && !inputError && !lotErr && form.lot.trim() !== "";

  const addRecord = () => {
    if (!canAdd) { setTried(true); return; }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const judge = isNumericItem ? autoJ : form.judge;
    const lotNo = form.lot.trim();
    const rec = { id: editingId || `${idPrefix}${nextId}`, time, lot: lotNo, check: form.check, value: form.value, judge, note: `${spec.stage}`, inspector: (window.__QMES_USER__ || "현재 사용자") };
    const next = editingId ? records.map((r) => r.id === editingId ? rec : r) : [rec, ...records];
    setRecords(next);
    DB.insp[storeKey] = next;
    if (!editingId) DB.seqs[storeKey] = nextId + 1;
    auditLog(storeKey, editingId ? "수정" : "등록", rec.id, `${rec.lot} / ${rec.check} / ${rec.value} / ${rec.judge}`);

    /* Lot 이력 자동 반영 */
    const L = DB.lots[lotNo];
    if (L) {
      L.steps = [...L.steps, { stage: traceStage, name: `${docName.replace(" 성적서", "")} — ${form.check}`, time, detail: `측정값 ${form.value} · 규격 ${spec.spec}`, result: judge, by: rec.inspector }];
      if (judge === "불합격") L.status = "홀드 — 부적합 발생 (게이트 차단)";
      else if (traceStage === "출하") L.stage = "출하";
      else { L.stage = "생산"; if (!L.status.includes("홀드")) L.status = "생산중"; }
    }
    /* 불합격 → 자동 홀드 (게이트 차단) */
    if (judge === "불합격") {
      DB.holds = [{ id: `HLD-${String(Date.now()).slice(-6)}`, target: lotNo, type: "제품 Lot", gate: traceStage === "출하" ? "출하 게이트" : "공정 게이트", reason: `${form.check} ${form.value} — 규격(${spec.spec}) 부적합`, since: time, cond: "재검사 합격 + 품질부장 승인", status: "차단중", ncr: "-" }, ...DB.holds];
    }
    /* OQC 8항목 전부 합격 → CoA 자동 발행 */
    if (storeKey === "OQC" && L) {
      const passed = {};
      DB.insp.OQC.filter((r) => r.lot === lotNo && r.judge === "합격").forEach((r) => { passed[r.check] = r; });
      if (OQC_KEYS.every((k) => passed[k])) {
        const d = decodeLot(lotNo);
        DB.coa[lotNo] = {
          no: `COA-${lotNo}`, customer: "K배터리솔루션", product: L.itemName,
          mfg: d ? `${d.year}-${String(d.month).padStart(2, "0")}-${String(d.day).padStart(2, "0")}` : "-",
          ship: "-", shipNo: "-", qty: L.qty,
          results: OQC_KEYS.map((k) => ({ item: k, spec: QC_ITEMS[k].spec, val: passed[k].value, judge: "합격" })),
        };
        L.status = "OQC 전 항목 합격 — CoA 발행 대상";
      }
    }
    dbSave();
    if (!editingId) setNextId(nextId + 1);
    setEditingId(null);
    setForm({ ...form, value: "" });
    setTried(false);
  };

  const editRecord = (r) => {
    setEditingId(r.id);
    setForm({ lot: r.lot, check: r.check, value: String(r.value ?? ""), judge: r.judge || "합격" });
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
  const deleteRecord = (r) => {
    const reason = askDeleteReason(`${docName} ${r.id}`);
    if (reason === null) return;
    const next = records.filter((x) => x.id !== r.id);
    setRecords(next); DB.insp[storeKey] = next;
    auditLog(storeKey, "삭제", r.id, reason); dbSave();
  };

  return (
    <div className="flex flex-col gap-4">
      <div className="grid grid-cols-3 gap-3">
        <Kpi icon={ClipboardCheck} label="금일 검사 건수" value={records.length} unit="건" tone="text-sky-400" />
        <Kpi icon={CheckCircle2} label="합격률" value={rate} unit="%" tone="text-emerald-400" />
        <Kpi icon={XCircle} label="부적합" value={records.length - pass} unit="건" tone="text-red-400" />
      </div>

      {notice && (
        <div className="flex items-center gap-2.5 bg-sky-500/10 border border-sky-500/30 rounded-lg px-4 py-3">
          <ClipboardCheck size={15} className="text-sky-400 shrink-0" />
          <p className="text-sm text-sky-200">{notice}</p>
        </div>
      )}

      <Panel title="검사 결과 등록" right={spec && <span className="text-xs text-slate-400">규격: <span className="text-sky-300">{spec.spec}</span> · {spec.method} · {spec.type !== "-" && <Badge tone="violet">{spec.type}</Badge>}</span>}>
        <div className="grid md:grid-cols-5 gap-2">
          <input value={form.lot} onChange={(e) => setForm({ ...form, lot: e.target.value.toUpperCase() })}
            placeholder="Lot (예: CBG1001)"
            className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm font-mono text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
          <select value={form.check} onChange={(e) => setForm({ ...form, check: e.target.value })}
            className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
            {itemKeys.map((k) => <option key={k}>{k}</option>)}
          </select>
          <input value={form.value} onChange={(e) => setForm({ ...form, value: e.target.value })}
            placeholder={`측정값 (${spec.spec})`}
            className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
          {isNumericItem ? (
            <div className={`flex items-center justify-center rounded border px-3 py-2 text-sm font-medium ${
              inputError ? "border-red-500/40 text-red-400 bg-red-500/10"
              : autoJ === "합격" ? "border-emerald-500/40 text-emerald-400 bg-emerald-500/10"
              : autoJ === "불합격" ? "border-red-500/40 text-red-400 bg-red-500/10"
              : "border-slate-700 text-slate-500 bg-slate-800"
            }`}>
              {inputError ? "진입 금지" : autoJ ?? "자동 판정"}
            </div>
          ) : (
            <select value={form.judge} onChange={(e) => setForm({ ...form, judge: e.target.value })}
              className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              <option>합격</option><option>불합격</option>
            </select>
          )}
          <button onClick={addRecord}
            className="flex items-center justify-center gap-1.5 rounded px-3 py-2 text-sm font-medium transition-colors bg-sky-600 hover:bg-sky-500 text-white">
            <Plus size={15} /> {editingId ? "검사 수정 저장" : "검사 등록"}
          </button>
        </div>
        {(inputError || lotErr || triedErrors.length > 0) && (
          <div className="mt-2 bg-red-500/10 border border-red-500/40 rounded px-3 py-2">
            {[inputError, lotErr, ...triedErrors].filter(Boolean).map((e, i) => (
              <div key={i} className="flex items-center gap-2 text-xs text-red-300"><XCircle size={13} className="shrink-0" /> {e}</div>
            ))}
          </div>
        )}
        <p className="text-[11px] text-slate-500 mt-2">검사 항목·규격·확인방법은 관리계획서 NMC-C-220-01 기준입니다. CTQ 항목(점도/고형분/입도)은 n=1, 3회 측정.</p>
      </Panel>

      <Panel title={`검사 기록 (${docName})`}>
        <div className="overflow-x-auto -mx-4 px-4">
          <table className="w-full text-sm min-w-[720px]">
            <thead>
              <tr className="text-xs text-slate-400 border-b border-slate-800">
                <th className="text-left py-2 pr-3 font-medium">검사번호</th>
                <th className="text-left py-2 pr-3 font-medium">시각</th>
                <th className="text-left py-2 pr-3 font-medium">Lot</th>
                <th className="text-left py-2 pr-3 font-medium">검사항목</th>
                <th className="text-left py-2 pr-3 font-medium">규격</th>
                <th className="text-left py-2 pr-3 font-medium">측정값</th>
                <th className="text-left py-2 pr-3 font-medium">판정</th>
                <th className="text-left py-2 pr-3 font-medium">검사자</th>
                <th className="text-center py-2 font-medium">관리</th>
              </tr>
            </thead>
            <tbody>
              {records.length === 0 && (
                <tr><td colSpan={8} className="py-6 text-center text-sm text-slate-500">검사 기록이 없습니다 — 상단에서 측정값을 등록하면 여기에 기록됩니다.</td></tr>
              )}
              {records.map((r) => (
                <tr key={r.id} className="border-b border-slate-800/60 hover:bg-slate-800/30">
                  <td className="py-2.5 pr-3 font-mono text-xs text-sky-300">{r.id}</td>
                  <td className="py-2.5 pr-3 text-xs font-mono text-slate-400">{r.time}</td>

                  <td className="py-2.5 pr-3 text-slate-100">
                    {r.check} {QC_ITEMS[r.check]?.type === "CTQ" && <Badge tone="violet">CTQ</Badge>}
                  </td>
                  <td className="py-2.5 pr-3 text-xs text-slate-400">{QC_ITEMS[r.check]?.spec || "-"}</td>
                  <td className="py-2.5 pr-3 text-slate-300 tabular-nums">{r.value}</td>
                  <td className="py-2.5 pr-3"><Badge tone={r.judge === "합격" ? "green" : "red"}>{r.judge}</Badge></td>
                  <td className="py-2.5 pr-3 text-slate-400 text-xs">{r.inspector}</td>
                  <td className="py-2.5 text-center whitespace-nowrap">
                    <button onClick={() => editRecord(r)} className="px-2 py-1 mr-1 rounded border border-sky-500/40 text-sky-300 text-xs hover:bg-sky-500/10">수정</button>
                    <button onClick={() => deleteRecord(r)} className="px-2 py-1 rounded border border-red-500/40 text-red-300 text-xs hover:bg-red-500/10">삭제</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Panel>
    </div>
  );
}

function EquipmentTab() {
  const TODAY = new Date().toISOString().slice(0, 10);
  if (DB.eqDate !== TODAY) { DB.eqDate = TODAY; DB.eqReadings = {}; dbSave(); } // 일일 점검표 — 날짜가 바뀌면 점검현황 초기화 (기록·알람 이력은 유지)

  const [eqId, setEqId] = useState(EQUIPMENT[0].id);
  const [pk, setPk] = useState(EQUIPMENT[0].params[0].k);
  const [val, setVal] = useState("");
  const [visOk, setVisOk] = useState(null);
  const [tried, setTried] = useState(false);
  const [readings, setReadings] = useState(DB.eqReadings);
  const [logs, setLogs] = useState(DB.eqLogs);
  const [alarms, setAlarms] = useState(DB.eqAlarms);
  const [mode, setMode] = useState("single");
  const [tourIdx, setTourIdx] = useState(0);
  const [tourVals, setTourVals] = useState({});
  const [tourTried, setTourTried] = useState(false);

  const eq = EQUIPMENT.find((e) => e.id === eqId);
  const param = eq.params.find((x) => x.k === pk) || eq.params[0];
  const isVisual = !!param.visual;
  const trimmed = val.trim();
  const numOk = /^-?\d+(\.\d+)?$/.test(trimmed);
  const inputError = !isVisual && trimmed !== "" && !numOk ? "숫자만 입력할 수 있습니다 — 저장 진입 금지" : null;
  const num = parseFloat(trimmed);
  const judge = isVisual
    ? (visOk == null ? null : visOk ? "정상" : "이탈")
    : (trimmed === "" || !numOk ? null : ((param.lo == null || num >= param.lo) && (param.hi == null || num <= param.hi)) ? "정상" : "이탈");
  const triedErrors = [];
  if (tried && judge == null && !inputError) triedErrors.push(isVisual ? "이상 없음 / 이상 발견 중 하나를 선택하세요" : "판독값을 입력하세요");

  const selectParam = (id, k) => { setEqId(id); setPk(k); setVal(""); setVisOk(null); setTried(false); };

  const save = () => {
    if (judge == null || inputError) { setTried(true); return; }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const display = isVisual ? (visOk ? "이상 없음" : "이상 발견") : `${trimmed} ${param.unit || ""}`.trim();
    const nextReadings = { ...readings, [`${eq.id}:${param.k}`]: { v: display, ok: judge === "정상", time } };
    const nextLogs = [{ time, eqName: eq.name, item: param.label, v: display, judge, by: window.__QMES_USER__ || "-" }, ...logs];
    setReadings(nextReadings); setLogs(nextLogs);
    DB.eqReadings = nextReadings; DB.eqLogs = nextLogs;
    if (judge === "이탈") {
      const nextAlarms = [{ time, eq: eq.id, msg: `${param.label} ${display} — 관리기준(${param.spec}) 이탈, 점검·조치 필요`, level: "경고" }, ...alarms];
      setAlarms(nextAlarms); DB.eqAlarms = nextAlarms;
    }
    dbSave();
    setVal(""); setVisOk(null); setTried(false);
  };

  /* ── 순회 점검 (설비 앞에서 PLC 육안 확인 → 전 항목 기록 → 다음 설비) ── */
  const tourEq = EQUIPMENT[tourIdx];
  const tourJudge = (x, raw) => {
    if (x.visual) return raw === true ? "정상" : raw === false ? "이탈" : null;
    const t = String(raw ?? "").trim();
    if (!/^-?\d+(\.\d+)?$/.test(t)) return null;
    const n = parseFloat(t);
    return ((x.lo == null || n >= x.lo) && (x.hi == null || n <= x.hi)) ? "정상" : "이탈";
  };
  const tourSave = () => {
    if (tourEq.params.some((x) => tourJudge(x, tourVals[x.k]) == null)) { setTourTried(true); return; }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    let nr = { ...readings }; let nl = [...logs]; let na = [...alarms];
    tourEq.params.forEach((x) => {
      const raw = tourVals[x.k];
      const j = tourJudge(x, raw);
      const display = x.visual ? (raw ? "이상 없음" : "이상 발견") : `${String(raw).trim()} ${x.unit || ""}`.trim();
      nr[`${tourEq.id}:${x.k}`] = { v: display, ok: j === "정상", time };
      nl = [{ time, eqName: tourEq.name, item: x.label, v: display, judge: j, by: window.__QMES_USER__ || "-" }, ...nl];
      if (j === "이탈") na = [{ time, eq: tourEq.id, msg: `${x.label} ${display} — 관리기준(${x.spec}) 이탈, 점검·조치 필요`, level: "경고" }, ...na];
    });
    setReadings(nr); setLogs(nl); setAlarms(na);
    DB.eqReadings = nr; DB.eqLogs = nl; DB.eqAlarms = na;
    dbSave();
    setTourVals({}); setTourTried(false);
    if (tourIdx < EQUIPMENT.length - 1) setTourIdx(tourIdx + 1);
    else { setMode("single"); setTourIdx(0); }
  };
  const totalParams = EQUIPMENT.reduce((a, e) => a + e.params.length, 0);
  const doneParams = EQUIPMENT.reduce((a, e) => a + e.params.filter((x) => readings[`${e.id}:${x.k}`]).length, 0);

  return (
    <div className="flex flex-col gap-4">
      <div className="flex flex-wrap items-center justify-between gap-3 bg-slate-900 border border-slate-800 rounded-lg px-4 py-3">
        <div className="flex items-center gap-2.5 min-w-0">
          <ClipboardList size={15} className="text-amber-400 shrink-0" />
          <p className="text-sm text-slate-300">
            <span className="text-amber-400 font-medium">PLC·계측기 육안 확인 → iPad 기록</span> 체제 — 판정은 시스템 자동, 이탈 시 즉시 알람. 판독값 항목은 향후 PLC 자동 수집 전환 대상입니다.
          </p>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          {doneParams < totalParams
            ? <Badge tone="amber">금일 점검 {doneParams}/{totalParams} — 미완료</Badge>
            : <Badge tone="green">금일 점검 완료 {doneParams}/{totalParams}</Badge>}
          {mode === "single" && (
            <button onClick={() => { setMode("tour"); setTourIdx(0); setTourVals({}); setTourTried(false); }}
              className="flex items-center gap-1.5 rounded px-3 py-1.5 text-xs font-medium bg-sky-600 hover:bg-sky-500 text-white transition-colors">
              <RotateCw size={13} /> 순회 점검 시작
            </button>
          )}
        </div>
      </div>

      {/* 순회 점검 모드 */}
      {mode === "tour" && (
      <Panel title={`순회 점검 ${tourIdx + 1} / ${EQUIPMENT.length} — ${tourEq.name}`}
        right={<button onClick={() => setMode("single")} className="text-[11px] px-2.5 py-1.5 rounded border border-slate-600 text-slate-300 hover:bg-slate-800 transition-colors">순회 종료</button>}>
        <p className="text-xs text-slate-400 mb-3">설비 앞에서 PLC 패널·계측기를 육안 확인한 뒤 항목을 순서대로 기록하세요. 전 항목 기록 전에는 다음 설비로 진입할 수 없습니다.</p>
        <div className="flex flex-col gap-2.5">
          {tourEq.params.map((x) => {
            const raw = tourVals[x.k];
            const j = tourJudge(x, raw);
            return (
              <div key={x.k} className="flex flex-col md:flex-row md:items-center gap-2 bg-slate-800/50 border border-slate-700/60 rounded-lg px-3 py-2.5">
                <div className="md:w-64 shrink-0">
                  <div className="text-sm text-slate-100">{x.label}</div>
                  <div className="text-[11px] text-slate-500">기준 {x.spec} · {x.src}</div>
                </div>
                {x.visual ? (
                  <div className="flex gap-2 flex-1">
                    <button onClick={() => setTourVals({ ...tourVals, [x.k]: true })}
                      className={`flex-1 rounded border px-3 py-2.5 text-sm font-medium transition-colors ${raw === true ? "bg-emerald-500/20 border-emerald-500/60 text-emerald-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>이상 없음</button>
                    <button onClick={() => setTourVals({ ...tourVals, [x.k]: false })}
                      className={`flex-1 rounded border px-3 py-2.5 text-sm font-medium transition-colors ${raw === false ? "bg-red-500/20 border-red-500/60 text-red-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>이상 발견</button>
                  </div>
                ) : (
                  <input inputMode="decimal" value={raw ?? ""} onChange={(e) => setTourVals({ ...tourVals, [x.k]: e.target.value })}
                    placeholder={`판독값 입력 ${x.unit ? `(${x.unit})` : ""}`}
                    className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-base text-center tabular-nums text-slate-100 placeholder-slate-500 placeholder:text-sm focus:outline-none focus:border-sky-500" />
                )}
                <div className="md:w-16 text-center shrink-0">
                  {j == null ? <Badge tone="gray">대기</Badge> : j === "정상" ? <Badge tone="green">정상</Badge> : <Badge tone="red">이탈</Badge>}
                </div>
              </div>
            );
          })}
        </div>
        {tourTried && tourEq.params.some((x) => tourJudge(x, tourVals[x.k]) == null) && (
          <div className="mt-2 bg-red-500/10 border border-red-500/40 rounded px-3 py-2">
            <div className="flex items-center gap-2 text-xs text-red-300"><XCircle size={13} className="shrink-0" /> 미기록 또는 형식 오류 항목이 있습니다 — 전 항목 기록 전 다음 설비 진입 금지</div>
          </div>
        )}
        <div className="flex items-center justify-between mt-3">
          <button onClick={() => { if (tourIdx > 0) { setTourIdx(tourIdx - 1); setTourVals({}); setTourTried(false); } }}
            className={`px-4 py-2.5 rounded-lg border text-sm transition-colors ${tourIdx === 0 ? "border-slate-800 text-slate-600" : "border-slate-600 text-slate-300 hover:bg-slate-800"}`}>
            ← 이전 설비
          </button>
          <button onClick={tourSave}
            className="px-5 py-2.5 rounded-lg bg-sky-600 hover:bg-sky-500 text-white text-sm font-bold transition-colors">
            {tourIdx < EQUIPMENT.length - 1 ? "이 설비 기록 저장 → 다음 설비" : "이 설비 기록 저장 · 순회 완료"}
          </button>
        </div>
      </Panel>
      )}

      {/* 개별 점검 입력 (단일 모드) */}
      {mode === "single" && (
      <Panel title="설비 점검 입력 (개별)" right={<span className="text-xs text-slate-400">관리기준: <span className="text-sky-300">{param.spec}</span> · {param.src}</span>}>
        <div className="grid grid-cols-2 md:grid-cols-5 gap-2 items-end">
          <div className="flex flex-col gap-1 col-span-2 md:col-span-1">
            <span className="text-[10px] text-slate-500">설비</span>
            <select value={eqId} onChange={(e) => { const ne = EQUIPMENT.find((x) => x.id === e.target.value); setEqId(ne.id); setPk(ne.params[0].k); setVal(""); setVisOk(null); }}
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              {EQUIPMENT.map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
          </div>
          <div className="flex flex-col gap-1">
            <span className="text-[10px] text-slate-500">관리항목</span>
            <select value={param.k} onChange={(e) => { setPk(e.target.value); setVal(""); setVisOk(null); }}
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              {eq.params.map((x) => <option key={x.k} value={x.k}>{x.label}</option>)}
            </select>
          </div>
          {isVisual ? (
            <div className="flex gap-2 col-span-2">
              <button onClick={() => setVisOk(true)}
                className={`flex-1 rounded border px-3 py-2 text-sm font-medium transition-colors ${visOk === true ? "bg-emerald-500/20 border-emerald-500/60 text-emerald-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
                이상 없음
              </button>
              <button onClick={() => setVisOk(false)}
                className={`flex-1 rounded border px-3 py-2 text-sm font-medium transition-colors ${visOk === false ? "bg-red-500/20 border-red-500/60 text-red-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
                이상 발견
              </button>
            </div>
          ) : (
            <div className="flex flex-col gap-1 col-span-2">
              <span className="text-[10px] text-slate-500">판독값 {param.unit && `(${param.unit})`}</span>
              <input inputMode="decimal" value={val} onChange={(e) => setVal(e.target.value)}
                placeholder={`판독값 입력 — 기준 ${param.spec}`}
                className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm tabular-nums text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
            </div>
          )}
          <div className="flex items-center gap-2">
            {judge == null ? <Badge tone="gray">대기</Badge> : judge === "정상" ? <Badge tone="green">정상</Badge> : <Badge tone="red">이탈</Badge>}
            <button onClick={save}
              className="flex-1 flex items-center justify-center gap-1.5 rounded px-3 py-2 text-sm font-medium transition-colors bg-sky-600 hover:bg-sky-500 text-white">
              <Plus size={14} /> 기록
            </button>
          </div>
        </div>
        {(inputError || triedErrors.length > 0) && (
          <div className="mt-2 bg-red-500/10 border border-red-500/40 rounded px-3 py-2">
            {[inputError, ...triedErrors].filter(Boolean).map((e, i) => (
              <div key={i} className="flex items-center gap-2 text-xs text-red-300"><XCircle size={13} className="shrink-0" /> {e}</div>
            ))}
          </div>
        )}
      </Panel>
      )}

      {/* 설비 카드 — 기록값 실시간 반영, 항목 클릭 시 입력으로 연결 */}
      <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
        {EQUIPMENT.map((e) => {
          const rs = e.params.map((x) => readings[`${e.id}:${x.k}`]);
          const bad = rs.some((r) => r && !r.ok);
          const done = rs.filter(Boolean).length;
          const st = bad ? "alarm" : done > 0 ? "run" : "idle";
          const m = statusMeta[st];
          return (
            <div key={e.id} className={`bg-slate-900 border ${m.ring} rounded-lg p-4`}>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2 min-w-0">
                  <Cpu size={16} className="text-slate-400 shrink-0" />
                  <span className="text-sm font-medium text-slate-100 truncate">{e.name}</span>
                </div>
                <span className="flex items-center gap-1.5 shrink-0">
                  <span className={`w-2 h-2 rounded-full ${m.dot} ${st === "run" ? "animate-pulse" : ""}`} />
                  <span className={`text-xs font-medium ${m.text}`}>{st === "run" ? "점검중" : m.label}</span>
                </span>
              </div>
              <div className="text-xs text-slate-500 font-mono mt-0.5">{e.id}</div>
              <div className="mt-3">
                <div className="flex justify-between text-xs mb-1">
                  <span className="text-slate-400">금일 점검</span>
                  <span className="tabular-nums text-slate-200">{done} / {e.params.length}</span>
                </div>
                <div className="h-1.5 bg-slate-800 rounded overflow-hidden">
                  <div className={`h-full rounded ${bad ? "bg-red-400" : "bg-emerald-400"}`} style={{ width: `${(done / e.params.length) * 100}%` }} />
                </div>
              </div>
              <div className="grid grid-cols-1 gap-2 mt-3">
                {e.params.map((x, i) => {
                  const r = readings[`${e.id}:${x.k}`];
                  return (
                    <button key={x.k} onClick={() => selectParam(e.id, x.k)}
                      className="flex items-center justify-between bg-slate-800/60 hover:bg-slate-800 rounded px-2.5 py-2 gap-2 text-left transition-colors">
                      <div className="flex items-center gap-2 min-w-0">
                        {i === 0 ? <Thermometer size={13} className="text-amber-400 shrink-0" /> : <Gauge size={13} className="text-sky-400 shrink-0" />}
                        <span className="text-[11px] text-slate-400 truncate">{x.label} ({x.spec})</span>
                      </div>
                      <div className="flex items-center gap-1.5 shrink-0">
                        <span className={`text-xs tabular-nums ${r ? (r.ok ? "text-slate-200" : "text-red-400 font-medium") : "text-slate-500"}`}>{r ? r.v : "—"}</span>
                        {r && <span className="text-[9px] text-slate-500 font-mono">{r.time}</span>}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* 점검 기록 */}
      <Panel title="설비 점검 기록" right={<span className="text-xs text-slate-400">{logs.length}건 · 기록자 자동 저장</span>}>
        {logs.length === 0 ? (
          <p className="text-sm text-slate-500">점검 기록이 없습니다 — 위 [설비 점검 입력]에서 판독값을 기록하세요. 설비 카드의 항목을 클릭해도 바로 입력으로 연결됩니다.</p>
        ) : (
          <div className="overflow-x-auto -mx-4 px-4">
            <table className="w-full text-sm min-w-[620px]">
              <thead>
                <tr className="text-xs text-slate-400 border-b border-slate-800">
                  <th className="text-left py-2 pr-3 font-medium">시각</th>
                  <th className="text-left py-2 pr-3 font-medium">설비</th>
                  <th className="text-left py-2 pr-3 font-medium">관리항목</th>
                  <th className="text-left py-2 pr-3 font-medium">판독값</th>
                  <th className="text-left py-2 pr-3 font-medium">판정</th>
                  <th className="text-left py-2 font-medium">기록자</th>
                </tr>
              </thead>
              <tbody>
                {logs.map((l, i) => (
                  <tr key={i} className="border-b border-slate-800/60 hover:bg-slate-800/30">
                    <td className="py-2.5 pr-3 text-xs font-mono text-slate-400">{l.time}</td>
                    <td className="py-2.5 pr-3 text-slate-100 text-xs">{l.eqName}</td>
                    <td className="py-2.5 pr-3 text-slate-300 text-xs">{l.item}</td>
                    <td className="py-2.5 pr-3 tabular-nums text-slate-200">{l.v}</td>
                    <td className="py-2.5 pr-3"><Badge tone={l.judge === "정상" ? "green" : "red"}>{l.judge}</Badge></td>
                    <td className="py-2.5 text-xs text-slate-400">{l.by}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Panel>

      {/* 알람 이력 */}
      <Panel title="설비 · 공정 알람 이력" right={<Badge tone="red">{alarms.length}건</Badge>}>
        <ul className="flex flex-col divide-y divide-slate-800/60">
          {alarms.length === 0 && <li className="py-1 text-sm text-slate-500">알람 이력이 없습니다 — 관리기준 이탈 기록 시 자동 발생합니다.</li>}
          {alarms.map((a, i) => (
            <li key={i} className="flex items-start gap-3 py-2.5">
              <Badge tone="amber">{a.level}</Badge>
              <span className="text-xs font-mono text-slate-500 w-12 shrink-0 pt-0.5">{a.time}</span>
              <span className="text-xs text-slate-400 w-24 shrink-0 pt-0.5 font-mono">{a.eq}</span>
              <span className="text-sm text-slate-200">{a.msg}</span>
            </li>
          ))}
        </ul>
      </Panel>
    </div>
  );
}

/* ──────────────────────────── Lot 추적 탭 ──────────────────────────── */

const STAGE_META = {
  수입: { icon: ArrowDownToLine, color: "text-violet-400", bg: "bg-violet-500/10 border-violet-500/40", line: "bg-violet-500/40" },
  생산: { icon: FlaskConical, color: "text-sky-400", bg: "bg-sky-500/10 border-sky-500/40", line: "bg-sky-500/40" },
  출하: { icon: Truck, color: "text-emerald-400", bg: "bg-emerald-500/10 border-emerald-500/40", line: "bg-emerald-500/40" },
};

function resultTone(r) {
  if (r.includes("불합격")) return "red";
  if (r.includes("진행중")) return "blue";
  if (r.includes("조건부")) return "amber";
  return "green";
}

function TraceTab() {
  const lotIds = Object.keys(DB.lots);
  const [query, setQuery] = useState("");
  const [selected, setSelected] = useState(lotIds[0]);
  const lot = DB.lots[selected];
  const dec = decodeLot(selected);

  if (!lot) {
    return (
      <Panel title="Lot 추적">
        <p className="text-sm text-slate-500">등록된 Lot이 없습니다 — 작업지시 발행 후 생산·검사 실적이 기록되면 Lot 이력이 자동 생성됩니다.</p>
      </Panel>
    );
  }

  const filtered = lotIds.filter(
    (id) => id.toLowerCase().includes(query.toLowerCase()) || DB.lots[id].itemName.includes(query)
  );

  const stageDone = (s) => {
    if (lot.stage === "출하") return true;
    if (lot.stage === "생산") return s !== "출하";
    return s === "수입";
  };

  return (
    <div className="flex flex-col gap-4">
      <Panel title="Lot 검색">
        <div className="flex items-center gap-2 bg-slate-800 border border-slate-700 rounded px-3 py-2 focus-within:border-sky-500">
          <Search size={15} className="text-slate-500" />
          <input value={query} onChange={(e) => setQuery(e.target.value)}
            placeholder="Lot 번호 또는 품명 검색 (예: CBG0701)"
            className="flex-1 bg-transparent text-sm text-slate-100 placeholder-slate-500 focus:outline-none" />
        </div>
        <div className="flex flex-wrap gap-2 mt-3">
          {filtered.length === 0 && <p className="text-sm text-slate-500">일치하는 Lot이 없습니다. 번호를 다시 확인해 주세요.</p>}
          {filtered.map((id) => (
            <button key={id} onClick={() => setSelected(id)}
              className={`px-3 py-1.5 rounded border text-xs font-mono transition-colors ${
                selected === id ? "bg-sky-500/15 border-sky-500/50 text-sky-300" : "bg-slate-800 border-slate-700 text-slate-300 hover:border-slate-500"
              }`}>
              {id} <span className="text-slate-500 ml-1">{DB.lots[id].itemName}</span>
            </button>
          ))}
        </div>
        <p className="text-[11px] text-slate-500 mt-3">
          Lot 채번 체계: [생산사이트 A외부(OEM)/B Lab/C Pilot/D 양산][년도 A=2025, B=2026…][월 A=1월…G=7월][일 2자리][당일 일련번호] — 예: <span className="font-mono text-slate-400">CBG0701</span> = Pilot · 2026년 7월 1일 · 01호
        </p>
      </Panel>

      <Panel
        title={`Lot 이력 — ${selected}`}
        right={<Badge tone={lot.status.includes("출하완료") ? "green" : lot.status.includes("근접") || lot.status.includes("격리") ? "amber" : "blue"}>{lot.status}</Badge>}
      >
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          <div><div className="text-xs text-slate-500">품목</div><div className="text-sm text-slate-100 mt-0.5">{lot.itemName}</div></div>
          <div><div className="text-xs text-slate-500">수량</div><div className="text-sm text-slate-100 mt-0.5 tabular-nums">{lot.qty}</div></div>
          <div><div className="text-xs text-slate-500">배치번호</div><div className="text-xs text-sky-300 mt-1 font-mono">{lot.wo}</div></div>
          <div><div className="text-xs text-slate-500">현재 단계</div><div className="text-sm text-slate-100 mt-0.5">{lot.stage}</div></div>
        </div>

        {dec && (
          <div className="flex flex-wrap items-center gap-2 bg-slate-800/60 border border-slate-700/60 rounded px-3 py-2 mb-4">
            <span className="text-[11px] text-slate-500">Lot 해석:</span>
            <span className="font-mono text-xs text-sky-300">{selected}</span>
            <ChevronRight size={12} className="text-slate-600" />
            <Badge tone="blue">{dec.site}</Badge>
            <Badge tone="gray">{dec.year}년 {dec.month}월 {String(dec.day).padStart(2, "0")}일</Badge>
            <Badge tone="gray">당일 순번 {String(dec.seq).padStart(2, "0")}</Badge>
            {lot.item === "NBA20-HM01" && (
              <span className="text-[11px] text-slate-400">
                · Grd <span className="font-mono text-violet-300">NBA20-HM01</span> = N(NMP) · B(Boehmite) · A(PVdF/SBR) · 20(TSC 20%) · HM(Hyundai Motor) 시리즈
              </span>
            )}
          </div>
        )}

        {lot.binderLot && (
          <div className="flex items-center gap-2 bg-slate-800/60 border border-slate-700/60 rounded px-3 py-2 mb-4">
            <Beaker size={14} className="text-violet-400 shrink-0" />
            <span className="text-xs text-slate-300">중간 Lot (바인더): <span className="font-mono text-violet-300">{lot.binderLot}</span></span>
          </div>
        )}

/* ──────────────────────────── SPC / 공정능력 (Cpk) 탭 ──────────────────────────── */

function cpkGrade(cpk) {
  if (cpk >= 1.67) return { label: "우수 (≥1.67)", tone: "green" };
  if (cpk >= 1.33) return { label: "적합 (≥1.33)", tone: "blue" };
  if (cpk >= 1.0) return { label: "개선 필요 (<1.33)", tone: "amber" };
  return { label: "부적합 (<1.00)", tone: "red" };
}

function SpcTab() {
  const [item, setItem] = useState("점도");
  const cfg = SPC_CONFIG[item];
  const values = cfg.data.map((d) => d.v);
  const s = values.length >= 2 ? spcStats(values, cfg.lsl, cfg.usl) : null;
  const grade = s ? cpkGrade(s.cpk) : { label: "데이터 없음 (검사 2건 이상 필요)", tone: "gray" };
  const fmt = (v, d = 2) => (v == null ? "—" : v.toFixed(d));

  return (
    <div className="flex flex-col gap-4">
      <div className="flex flex-wrap gap-1.5">
        {Object.keys(SPC_CONFIG).map((k) => (
          <button key={k} onClick={() => setItem(k)}
            className={`px-3 py-1.5 rounded border text-xs transition-colors ${
              item === k ? "bg-sky-500/15 border-sky-500/50 text-sky-300" : "bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500"
            }`}>
            {k} <span className="text-slate-500 ml-1">{SPC_CONFIG[k].spec}</span>
          </button>
        ))}
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
        <Kpi icon={BarChart3} label="평균 (x̄)" value={s ? fmt(s.mean, item === "점도" ? 0 : 2) : "—"} unit={cfg.unit} tone="text-sky-400" />
        <Kpi icon={Activity} label="표준편차 (σ)" value={s ? fmt(s.sd, item === "점도" ? 1 : 3) : "—"} unit={cfg.unit} tone="text-violet-400" />
        <Kpi icon={Gauge} label="Cp" value={s ? fmt(s.cp) : "—"} unit={s && s.cp == null ? "(단측규격)" : ""} tone="text-slate-400" />
        <Kpi icon={Gauge} label="Cpk" value={s ? fmt(s.cpk) : "—"} tone={grade.tone === "green" ? "text-emerald-400" : grade.tone === "blue" ? "text-sky-400" : grade.tone === "amber" ? "text-amber-400" : "text-red-400"} />
        <div className="bg-slate-900 border border-slate-800 rounded-lg p-4 flex flex-col justify-center gap-2">
          <span className="text-xs text-slate-400">공정능력 판정</span>
          <Badge tone={grade.tone}>{grade.label}</Badge>
          <span className="text-[10px] text-slate-500">특별특성(CTQ) 목표 Cpk ≥ 1.67</span>
        </div>
      </div>

      <Panel title={`${item} 관리도 — 최근 ${values.length}배치`} right={<Badge tone="violet">CTQ</Badge>}>
        <ResponsiveContainer width="100%" height={280}>
          <LineChart data={cfg.data}>
            <CartesianGrid stroke="#16283E" strokeDasharray="3 3" />
            <XAxis dataKey="b" stroke="#8AA3C0" fontSize={11} />
            <YAxis stroke="#8AA3C0" fontSize={11} domain={cfg.domain} />
            <Tooltip {...chartTooltip} />
            {cfg.usl != null && <ReferenceLine y={cfg.usl} stroke="#f87171" strokeDasharray="4 4" label={{ value: `USL ${cfg.usl.toLocaleString()}`, fill: "#f87171", fontSize: 10, position: "insideTopRight" }} />}
            {cfg.target != null && <ReferenceLine y={cfg.target} stroke="#8AA3C0" strokeDasharray="2 4" label={{ value: `CL ${cfg.target.toLocaleString()}`, fill: "#C5D5E8", fontSize: 10, position: "insideRight" }} />}
            {cfg.lsl != null && <ReferenceLine y={cfg.lsl} stroke="#f87171" strokeDasharray="4 4" label={{ value: `LSL ${cfg.lsl.toLocaleString()}`, fill: "#f87171", fontSize: 10, position: "insideBottomRight" }} />}
            {s && <ReferenceLine y={s.mean} stroke="#fbbf24" strokeDasharray="6 3" label={{ value: "x̄", fill: "#fbbf24", fontSize: 10, position: "insideLeft" }} />}
            <Line type="monotone" dataKey="v" name={`${item} (${cfg.unit})`} stroke={cfg.color} strokeWidth={2} dot={{ r: 4 }} />
          </LineChart>
        </ResponsiveContainer>
        <p className="text-[11px] text-slate-500 mt-2">
          관리이탈(규격 초과, 연속 상승/하강 경향 등) 발생 시 알람 및 배치 홀드 — 실제 운영 시 점도계·입도분석기 측정값 자동 수집으로 수기 입력을 제거해야 데이터 무결성 요건을 충족합니다.
        </p>
      </Panel>
    </div>
  );
}

/* ──────────────────────────── 수입검사 (IQC) 탭 ──────────────────────────── */

function iqcTone(v) {
  if (v === "합격") return "green";
  if (v === "검사중") return "blue";
  if (v.includes("조건부")) return "amber";
  return "red"; // 불합격 / 반품
}

function IqcTab() {
  const [rows, setRows] = useState(DB.iqc);
  const today = new Date().toISOString().slice(0, 10);
  const [form, setForm] = useState({ recvDate: today, lot: "", name: "NMP", supplier: "", qty: "", visual: "합격", label: "합격", weight: "합격", coa: "합격" });
  const [tried, setTried] = useState(false);
  const [editingInNo, setEditingInNo] = useState(null);

  const done = rows.filter((r) => r.judge !== "검사중");
  const pass = done.filter((r) => r.judge === "합격").length;
  const waiting = rows.length - done.length;

  const overall = (f) => {
    const vals = [f.visual, f.label, f.weight, f.coa];
    if (vals.includes("불합격")) return "반품";
    return "합격";
  };

  const lotOk = form.lot.trim().length >= 2; // 공급사 Lot 표기 그대로 허용 (형식 무관)
  const qtyOk = /^\d+(\.\d+)?\s?(kg|g|t|EA|L|매|장|캔)$/i.test(form.qty.trim());
  const iqcErrors = [];
  if (form.lot.trim() !== "" && !lotOk) iqcErrors.push("원료 Lot 번호가 너무 짧습니다 — 2자 이상 입력");

/* ──────────────────────────── 작업지시서 탭 ──────────────────────────── */

function WoDocTab() {
  const ids = Object.keys(DB.woDocs);
  const [sel, setSel] = useState(ids[0]);
  const [edit, setEdit] = useState(false);
  const [vals, setVals] = useState({});       // 실투입량 입력
  const [lotVals, setLotVals] = useState({}); // 원재료 공급사 Lot 입력
  const [condVals, setCondVals] = useState({});
  const [errs, setErrs] = useState([]);
  const w = DB.woDocs[sel];

  if (!w) {
    return (
      <Panel title="작업지시서">
        <p className="text-sm text-slate-500">조회할 작업지시서가 없습니다 — [작업지시 발행]에서 발행하면 여기서 실적 기록·인쇄가 가능합니다.</p>
      </Panel>
    );
  }

  const num = (v) => { const n = parseFloat(String(v ?? "").replace(/,/g, "")); return isNaN(n) ? null : n; };
  const totalStd = w.inputs.reduce((a, r) => a + (num(r.std) || 0), 0);
  const totalAct = w.inputs.reduce((a, r) => a + (num(r.act) || 0), 0);
  const allDone = w.inputs.every((r) => r.act != null) && w.conds.every((c) => c.act && c.act !== "—");

  const startEdit = () => {
    setVals(Object.fromEntries(w.inputs.map((r, i) => [i, r.act != null ? String(r.act) : ""])));
    setLotVals(Object.fromEntries(w.inputs.map((r, i) => [i, r.lot && r.lot !== "—" ? r.lot : ""])));
    setCondVals(Object.fromEntries(w.conds.map((c, j) => [j, c.act && c.act !== "—" ? c.act : ""])));
    setErrs([]);
    setEdit(true);
  };

  const saveActs = () => {
    const e2 = [];
    const user = window.__QMES_USER__ || "-";
    const newInputs = w.inputs.map((r, i) => {
      const v = String(vals[i] ?? "").trim();
      const lotv = String(lotVals[i] ?? "").trim();
      if (v === "") return { ...r, lot: lotv || r.lot || "" };
      if (!/^\d+(\.\d+)?$/.test(v)) { e2.push(`${r.name}: 실투입량 숫자 형식 오류 — 저장 진입 금지`); return r; }
      const act = parseFloat(v);
      const std = num(r.std) || 0;
      const tol = Math.max(0.1, std * 0.01); // 계량 공차: ±0.1kg 또는 기준량의 1% 중 큰 값
      return { ...r, lot: lotv, act, ok: Math.abs(act - std) <= tol, by: user };
    });
    if (e2.length) { setErrs(e2); return; }
    const newConds = w.conds.map((c, j) => {
      const v = String(condVals[j] ?? "").trim();
      return v === "" ? c : { ...c, act: v, ok: true, by: user };
    });
    const done = newInputs.every((r) => r.act != null) && newConds.every((c) => c.act && c.act !== "—");
    const overTol = newInputs.some((r) => r.ok === false);
    DB.woDocs[sel] = { ...w, inputs: newInputs, conds: newConds, status: done ? "완료" : "실적 기록중" };

    const b = DB.batches.find((x) => x.no === sel);
    if (b) { if (done) { b.status = "완료"; b.done = b.plan; } else if (b.status === "발행") b.status = "진행중"; }

    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const L = DB.lots[sel];

    product: products[0], tank: BOM[products[0]].tanks[0], qty: "230",

  const [issued, setIssued] = useState(DB.batches);
  const [editingWo, setEditingWo] = useState(null);

  const bom = BOM[form.product];
  const qtyNum = parseFloat(form.qty) || 0;
  const ratio = qtyNum > 0 ? qtyNum / bom.baseQty : 0;

  /* 생산일자·생산구분 기반 자동 채번 — [사이트][년][월][일][당일 순번] */
  const dateOk = /^\d{4}-\d{2}-\d{2}$/.test(form.prodDate);
  const nextNo = (() => {
    if (!dateOk) return "—";
    const [yy, mm, dd] = form.prodDate.split("-");
    const yearChar = String.fromCharCode(65 + (parseInt(yy, 10) - 2025));
    const monthChar = String.fromCharCode(64 + parseInt(mm, 10));
    const seq = DB.seqs[`wo-${form.prodDate}-${form.site}`] || 1;
    return `${form.site}${yearChar}${monthChar}${dd}${String(seq).padStart(2, "0")}`;
  })();

  const woErrors = [];
  if (!(qtyNum > 0)) woErrors.push("생산계획량 미입력 또는 0 이하");
  if (qtyNum > bom.baseQty) woErrors.push(`배치 용량 초과 — HSM 최대 배치 ${bom.baseQty}kg`);
  if (!form.worker.trim()) woErrors.push("작업자 미지정 — 지정 전 발행 금지");
  if (!dateOk) woErrors.push("생산일자를 선택하세요");
  const woReady = woErrors.length === 0;

  const issue = () => {
    if (!woReady) return;
    const time = new Date().toLocaleTimeString("ko-KR", { hour12: false });
    const seqKey = `wo-${form.prodDate}-${form.site}`;
    if (!editingWo) DB.seqs[seqKey] = (DB.seqs[seqKey] || 1) + 1;

    const woNo = editingWo || nextNo;
    const batch = { no: woNo, item: form.product, tank: form.tank, plan: qtyNum, done: editingWo ? (DB.batches.find(b=>b.no===editingWo)?.done || 0) : 0, unit: "kg", due: form.prodDate, status: "발행", shift: `${form.shiftType} · ${form.timeRange}`, worker: form.worker.trim(), time };
    DB.batches = editingWo ? DB.batches.map((b)=>b.no===editingWo?batch:b) : [batch, ...DB.batches];

    DB.woDocs[woNo] = {
      item: form.product, procName: bom.procName, tank: form.tank, plan: qtyNum,
      date: form.prodDate, hours: form.hours, timeRange: form.timeRange, shiftType: form.shiftType,
      workers: form.worker.trim(), status: "발행",
      inputs: bom.items.map((it) => ({
        seq: it.seq, name: it.name, lot: "", unit: it.unit, note: it.note,
        std: Number((it.base * ratio).toFixed(3)), act: null, ok: null, by: "",
      })),
      conds: [
        { proc: "HSM 용해", item: "시간", std: "≤ 80 min", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "HSM 용해", item: "온도", std: "< 70 ℃", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "HSM 용해", item: "RPM", std: "3,540±500 rpm", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "HSM 용해", item: "최대압력", std: "≤ 6 bar", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "HSM 용해", item: "유량", std: "< 20 L/min", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "순환", item: "시간", std: "60 min", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "순환", item: "온도", std: "< 70 ℃", method: "PLC 패널", act: "", ok: null, by: "" },
      ],
    };

    DB.lots[woNo] = {
      item: "NBA20-HM01", itemName: form.product,
      qty: `${qtyNum.toLocaleString()} kg (계획)`, wo: woNo, status: "발행 — 생산 대기", stage: "수입",
      materials: [], binderLot: null,
      steps: [{ stage: "수입", name: "작업지시 발행", time, detail: `${bom.procName} · ${form.tank} · 계획 ${qtyNum.toLocaleString()}kg · ${form.prodDate} ${form.timeRange} (${form.shiftType})`, result: "발행", by: window.__QMES_USER__ || "-" }],
      ship: null,
    };
    auditLog("작업지시", editingWo ? "수정" : "발행", woNo, `${form.product} / ${qtyNum}kg / ${form.prodDate}`);
    dbSave();
    setEditingWo(null);
    setIssued([...DB.batches]);

  const editWo = (r) => { const d=DB.woDocs[r.no]||{}; setEditingWo(r.no); setForm({ product:r.item, tank:r.tank, qty:String(r.plan), prodDate:r.due, site:r.no?.[0]||"C", hours:d.hours||"7h", timeRange:d.timeRange||(r.shift?.split(" · ")[1]||""), shiftType:d.shiftType||(r.shift?.split(" · ")[0]||"일반"), worker:r.worker||"" }); window.scrollTo({top:0,behavior:"smooth"}); };
  const deleteWo = (r) => { const reason=askDeleteReason(`작업지시 ${r.no}`); if(reason===null)return; DB.batches=DB.batches.filter(x=>x.no!==r.no); delete DB.woDocs[r.no]; delete DB.lots[r.no]; DB.insp.PQC=DB.insp.PQC.filter(x=>x.lot!==r.no); DB.insp.OQC=DB.insp.OQC.filter(x=>x.lot!==r.no); DB.popEntries=DB.popEntries.filter(x=>x.lot!==r.no); auditLog("작업지시","삭제",r.no,reason); dbSave(); setIssued([...DB.batches]); };

  const inputCls = "bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500";

  return (

  if (s.includes("조건부")) return "amber";
  if (s.includes("요청")) return "blue";
  return "green";
}

/* ──────────────────────────── 현장 입력 (iPad · POP) 탭 ──────────────────────────── */
/* 현장 작업자가 태블릿으로 측정값만 입력하면: 규격 자동판정 → 성적서 자동기록 → Lot 이력 반영 → 불합격 시 자동 홀드·알람 */

/* ──────────────────────────── 현장 입력 (iPad · POP) 탭 ──────────────────────────── */
/* 측정값 입력 즉시: 규격 자동판정 → 성적서 자동기록 → Lot 이력 반영 → 불합격 시 자동 홀드·알람 */

const FIELD_ITEMS = ["점도", "고형분", "입도(Dmax)", "수분", "접착력", "절연저항", "Gauss(필터)", "외관", "전해액 안정성"];

function autoJudge(check, raw) {
  const spec = QC_ITEMS[check];
  const num = parseFloat(String(raw).replace(/[^0-9.\-]/g, ""));
  if (isNaN(num)) return null;
  if (spec.lo != null && num < spec.lo) return "불합격";
  if (spec.hi != null && num > spec.hi) return "불합격";
  return "합격";
}

function FieldInputTab() {
  const [lot, setLot] = useState("");
  const [check, setCheck] = useState("점도");
  const [value, setValue] = useState("");
  const [visualOk, setVisualOk] = useState(null);
  const [entries, setEntries] = useState(DB.popEntries);
  const [seq, setSeq] = useState(DB.seqs.POP || 1);
  const [tried, setTried] = useState(false);
  const [editingPop, setEditingPop] = useState(null);

  const spec = QC_ITEMS[check];
  const isVisual = spec.lo == null && spec.hi == null;
  const trimmed = value.trim();
  const lotFormatOk = /^[A-D][A-Z][A-L]\d{4}$/.test(lot.trim());

  let inputError = null;
  if (!isVisual && trimmed !== "") {
    if (!/^\d+(\.\d+)?$/.test(trimmed)) {
      inputError = "숫자만 입력할 수 있습니다 — 문자·기호 포함 시 저장이 금지됩니다";
    } else {
      const num = parseFloat(trimmed);
      const lo = spec.lo, hi = spec.hi;
      const span = lo != null && hi != null ? hi - lo : (hi ?? lo);
      const min = lo != null ? Math.max(0, lo - span) : 0;
      const max = hi != null ? hi + span * 2 : lo * 10;
      if (!(num > min && num < max)) {
        inputError = `입력값 ${trimmed}이(가) 통상 측정 범위를 벗어났습니다 — 오타(자릿수) 확인 후 재입력 전까지 진입 금지`;
      }
    }
  }

  const judged = isVisual
    ? (visualOk == null ? null : visualOk ? "합격" : "불합격")
    : (trimmed === "" || inputError ? null : autoJudge(check, trimmed));

  const triedErrors = [];
  if (tried && !lotFormatOk) triedErrors.push(lot.trim() === "" ? "배치 Lot 번호를 입력하세요 (예: CBG1001)" : "Lot 형식 오류 — 예: CBG1001");
  if (tried && !inputError && judged == null) triedErrors.push(isVisual ? "적합 / 부적합 중 하나를 선택하세요" : "측정값을 입력하세요");

  const save = () => {
    if (judged == null || inputError || !lotFormatOk) { setTried(true); return; }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const recId = editingPop || `POP-${String(seq).padStart(4, "0")}`;
    const lotNo = lot.trim();
    const display = isVisual ? (visualOk ? "적합" : "부적합") : trimmed;
    /* 공정검사 성적서 자동 기록 */
    const pqcRec = { id: recId, time, lot: lotNo, check, value: display, judge: judged, note: "현장 입력", inspector: window.__QMES_USER__ || "-" };
    DB.insp.PQC = editingPop ? DB.insp.PQC.map((r)=>r.id===recId?pqcRec:r) : [pqcRec, ...DB.insp.PQC];
    if (!editingPop) DB.seqs.POP = seq + 1;
    /* Lot 이력 자동 반영 */
    const L = DB.lots[lotNo];
    if (L) {
      L.steps = [...L.steps, { stage: "생산", name: `현장 검사 — ${check}`, time, detail: `측정값 ${display} · 규격 ${spec.spec}`, result: judged, by: window.__QMES_USER__ || "-" }];
      L.stage = "생산";
      if (judged === "불합격") L.status = "홀드 — 부적합 발생 (게이트 차단)";
      else if (!L.status.includes("홀드")) L.status = "생산중";
    }
    /* 불합격 → 자동 홀드 */
    if (judged === "불합격") {
      DB.holds = [{ id: `HLD-${String(Date.now()).slice(-6)}`, target: lotNo, type: "제품 Lot", gate: "공정 게이트", reason: `${check} ${display} — 규격(${spec.spec}) 부적합 (현장 입력)`, since: time, cond: "재검사 합격 + 품질부장 승인", status: "차단중", ncr: "-" }, ...DB.holds];
    }
    const entry = {
      id: recId, time, lot: lotNo, check, value: display, judge: judged,
      auto: judged === "합격"
        ? [`규격(${spec.spec}) 자동판정 → 합격`, `${recId} 공정검사 성적서 자동 기록`, L ? `Lot ${lotNo} 이력 반영 완료` : `Lot ${lotNo} 미등록 — 작업지시 발행 시 이력 연결`]
        : [`규격(${spec.spec}) 자동판정 → 불합격`, `${recId} 성적서 자동 기록`, `자동 홀드 생성 — 공정 게이트 차단`, `품질부 알람 · 격리 Rack 지정 대기`, `NCR 발행 대기 (8D 착수)`],
    };
    const nextEntries = editingPop ? entries.map((e)=>e.id===editingPop?entry:e) : [entry, ...entries];
    setEntries(nextEntries);
    DB.popEntries = nextEntries;
    auditLog("현장입력", editingPop ? "수정" : "등록", recId, `${lotNo} / ${check} / ${display} / ${judged}`);
    dbSave();
    if (!editingPop) setSeq(seq + 1);
    setEditingPop(null);
    setValue("");
    setVisualOk(null);
    setTried(false);
  };

  const editPop = (e) => { setEditingPop(e.id); setLot(e.lot); setCheck(e.check); const numeric=QC_ITEMS[e.check]?.lo!=null||QC_ITEMS[e.check]?.hi!=null; if(numeric){setValue(String(e.value));setVisualOk(null);}else{setValue("");setVisualOk(e.judge==="합격");} window.scrollTo({top:0,behavior:"smooth"}); };
  const deletePop = (e) => { const reason=askDeleteReason(`현장 입력 ${e.id}`); if(reason===null)return; const next=entries.filter(x=>x.id!==e.id); setEntries(next); DB.popEntries=next; DB.insp.PQC=DB.insp.PQC.filter(x=>x.id!==e.id); auditLog("현장입력","삭제",e.id,reason); dbSave(); };

  const bigBtn = (active) =>
    `rounded-xl border px-4 py-3.5 text-base font-medium transition-colors ${
      active ? "bg-sky-500/20 border-sky-500/60 text-sky-200" : "bg-slate-800 border-slate-700 text-slate-300 hover:border-slate-500"
    }`;

  return (
    <div className="flex flex-col gap-4 max-w-3xl mx-auto w-full">
      <div className="flex items-center gap-2.5 bg-slate-900 border border-slate-800 rounded-lg px-4 py-3">
        <Tablet size={18} className="text-sky-400" />
        <div>
          <div className="text-sm font-semibold text-slate-100">현장 검사 입력 (POP)</div>
          <div className="text-[11px] text-slate-500">측정값 입력 즉시 자동 판정·기록됩니다 — 판정을 직접 고를 수 없습니다 (데이터 무결성)</div>
        </div>
      </div>

      <Panel title="1. 배치 (Lot) 입력" right={<span className="text-xs text-slate-400">채번: 사이트·년·월·일·순번 (예: CBG1001)</span>}>
        <input value={lot} onChange={(e) => setLot(e.target.value.toUpperCase())}
          placeholder="배치 Lot 번호 입력 (바코드 스캔 대체)"
          className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3.5 text-lg text-center font-mono text-slate-100 placeholder-slate-600 placeholder:text-sm focus:outline-none focus:border-sky-500" />
        {lot !== "" && !lotFormatOk && (
          <p className="text-xs text-red-300 mt-2">Lot 형식 오류 — 형식 불일치 시 저장(다음 단계) 진입 금지</p>
        )}
      </Panel>

      <Panel title="2. 검사 항목" right={<span className="text-xs text-slate-400">규격: <span className="text-sky-300">{spec.spec}</span> · {spec.method}</span>}>
        <div className="grid grid-cols-3 gap-2">
          {FIELD_ITEMS.map((k) => (
            <button key={k} onClick={() => { setCheck(k); setValue(""); setVisualOk(null); }} className={bigBtn(check === k)}>{k}</button>
          ))}
        </div>
      </Panel>

      <Panel title="3. 측정값 입력">
        {isVisual ? (
          <div className="grid grid-cols-2 gap-2">
            <button onClick={() => setVisualOk(true)}
              className={`rounded-xl border px-4 py-6 text-lg font-bold transition-colors ${visualOk === true ? "bg-emerald-500/20 border-emerald-500/60 text-emerald-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
              적합 (이상 없음)
            </button>
            <button onClick={() => setVisualOk(false)}
              className={`rounded-xl border px-4 py-6 text-lg font-bold transition-colors ${visualOk === false ? "bg-red-500/20 border-red-500/60 text-red-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
              부적합 발견
            </button>
          </div>
        ) : (
          <input
            inputMode="decimal" value={value} onChange={(e) => setValue(e.target.value)}
            placeholder={`측정값 입력 (${spec.spec})`}
            className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-4 text-2xl text-center tabular-nums text-slate-100 placeholder-slate-600 placeholder:text-base focus:outline-none focus:border-sky-500"
          />
        )}

        {(inputError || triedErrors.length > 0) && (
          <div className="mt-3 bg-red-500/10 border border-red-500/40 rounded-lg px-3 py-2.5">
            {[inputError, ...triedErrors].filter(Boolean).map((e, i) => (
              <div key={i} className="flex items-center gap-2 text-xs text-red-300"><XCircle size={14} className="shrink-0" /> {e}</div>
            ))}
          </div>
        )}

        <div className="flex items-center justify-between mt-3">
          <div className="flex items-center gap-2">
            <span className="text-xs text-slate-500">자동 판정:</span>
            {inputError ? <Badge tone="red">진입 금지 — 재입력 필요</Badge>
              : judged == null ? <Badge tone="gray">입력 대기</Badge>
              : judged === "합격" ? <Badge tone="green">합격</Badge>
              : <Badge tone="red">불합격 — 저장 시 자동 홀드</Badge>}
          </div>
          <button onClick={save}
            className={`rounded-xl px-6 py-3 text-base font-bold transition-colors text-white ${judged === "불합격" ? "bg-red-600 hover:bg-red-500" : judged === "합격" ? "bg-emerald-600 hover:bg-emerald-500" : "bg-sky-600 hover:bg-sky-500"}`}>
            {editingPop ? "수정 저장 (자동 처리)" : "저장 (자동 처리)"}
          </button>
        </div>
      </Panel>

      {entries.length > 0 && (
        <Panel title="입력 이력 · 자동 처리 내역" right={<span className="text-xs text-slate-400">{entries.length}건</span>}>
          <div className="flex flex-col divide-y divide-slate-800/60">
            {entries.map((e) => (
              <div key={e.id} className="py-3">
                <div className="flex flex-wrap items-center gap-2">
                  <span className="font-mono text-xs text-sky-300">{e.id}</span>
                  <span className="text-xs font-mono text-slate-500">{e.time}</span>
                  <span className="font-mono text-xs text-slate-300">{e.lot}</span>
                  <span className="text-sm text-slate-100">{e.check}</span>
                  <span className="text-sm tabular-nums text-slate-200">{e.value}</span>
                  <Badge tone={e.judge === "합격" ? "green" : "red"}>{e.judge}</Badge>
                  <span className="ml-auto whitespace-nowrap">
                    <button onClick={() => editPop(e)} className="px-2 py-1 mr-1 rounded border border-sky-500/40 text-sky-300 text-xs hover:bg-sky-500/10">수정</button>
                    <button onClick={() => deletePop(e)} className="px-2 py-1 rounded border border-red-500/40 text-red-300 text-xs hover:bg-red-500/10">삭제</button>
                  </span>
                </div>
                <ul className="mt-1.5 flex flex-col gap-0.5">
                  {e.auto.map((a, i) => (
                    <li key={i} className={`text-[11px] flex items-center gap-1.5 ${e.judge === "합격" ? "text-slate-400" : i === 0 ? "text-slate-400" : "text-amber-300/80"}`}>
                      <ChevronRight size={10} className="shrink-0" /> {a}
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </Panel>
      )}
    </div>
  );
}

/* ──────────────────────────── 고객불만 관리 (GQMS) 탭 ──────────────────────────── */

function ComplaintTab() {
  const [items, setItems] = useState(DB.complaints);
  const [form, setForm] = useState({ customer: "K배터리솔루션", channel: "GQMS 시정조치 요구", lot: "", item: "", grade: "경미" });
  const [seq, setSeq] = useState(DB.seqs.cc || 1);
  const [tried, setTried] = useState(false);

  const open = items.filter((c) => c.status !== "완료").length;
  const lotOk = form.lot.trim() === "" || /^[A-D][A-Z][A-L]\d{4}$/.test(form.lot.trim());
  const ccErrors = [];
  if (!lotOk) ccErrors.push("Lot 형식 오류 — 채번 체계(예: CBG1001)에 맞게 입력하거나 비워두세요");
  if (tried && form.item.trim() === "") ccErrors.push("불만 내용을 입력하세요 — 접수 진입 금지");
  const ccReady = lotOk && form.item.trim() !== "";

  const receive = () => {
    if (!ccReady) { setTried(true); return; }
    const now = new Date();
    const t = `${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")} ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const ni = [
      {
        no: `CC-${String(seq).padStart(3, "0")}`, date: new Date().toLocaleDateString("ko-KR"), customer: form.customer, channel: form.channel,
        lot: form.lot.trim() || "-", item: form.item.trim(), grade: form.grade, status: "진행중",
        flow: [`${t} 접수 — ${form.grade === "중대" ? "4시간" : "24시간"} 내 초동 회신 기한 · 담당 ${window.__QMES_USER__ || "미지정"}`, "-", "-", "-", "-", "-"],
      },
      ...items,
    ];
    setItems(ni);
    DB.complaints = ni;
    DB.seqs.cc = seq + 1;
    dbSave();
    setSeq(seq + 1);
    setForm({ ...form, lot: "", item: "" });
    setTried(false);
  };

  return (
    <div className="flex flex-col gap-4">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        <Kpi icon={MessageSquareWarning} label="당월 접수" value={items.length} unit="건" tone="text-amber-400" />
        <Kpi icon={Activity} label="진행중 (Open)" value={open} unit="건" tone="text-sky-400" />
        <Kpi icon={CheckCircle2} label="완료 (Close)" value={items.length - open} unit="건" tone="text-emerald-400" />
        <Kpi icon={PhoneCall} label="초동 회신 준수율" value="—" unit="%" tone="text-violet-400" />
      </div>

      <Panel title="고객불만 접수 (GQMS · 품질 협의체 · 유선)" right={<span className="text-xs text-slate-400">중대 4시간 / 경미 24시간 내 초동 회신</span>}>
        <div className="grid grid-cols-2 md:grid-cols-6 gap-2 items-end">
          <div className="flex flex-col gap-1">
            <span className="text-[10px] text-slate-500">고객사</span>
            <select value={form.customer} onChange={(e) => setForm({ ...form, customer: e.target.value })}
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              <option>K배터리솔루션</option><option>기타 고객사</option>
            </select>
          </div>
          <div className="flex flex-col gap-1">
            <span className="text-[10px] text-slate-500">접수 채널</span>
            <select value={form.channel} onChange={(e) => setForm({ ...form, channel: e.target.value })}
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              <option>GQMS 시정조치 요구</option><option>품질 협의체</option><option>유선/메일</option>
            </select>
          </div>
          <div className="flex flex-col gap-1">
            <span className="text-[10px] text-slate-500">대상 Lot (선택)</span>
            <input value={form.lot} onChange={(e) => setForm({ ...form, lot: e.target.value.toUpperCase() })} placeholder="예: CBG1001"
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm font-mono text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
          </div>
          <div className="flex flex-col gap-1 col-span-2">
            <span className="text-[10px] text-slate-500">불만 내용</span>
            <input value={form.item} onChange={(e) => setForm({ ...form, item: e.target.value })} placeholder="불만·결함 내용 입력"
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
          </div>
          <div className="flex gap-2">
            <select value={form.grade} onChange={(e) => setForm({ ...form, grade: e.target.value })}
              className="flex-1 bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              <option>경미</option><option>중대</option>
            </select>
            <button onClick={receive}
              className="flex items-center gap-1 rounded px-3 py-2 text-sm font-medium transition-colors bg-sky-600 hover:bg-sky-500 text-white">
              <Plus size={14} /> 접수
            </button>
          </div>
        </div>
        {ccErrors.length > 0 && (
          <div className="mt-2 bg-red-500/10 border border-red-500/40 rounded px-3 py-2">
            {ccErrors.map((e, i) => <div key={i} className="text-[11px] text-red-300">· {e}</div>)}
          </div>
        )}
      </Panel>

      {items.length === 0 && (
        <Panel title="접수 이력">
          <p className="text-sm text-slate-500">접수된 고객불만이 없습니다 — 접수 시 6단계 처리 Flow(접수 → 초동조치 → 원인분석 → 시정조치 → 재발방지 → 고객승인·Close)가 자동 생성됩니다.</p>
        </Panel>
      )}

      {items.map((c) => {
        const doneCount = c.flow.filter((f) => f !== "-").length;
        return (
          <Panel key={c.no}
            title={`${c.no} — ${c.item}`}
            right={<div className="flex items-center gap-2"><Badge tone={c.grade === "중대" ? "red" : "amber"}>{c.grade}</Badge><Badge tone={c.status === "완료" ? "green" : "blue"}>{c.status}</Badge></div>}
          >
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              <div><div className="text-xs text-slate-500">접수일</div><div className="text-sm text-slate-100 mt-0.5 tabular-nums">{c.date}</div></div>
              <div><div className="text-xs text-slate-500">고객사 / 채널</div><div className="text-sm text-slate-100 mt-0.5">{c.customer} <span className="text-xs text-slate-500">· {c.channel}</span></div></div>
              <div><div className="text-xs text-slate-500">대상 Lot</div><div className="text-xs text-sky-300 font-mono mt-1">{c.lot}</div></div>
              <div><div className="text-xs text-slate-500">진행</div><div className="text-sm text-slate-100 mt-0.5 tabular-nums">{doneCount} / 6 단계</div></div>
            </div>

            <div className="flex gap-1 mb-3">
              {COMPLAINT_FLOW_LABELS.map((l, i) => (
                <div key={i} className="flex-1 min-w-0">
                  <div className={`h-1.5 rounded ${c.flow[i] !== "-" ? (c.status === "완료" ? "bg-emerald-400" : "bg-sky-400") : "bg-slate-800"}`} />
                </div>
              ))}
            </div>

            <div className="flex flex-col gap-2">
              {COMPLAINT_FLOW_LABELS.map((l, i) => (
                <div key={i} className="flex gap-3 items-start">
                  <span className={`text-[11px] w-44 shrink-0 pt-0.5 ${c.flow[i] !== "-" ? "text-slate-300" : "text-slate-600"}`}>{l}</span>
                  <span className={`text-xs leading-relaxed ${c.flow[i] !== "-" ? "text-slate-200" : "text-slate-600"}`}>{c.flow[i]}</span>
                </div>
              ))}
            </div>
          </Panel>
        );
      })}
      <p className="text-[11px] text-slate-500">
        중대 불만은 부적합(8D)·CAR와 연계 처리하며, 재발방지는 인터락 게이트에 반영합니다. GQMS 시정조치는 고객 유효성 승인 후 Close 처리.
      </p>
    </div>
  );
}
