function spcStats(values, lsl, usl) {
  const n = values.length;
  const mean = values.reduce((a, b) => a + b, 0) / n;
  const sd = Math.sqrt(values.reduce((a, b) => a + (b - mean) ** 2, 0) / (n - 1));
  const cp = lsl != null && usl != null ? (usl - lsl) / (6 * sd) : null;
  const cpu = usl != null ? (usl - mean) / (3 * sd) : null;
  const cpl = lsl != null ? (mean - lsl) / (3 * sd) : null;
  const cpk = Math.min(...[cpu, cpl].filter((v) => v != null));
  return { mean, sd, cp, cpk, n };
}

/* ──────────────────────────── Lot 채번 체계 (Grd 및 Lot 내역 설명자료 기준) ──────────────────────────── */
/* Lot No. [사이트][년도][월][일 2자리][일련번호 2자리]  예: CBG0701 = Pilot · 2026년 7월 01일 · 01호 */

const SITE_MAP = { A: "외부사이트(OEM)", B: "Lab", C: "Pilot", D: "양산" };

function decodeLot(lot) {
  const m = /^([A-D])([A-Z])([A-L])(\d{2})(\d{2})$/.exec(lot);
  if (!m) return null;
  return {
    site: SITE_MAP[m[1]],
    year: 2025 + (m[2].charCodeAt(0) - 65),
    month: m[3].charCodeAt(0) - 64,
    day: +m[4],
    seq: +m[5],
  };
}

function InspectionTab({ docName, itemKeys, initial, lotOptions, idPrefix, idStart, notice }) {
  const [records, setRecords] = useState(initial);
  const [form, setForm] = useState({ lot: lotOptions[0], check: itemKeys[0], value: "", judge: "합격" });
  const [nextId, setNextId] = useState(idStart);

  const pass = records.filter((r) => r.judge === "합격").length;
  const rate = ((pass / records.length) * 100).toFixed(1);
  const spec = QC_ITEMS[form.check];
  const isNumericItem = spec.lo != null || spec.hi != null;
  const trimmedVal = form.value.trim();
  const inputError = isNumericItem && trimmedVal !== "" && !/^\d+(\.\d+)?$/.test(trimmedVal.replace(/,/g, ""))
    ? "숫자 형식이 아닙니다 — 오입력 상태에서는 등록(다음 단계 진입)이 금지됩니다"
    : null;
  const autoJ = isNumericItem && trimmedVal !== "" && !inputError ? autoJudge(form.check, trimmedVal) : null;

  const addRecord = () => {
    if (!trimmedVal || inputError) return;
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    setRecords([
      { id: `${idPrefix}${nextId}`, time, lot: form.lot, check: form.check, value: form.value, judge: isNumericItem ? autoJ : form.judge, note: `${spec.stage}`, inspector: "현재 사용자" },
      ...records,
    ]);
    setNextId(nextId + 1);
    setForm({ ...form, value: "" });
  };

  return (
    <div className="flex flex-col gap-4">
      <div className="grid grid-cols-3 gap-3">
        <Kpi icon={ClipboardCheck} label="금일 검사 건수" value={records.length} unit="건" tone="text-sky-400" />
        <Kpi icon={CheckCircle2} label="합격률" value={rate} unit="%" tone="text-emerald-400" />
        <Kpi icon={XCircle} label="부적합" value={records.length - pass} unit="건" tone="text-red-400" />
      </div>

      {notice && (
        <div className="flex items-center gap-2.5 bg-sky-500/10 border border-sky-500/30 rounded-lg px-4 py-3">
          <ClipboardCheck size={15} className="text-sky-400 shrink-0" />
          <p className="text-sm text-sky-200">{notice}</p>
        </div>
      )}

      <Panel title="검사 결과 등록" right={spec && <span className="text-xs text-slate-400">규격: <span className="text-sky-300">{spec.spec}</span> · {spec.method} · {spec.type !== "-" && <Badge tone="violet">{spec.type}</Badge>}</span>}>
        <div className="grid md:grid-cols-5 gap-2">
          <select value={form.lot} onChange={(e) => setForm({ ...form, lot: e.target.value })}
            className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
            {lotOptions.map((l) => <option key={l}>{l}</option>)}
          </select>
          <select value={form.check} onChange={(e) => setForm({ ...form, check: e.target.value })}
            className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">

  if (r.includes("불합격")) return "red";

/* ──────────────────────────── SPC / 공정능력 (Cpk) 탭 ──────────────────────────── */

function cpkGrade(cpk) {
  if (cpk >= 1.67) return { label: "우수 (≥1.67)", tone: "green" };
  if (cpk >= 1.33) return { label: "적합 (≥1.33)", tone: "blue" };
  if (cpk >= 1.0) return { label: "개선 필요 (<1.33)", tone: "amber" };
  return { label: "부적합 (<1.00)", tone: "red" };
}

function SpcTab() {
  const [item, setItem] = useState("점도");
  const cfg = SPC_CONFIG[item];
  const values = cfg.data.map((d) => d.v);
  const s = spcStats(values, cfg.lsl, cfg.usl);
  const grade = cpkGrade(s.cpk);
  const fmt = (v, d = 2) => (v == null ? "—" : v.toFixed(d));

  return (
    <div className="flex flex-col gap-4">
      <div className="flex flex-wrap gap-1.5">
        {Object.keys(SPC_CONFIG).map((k) => (
          <button key={k} onClick={() => setItem(k)}
            className={`px-3 py-1.5 rounded border text-xs transition-colors ${
              item === k ? "bg-sky-500/15 border-sky-500/50 text-sky-300" : "bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500"
            }`}>
            {k} <span className="text-slate-500 ml-1">{SPC_CONFIG[k].spec}</span>
          </button>
        ))}
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
        <Kpi icon={BarChart3} label="평균 (x̄)" value={fmt(s.mean, item === "점도" ? 0 : 2)} unit={cfg.unit} tone="text-sky-400" />
        <Kpi icon={Activity} label="표준편차 (σ)" value={fmt(s.sd, item === "점도" ? 1 : 3)} unit={cfg.unit} tone="text-violet-400" />
        <Kpi icon={Gauge} label="Cp" value={fmt(s.cp)} unit={s.cp == null ? "(단측규격)" : ""} tone="text-slate-400" />
        <Kpi icon={Gauge} label="Cpk" value={fmt(s.cpk)} tone={grade.tone === "green" ? "text-emerald-400" : grade.tone === "blue" ? "text-sky-400" : grade.tone === "amber" ? "text-amber-400" : "text-red-400"} />
        <div className="bg-slate-900 border border-slate-800 rounded-lg p-4 flex flex-col justify-center gap-2">
          <span className="text-xs text-slate-400">공정능력 판정</span>
          <Badge tone={grade.tone}>{grade.label}</Badge>
          <span className="text-[10px] text-slate-500">특별특성(CTQ) 목표 Cpk ≥ 1.67</span>
        </div>
      </div>

      <Panel title={`${item} 관리도 — 최근 ${s.n}배치`} right={<Badge tone="violet">CTQ</Badge>}>
        <ResponsiveContainer width="100%" height={280}>
          <LineChart data={cfg.data}>
            <CartesianGrid stroke="#1e293b" strokeDasharray="3 3" />
            <XAxis dataKey="b" stroke="#64748b" fontSize={11} />
            <YAxis stroke="#64748b" fontSize={11} domain={cfg.domain} />
            <Tooltip {...chartTooltip} />
            {cfg.usl != null && <ReferenceLine y={cfg.usl} stroke="#f87171" strokeDasharray="4 4" label={{ value: `USL ${cfg.usl.toLocaleString()}`, fill: "#f87171", fontSize: 10, position: "insideTopRight" }} />}
            {cfg.target != null && <ReferenceLine y={cfg.target} stroke="#64748b" strokeDasharray="2 4" label={{ value: `CL ${cfg.target.toLocaleString()}`, fill: "#94a3b8", fontSize: 10, position: "insideRight" }} />}
            {cfg.lsl != null && <ReferenceLine y={cfg.lsl} stroke="#f87171" strokeDasharray="4 4" label={{ value: `LSL ${cfg.lsl.toLocaleString()}`, fill: "#f87171", fontSize: 10, position: "insideBottomRight" }} />}
            <ReferenceLine y={s.mean} stroke="#fbbf24" strokeDasharray="6 3" label={{ value: "x̄", fill: "#fbbf24", fontSize: 10, position: "insideLeft" }} />
            <Line type="monotone" dataKey="v" name={`${item} (${cfg.unit})`} stroke={cfg.color} strokeWidth={2} dot={{ r: 4 }} />
          </LineChart>
        </ResponsiveContainer>
        <p className="text-[11px] text-slate-500 mt-2">
          관리이탈(규격 초과, 연속 상승/하강 경향 등) 발생 시 알람 및 배치 홀드 — 실제 운영 시 점도계·입도분석기 측정값 자동 수집으로 수기 입력을 제거해야 데이터 무결성 요건을 충족합니다.
        </p>
      </Panel>
    </div>
  );
}

/* ──────────────────────────── 수입검사 (IQC) 탭 ──────────────────────────── */

function iqcTone(v) {
  if (v === "합격") return "green";
  if (v === "검사중") return "blue";
  if (v.includes("조건부")) return "amber";
  return "red"; // 불합격 / 반품
}

  const [rows, setRows] = useState(IQC_LOTS);
  const [form, setForm] = useState({ name: "NMP", lot: "", qty: "", visual: "합격", label: "합격", weight: "합격", coa: "합격" });

  const done = rows.filter((r) => r.judge !== "검사중");
  const pass = done.filter((r) => r.judge === "합격").length;
  const waiting = rows.length - done.length;

  const overall = (f) => {
    const vals = [f.visual, f.label, f.weight, f.coa];
    if (vals.includes("불합격")) return "반품";
    if (vals.includes("조건부")) return "조건부 합격";
    return "합격";

  if (s.includes("요청")) return "blue";
  return "green";
}

/* 현장 작업자가 태블릿으로 측정값만 입력하면: 규격 자동판정 → 성적서 자동기록 → Lot 이력 반영 → 불합격 시 자동 홀드·알람 */

const FIELD_LOTS = ["CBG0803", "CBG0802", "CBG0801"];
const FIELD_ITEMS = ["점도", "고형분", "입도(Dmax)", "수분", "접착력", "절연저항", "Gauss(필터)", "외관", "전해액 안정성"];

function autoJudge(check, raw) {
  const spec = QC_ITEMS[check];
  const num = parseFloat(String(raw).replace(/[^0-9.\-]/g, ""));
  if (isNaN(num)) return null;
  if (spec.lo != null && num < spec.lo) return "불합격";
  if (spec.hi != null && num > spec.hi) return "불합격";
  return "합격";
}

function FieldInputTab() {
  const [lot, setLot] = useState(FIELD_LOTS[0]);
  const [check, setCheck] = useState("점도");
  const [value, setValue] = useState("");
  const [visualOk, setVisualOk] = useState(null);
  const [entries, setEntries] = useState([]);
  const [seq, setSeq] = useState(3122);
  const [holdSeq, setHoldSeq] = useState(10);

  const spec = QC_ITEMS[check];
  const isVisual = spec.lo == null && spec.hi == null; // 외관·전해액 안정성 등 육안 항목
  const trimmed = value.trim();

  /* 입력 검증 — 오타·형식 오류 시 저장(다음 단계) 진입 금지 */
  let inputError = null;
  if (!isVisual && trimmed !== "") {
    if (!/^\d+(\.\d+)?$/.test(trimmed)) {
      inputError = "숫자만 입력할 수 있습니다 — 문자·기호 포함 시 저장이 금지됩니다";
    } else {
      const num = parseFloat(trimmed);
      const lo = spec.lo, hi = spec.hi;
      const span = lo != null && hi != null ? hi - lo : (hi ?? lo);
      const min = lo != null ? Math.max(0, lo - span) : 0;
      const max = hi != null ? hi + span * 2 : lo * 10;
      if (!(num > min && num < max)) {
        inputError = `입력값 ${trimmed}이(가) 통상 측정 범위를 벗어났습니다 — 오타(자릿수) 확인 후 재입력 전까지 진입 금지`;
      }
    }
  }

  const judged = isVisual
    ? (visualOk == null ? null : visualOk ? "합격" : "불합격")
    : (trimmed === "" || inputError ? null : autoJudge(check, trimmed));

  const save = () => {
    if (judged == null || inputError) return;
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const recId = `PQC-${seq}`;
    const entry = {
      id: recId, time, lot, check,
      value: isVisual ? (visualOk ? "적합" : "부적합") : `${value} ${spec.unitLabel || ""}`.trim(),
      judge: judged,
      auto: judged === "합격"
        ? [`규격(${spec.spec}) 자동판정 → 합격`, `${recId} 성적서 자동 기록`, `Lot ${lot} 이력 반영`]
        : [`규격(${spec.spec}) 자동판정 → 불합격`, `${recId} 성적서 자동 기록`, `자동 홀드 HLD-2607-${holdSeq} 생성 — 게이트 차단`, `품질팀 알람 발송 · 격리 Rack 지정 대기`, `NCR 발행 대기 (8D 착수)`],
    };
    setEntries([entry, ...entries]);
    setSeq(seq + 1);
    if (judged === "불합격") setHoldSeq(holdSeq + 1);
    setValue("");
    setVisualOk(null);
  };

  const bigBtn = (active) =>
    `rounded-xl border px-4 py-3.5 text-base font-medium transition-colors ${
      active ? "bg-sky-500/20 border-sky-500/60 text-sky-200" : "bg-slate-800 border-slate-700 text-slate-300 hover:border-slate-500"
    }`;

  return (
    <div className="flex flex-col gap-4 max-w-3xl mx-auto w-full">
      <div className="flex items-center gap-2.5 bg-slate-900 border border-slate-800 rounded-lg px-4 py-3">
        <Tablet size={18} className="text-sky-400" />
        <div>
          <div className="text-sm font-semibold text-slate-100">현장 검사 입력 (POP)</div>
          <div className="text-[11px] text-slate-500">측정값 입력 즉시 자동 판정·기록됩니다 — 판정을 직접 고를 수 없습니다 (데이터 무결성)</div>
        </div>
      </div>

      {/* 1. 배치 선택 */}
      <Panel title="1. 배치 (Lot) 선택">
        <div className="grid grid-cols-3 gap-2">
          {FIELD_LOTS.map((l) => (
            <button key={l} onClick={() => setLot(l)} className={`${bigBtn(lot === l)} font-mono`}>{l}</button>
          ))}
        </div>
      </Panel>

      {/* 2. 검사 항목 */}
      <Panel title="2. 검사 항목" right={<span className="text-xs text-slate-400">규격: <span className="text-sky-300">{spec.spec}</span> · {spec.method}</span>}>
        <div className="grid grid-cols-3 gap-2">
          {FIELD_ITEMS.map((k) => (
            <button key={k} onClick={() => { setCheck(k); setValue(""); setVisualOk(null); }} className={bigBtn(check === k)}>{k}</button>
          ))}
        </div>
      </Panel>

      {/* 3. 측정값 입력 → 자동 판정 */}
      <Panel title="3. 측정값 입력">
        {isVisual ? (
          <div className="grid grid-cols-2 gap-2">
            <button onClick={() => setVisualOk(true)}
              className={`rounded-xl border px-4 py-6 text-lg font-bold transition-colors ${visualOk === true ? "bg-emerald-500/20 border-emerald-500/60 text-emerald-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
              적합 (이상 없음)
            </button>
            <button onClick={() => setVisualOk(false)}
              className={`rounded-xl border px-4 py-6 text-lg font-bold transition-colors ${visualOk === false ? "bg-red-500/20 border-red-500/60 text-red-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
              부적합 발견
            </button>
          </div>
        ) : (
          <input
            inputMode="decimal" value={value} onChange={(e) => setValue(e.target.value)}
            placeholder={`측정값 입력 (${spec.spec})`}
            className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-4 text-2xl text-center tabular-nums text-slate-100 placeholder-slate-600 placeholder:text-base focus:outline-none focus:border-sky-500"
          />
        )}

        {inputError && (
          <div className="flex items-center gap-2 mt-3 bg-red-500/10 border border-red-500/40 rounded-lg px-3 py-2.5">
            <XCircle size={15} className="text-red-400 shrink-0" />
            <span className="text-xs text-red-300">{inputError}</span>
          </div>
        )}

        {/* 실시간 자동 판정 미리보기 */}
        <div className="flex items-center justify-between mt-3">
          <div className="flex items-center gap-2">
            <span className="text-xs text-slate-500">자동 판정:</span>
            {inputError ? <Badge tone="red">진입 금지 — 재입력 필요</Badge>
              : judged == null ? <Badge tone="gray">입력 대기</Badge>
              : judged === "합격" ? <Badge tone="green">합격</Badge>
              : <Badge tone="red">불합격 — 저장 시 자동 홀드</Badge>}
          </div>
          <button onClick={save} disabled={judged == null || !!inputError}
            className={`rounded-xl px-6 py-3 text-base font-bold transition-colors ${judged == null || inputError ? "bg-slate-800 text-slate-600" : judged === "합격" ? "bg-emerald-600 hover:bg-emerald-500 text-white" : "bg-red-600 hover:bg-red-500 text-white"}`}>
            저장 (자동 처리)
          </button>
        </div>
      </Panel>

      {/* 자동 처리 결과 */}
      {entries.length > 0 && (
        <Panel title="입력 이력 · 자동 처리 내역" right={<span className="text-xs text-slate-400">{entries.length}건</span>}>
          <div className="flex flex-col divide-y divide-slate-800/60">
            {entries.map((e) => (
              <div key={e.id} className="py-3">
                <div className="flex flex-wrap items-center gap-2">
                  <span className="font-mono text-xs text-sky-300">{e.id}</span>
                  <span className="text-xs font-mono text-slate-500">{e.time}</span>
                  <span className="font-mono text-xs text-slate-300">{e.lot}</span>
                  <span className="text-sm text-slate-100">{e.check}</span>
                  <span className="text-sm tabular-nums text-slate-200">{e.value}</span>
                  <Badge tone={e.judge === "합격" ? "green" : "red"}>{e.judge}</Badge>
                </div>
                <ul className="mt-1.5 flex flex-col gap-0.5">
                  {e.auto.map((a, i) => (
                    <li key={i} className={`text-[11px] flex items-center gap-1.5 ${e.judge === "합격" ? "text-slate-400" : i === 0 ? "text-slate-400" : "text-amber-300/80"}`}>
                      <ChevronRight size={10} className="shrink-0" /> {a}
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </Panel>
      )}
    </div>
  );
}

/* ──────────────────────────── 메인 앱 ──────────────────────────── */

const TABS = [
  { id: "dash", label: "종합 대시보드", icon: LayoutDashboard, comp: DashboardTab },

  { id: "wo", label: "작업지시서", icon: ClipboardList, comp: WoDocTab },
  { id: "woIssue", label: "작업지시 발행", icon: Plus, comp: IssueWoTab },
  { id: "pqc", label: "공정검사 (PQC)", icon: ClipboardCheck, comp: PqcTab },
  { id: "oqc", label: "출하검사 (OQC)", icon: ArrowUpFromLine, comp: OqcTab },
  { id: "lock", label: "품질 인터락 (차단)", icon: Lock, comp: InterlockTab },
  { id: "inv", label: "원재료 재고", icon: Package, comp: InventoryTab },
  { id: "eq", label: "설비 모니터링", icon: Cpu, comp: EquipmentTab },
  { id: "trace", label: "Lot 추적", icon: GitBranch, comp: TraceTab },
  { id: "spc", label: "SPC (Cpk)", icon: BarChart3, comp: SpcTab },
  { id: "4m", label: "4M 변경관리", icon: Repeat, comp: FourMTab },
  { id: "ncr", label: "부적합 (8D)", icon: ShieldAlert, comp: NcrTab },
  { id: "coa", label: "출하성적서", icon: Printer, comp: CoaTab },
  { id: "cp", label: "관리계획서", icon: FileText, comp: ControlPlanTab },
];

  useEffect(() => {
    const t = setInterval(() => setClock(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const Active = TABS.find((t) => t.id === tab).comp;

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100" style={{ fontFamily: "'Pretendard', 'Noto Sans KR', system-ui, sans-serif" }}>
      <header className="border-b border-slate-800 bg-slate-900/80 sticky top-0 z-10 backdrop-blur">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-4">
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 rounded bg-sky-500/15 border border-sky-500/40 flex items-center justify-center">
              <FlaskConical size={16} className="text-sky-400" />
            </div>
            <div>
              <div className="text-sm font-bold tracking-widest">QMES</div>
              <div className="text-[10px] text-slate-500 -mt-0.5">나모케미칼㈜ 절연 슬러리</div>
            </div>
          </div>

          <div className="hidden md:flex items-center gap-1.5 text-xs text-slate-400 ml-2">
            <span>슬러리 공장</span>
            <ChevronRight size={12} />
            <span className="text-slate-200">개발/Pilot 라인</span>
          </div>

          <div className="flex-1" />

          <div className="hidden sm:flex items-center gap-2 text-xs text-slate-400 font-mono tabular-nums">
            <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse" />
            <span>{clock.toLocaleTimeString("ko-KR", { hour12: false })}</span>
          </div>
          <button className="relative p-2 rounded hover:bg-slate-800 transition-colors" aria-label="알림">
            <Bell size={16} className="text-slate-300" />
            <span className="absolute top-1 right-1 w-2 h-2 rounded-full bg-red-400" />
          </button>
          <div className="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center text-xs font-medium">관</div>
        </div>

        <nav className="max-w-7xl mx-auto px-4 flex gap-1 overflow-x-auto">
          {TABS.map((t) => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`flex items-center gap-1.5 px-3 py-2.5 text-sm whitespace-nowrap border-b-2 transition-colors ${
                tab === t.id ? "border-sky-400 text-sky-300 font-medium" : "border-transparent text-slate-400 hover:text-slate-200"
              }`}>
              <t.icon size={14} />
              {t.label}
            </button>
          ))}
        </nav>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-5">
        <Active />
      </main>

      <footer className="max-w-7xl mx-auto px-4 pb-6 text-[11px] text-slate-600">
        QMES Chemical v1.0 · 관리계획서 NMC-C-220-01 REV.0 (개발/Pilot 단계 초안) 기준 · 데모 데이터 — 실제 운영 시 PLC·계측기(점도계, 입도분석기, Gauss Meter)·ERP 연동 필요
      </footer>
    </div>
  );
}
