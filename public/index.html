  if (!form.worker.trim()) woErrors.push("작업자 미지정 — 지정 전 발행 금지");
  if (!dateOk) woErrors.push("생산일자를 선택하세요");
  const requestedLotNo = (form.lotNo || nextNo || "").trim();
  if (!requestedLotNo || requestedLotNo === "—") woErrors.push("LOT No.를 확인하세요");
  if (!editingWo && DB.batches.some((b) => b.no === requestedLotNo)) woErrors.push("이미 사용 중인 LOT No.입니다");
  const woReady = woErrors.length === 0;

  const issue = () => {
    if (!woReady) return;
    const time = new Date().toLocaleTimeString("ko-KR", { hour12: false });
    const seqKey = `wo-${form.prodDate}-${form.site}`;
    if (!editingWo) DB.seqs[seqKey] = (DB.seqs[seqKey] || 1) + 1;

    const woNo = editingWo || requestedLotNo;
    const batch = { no: woNo, item: form.product, tank: form.tank, plan: qtyNum, done: editingWo ? (DB.batches.find(b=>b.no===editingWo)?.done || 0) : 0, unit: "kg", due: form.prodDate, status: "발행", shift: `${form.shiftType} · ${form.timeRange}`, worker: form.worker.trim(), time };
    DB.batches = editingWo ? DB.batches.map((b)=>b.no===editingWo?batch:b) : [batch, ...DB.batches];

    DB.woDocs[woNo] = {
      item: form.product, procName: bom.procName, tank: form.tank, plan: qtyNum,
      date: form.prodDate, hours: form.hours, timeRange: form.timeRange, shiftType: form.shiftType,
      workers: form.worker.trim(), status: "발행",
      inputs: planItems.map((it, index) => {
        const planned = Number((it.base * ratio).toFixed(3));
        const actual = it.actual === "" || it.actual == null ? null : Number(it.actual);
        const inputRatio = planned > 0 && actual != null
          ? Number(((actual / planned) * 100).toFixed(2))
          : null;
        return {
          seq: index + 1, name: it.name,
          lot: it.materialLot || "", materialLot: it.materialLot || "",
          unit: it.unit, note: it.note,
          base: Number(it.base), std: planned, plan: planned,
          act: actual,
          ratio: inputRatio,
          error: planned > 0 && actual != null
            ? Number((((actual - planned) / planned) * 100).toFixed(2))
            : null,
          ok: null, by: "",
        };
      }),
      conds: [
        { proc: "HSM 용해", item: "시간", std: "≤ 80 min", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "HSM 용해", item: "온도", std: "< 70 ℃", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "HSM 용해", item: "RPM", std: "3,540±500 rpm", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "HSM 용해", item: "최대압력", std: "≤ 6 bar", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "HSM 용해", item: "유량", std: "< 20 L/min", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "순환", item: "시간", std: "60 min", method: "PLC 패널", act: "", ok: null, by: "" },
        { proc: "순환", item: "온도", std: "< 70 ℃", method: "PLC 패널", act: "", ok: null, by: "" },
      ],
    };

    DB.lots[woNo] = {
      item: "NBA20-HM01", itemName: form.product,
      qty: `${qtyNum.toLocaleString()} kg (계획)`, wo: woNo, status: "발행 — 생산 대기", stage: "수입",
      materials: [], binderLot: null,
      steps: [{ stage: "수입", name: "작업지시 발행", time, detail: `${bom.procName} · ${form.tank} · 계획 ${qtyNum.toLocaleString()}kg · ${form.prodDate} ${form.timeRange} (${form.shiftType})`, result: "발행", by: window.__QMES_USER__ || "-" }],
      ship: null,
    };
    auditLog("작업지시", editingWo ? "수정" : "발행", woNo, `${form.product} / ${qtyNum}kg / ${form.prodDate}`);
    dbSave();
    setEditingWo(null);
    setIssued([...DB.batches]);
  };

  const editWo = (r) => { const d=DB.woDocs[r.no]||{}; setEditingWo(r.no); setForm({ product:r.item, tank:r.tank, qty:String(r.plan), prodDate:r.due, lotNo:r.no, site:r.no?.[0]||"C", hours:d.hours||"7h", timeRange:d.timeRange||(r.shift?.split(" · ")[1]||""), shiftType:d.shiftType||(r.shift?.split(" · ")[0]||"일반"), worker:r.worker||"" }); setPlanItems((d.inputs?.length ? d.inputs : BOM[r.item].items).map((it, i) => ({ seq:i+1, name:it.name, materialLot:it.materialLot || it.lot || "", base:Number(it.base ?? it.std ?? 0), actual:it.act ?? "", unit:it.unit||"kg", note:it.note||"" }))); window.scrollTo({top:0,behavior:"smooth"}); };
  const deleteWo = (r) => { const reason=askDeleteReason(`작업지시 ${r.no}`); if(reason===null)return; DB.batches=DB.batches.filter(x=>x.no!==r.no); delete DB.woDocs[r.no]; delete DB.lots[r.no]; DB.insp.PQC=DB.insp.PQC.filter(x=>x.lot!==r.no); DB.insp.OQC=DB.insp.OQC.filter(x=>x.lot!==r.no); DB.popEntries=DB.popEntries.filter(x=>x.lot!==r.no); auditLog("작업지시","삭제",r.no,reason); dbSave(); setIssued([...DB.batches]); };

  const inputCls = "bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500";
  const label = (t) => <span className="text-[10px] text-slate-500">{t}</span>;
  const filteredIssued = issued.filter((r) => {
    const lotOk = !issueSearch.lot || String(r.no || "").toLowerCase().includes(issueSearch.lot.toLowerCase());
    const itemOk = !issueSearch.item || String(r.item || "").toLowerCase().includes(issueSearch.item.toLowerCase());
    const dateOk = !issueSearch.date || String(r.due || "") === issueSearch.date;
    return lotOk && itemOk && dateOk;
  });
  const issuePageCount = Math.max(1, Math.ceil(filteredIssued.length / issuePageSize));
  const safeIssuePage = Math.min(issuePage, issuePageCount);
  const pagedIssued = filteredIssued.slice((safeIssuePage - 1) * issuePageSize, safeIssuePage * issuePageSize);

  return (
    <div className="flex flex-col gap-4">
      <Panel title="신규 작업지시 발행" right={<span className="text-xs text-slate-400">LOT No. 자동 채번: <span className="font-mono text-sky-300">{nextNo}</span></span>}>
        <div className="qmes-wo-form-grid">
          <div className="qmes-wo-form-field">
            {label("공정 / 품목 (Grd.)")}
            <select value={form.product} onChange={(e) => { const next = e.target.value; setForm({ ...form, product: next, tank: BOM[next].tanks[0], qty: String(BOM[next].baseQty) }); setPlanItems(BOM[next].items.map((it) => ({ ...it, materialLot: "", actual: "" }))); }} className={inputCls}>
              {products.map((pd) => <option key={pd}>{pd}</option>)}
            </select>
          </div>
          <div className="qmes-wo-form-field">
            {label("설비명")}
            <select value={form.tank} onChange={(e) => setForm({ ...form, tank: e.target.value })} className={inputCls}>
              {bom.tanks.map((t) => <option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="qmes-wo-form-field">
            {label("생산일자")}
            <input
              type="date"
              value={form.prodDate}
              onChange={(e) => setForm({ ...form, prodDate: e.target.value, lotNo: editingWo ? form.lotNo : "" })}
              className={inputCls}
            />
          </div>
          <div className="qmes-wo-form-field">
            {label("LOT No.")}
            <input
              value={form.lotNo || nextNo}
              onChange={(e) => setForm({ ...form, lotNo: e.target.value.toUpperCase().replace(/\s/g, "") })}
              placeholder="LOT No."
              readOnly={!!editingWo}
              className={`${inputCls} font-mono ${editingWo ? "bg-slate-800/60 text-slate-400 cursor-not-allowed" : ""}`}
            />
          </div>
          <div className="qmes-wo-form-field">
            {label("생산구분")}
            <select value={form.site} onChange={(e) => setForm({ ...form, site: e.target.value, lotNo: editingWo ? form.lotNo : "" })} className={inputCls}>
              <option value="C">C — Pilot</option>
              <option value="D">D — 양산</option>
              <option value="B">B — Lab</option>
            </select>
          </div>
          <div className="qmes-wo-form-field">
            {label("생산계획량 (kg)")}
            <input type="number" value={form.qty} onChange={(e) => setForm({ ...form, qty: e.target.value })} className={inputCls} />
          </div>
          <div className="qmes-wo-form-field">
            {label("작업시간")}
            <input value={form.hours} onChange={(e) => setForm({ ...form, hours: e.target.value })} placeholder="예: 7h" className={inputCls} />
          </div>
          <div className="qmes-wo-form-field">
            {label("생산시간")}
            <input value={form.timeRange} onChange={(e) => setForm({ ...form, timeRange: e.target.value })} placeholder="예: 08:30~16:30" className={inputCls} />
          </div>
          <div className="qmes-wo-form-field">
            {label("근무유형")}
            <select value={form.shiftType} onChange={(e) => setForm({ ...form, shiftType: e.target.value })} className={inputCls}>
              <option>일반</option><option>잔업</option><option>특근</option>
            </select>
          </div>
          <div className="qmes-wo-form-field">
            {label("작업자 (복수 시 쉼표로 — 예: 대리 박도훈, 대리 김동준)")}
            <input value={form.worker} onChange={(e) => setForm({ ...form, worker: e.target.value })} placeholder="직급 이름, 직급 이름" className={inputCls} />
          </div>
        </div>

        {/* 원재료 투입 계획 — 수량 비례 자동 계산 */}
        <div className="mt-4 bg-slate-800/50 border border-slate-700/60 rounded-lg p-3">
          <div className="text-xs font-medium text-slate-300 mb-2">
            ① 원재료 투입 계획 <span className="text-slate-500">(기준량 → 계획량 자동 계산 · 실투입량 입력 시 오차 및 투입비율 자동 계산)</span>
              <span className="ml-2 text-[10px] text-slate-500">오차 기준: ±0.5% 이내 정상 · ±1.0% 이내 주의 · 초과 이탈</span>
          </div>
          <div className="overflow-x-auto">
            <table className="qmes-material-table qmes-material-balanced w-full text-sm min-w-[1370px]">
              <colgroup>
                <col style={{ width: "58px" }} />
                <col style={{ width: "230px" }} />
                <col style={{ width: "190px" }} />
                <col style={{ width: "155px" }} />
                <col style={{ width: "155px" }} />
                <col style={{ width: "155px" }} />
                <col style={{ width: "120px" }} />
                <col style={{ width: "120px" }} />
                <col style={{ width: "250px" }} />
              </colgroup>
              <thead>
                <tr className="text-[11px] text-slate-500 border-b border-slate-700/60">
                  <th className="text-left py-1.5 pr-3 font-medium w-14">순서</th>
                  <th className="text-left py-1.5 pr-3 font-medium">원재료명</th>
                  <th className="text-left py-1.5 px-2 font-medium">원재료 LOT No.</th>
                  <th className="text-center py-1.5 px-2 font-medium">기준량</th>
                  <th className="text-center py-1.5 px-2 font-medium">계획량</th>
                  <th className="text-center py-1.5 px-2 font-medium">실투입량</th>
                  <th className="text-center py-1.5 pr-3 font-medium">오차(%)</th>
                  <th className="text-center py-1.5 pr-3 font-medium">투입비율</th>
                  <th className="text-left py-1.5 font-medium">비고</th>
                </tr>
              </thead>
              <tbody>
                {planItems.map((it, idx) => (
                  <tr key={`${idx}-${it.name}`} className="border-b border-slate-800/60">
                    <td className="py-1.5 pr-3 text-slate-500 tabular-nums">{idx + 1}</td>
                    <td className="py-1.5 pr-3">
                      <select value={it.name} onChange={(e) => setPlanItems(planItems.map((row, i) => i === idx ? { ...row, name: e.target.value } : row))} className="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
                        {MATERIAL_OPTIONS.map((name) => <option key={name}>{name}</option>)}
                      </select>
                    </td>
                    <td className="py-1.5 px-2">
                      <input
                        value={it.materialLot || ""}
                        onChange={(e) => setPlanItems(planItems.map((row, i) => i === idx ? { ...row, materialLot: e.target.value.toUpperCase() } : row))}
                        placeholder="원재료 LOT"
                        className="w-full h-[34px] bg-slate-800 border border-slate-700 rounded px-2 text-sm font-mono text-slate-100 placeholder-slate-600 focus:outline-none focus:border-sky-500"
                      />
                    </td>
                    <td className="py-1.5 px-2">
                      <div className="qmes-qty-wrap">
                        <input
                          type="text"
                          inputMode="decimal"
                          value={it.base}
                          onChange={(e) => {
                            const v = e.target.value.replace(/[^0-9.]/g, "");
                            setPlanItems(planItems.map((row, i) => i === idx ? { ...row, base: v === "" ? "" : v } : row));
                          }}
                          className="qmes-qty-input bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-right text-sm text-slate-100 focus:outline-none focus:border-sky-500"
                        />
                        <span className="qmes-qty-unit text-xs text-slate-400">{it.unit}</span>
                      </div>
                    </td>
                    <td className="py-1.5 px-2">
                      <div className="qmes-qty-wrap">
                        <div className="qmes-qty-input qmes-qty-readonly bg-slate-800/60 border border-slate-700 rounded px-2 py-1.5 text-right text-sm text-sky-300 font-medium tabular-nums">
                          {(Number(it.base || 0) * ratio).toFixed(Number(it.base || 0) < 1 ? 3 : 2)}
                        </div>
                        <span className="qmes-qty-unit text-xs text-slate-400">{it.unit}</span>
                      </div>
                    </td>
                    <td className="py-1.5 px-2">
                      <div className="qmes-qty-wrap">
                        <input
                          type="text"
                          inputMode="decimal"
                          value={it.actual ?? ""}
                          onChange={(e) => {
                            const v = e.target.value.replace(/[^0-9.]/g, "");
                            setPlanItems(planItems.map((row, i) => i === idx ? { ...row, actual: v } : row));
                          }}
                          placeholder="실투입"
                          className="qmes-qty-input bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-right text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-sky-500"
                        />
                        <span className="qmes-qty-unit text-xs text-slate-400">{it.unit}</span>
                      </div>
                    </td>
                    <td className="py-1.5 pr-3 text-center tabular-nums">
                      {(() => {
                        const planned = it.base * ratio;
                        const actual = parseFloat(it.actual);
                        if (!(planned > 0) || Number.isNaN(actual)) return <span className="text-slate-500">—</span>;
                        const err = (actual - planned) / planned * 100;
                        const absErr = Math.abs(err);
                        const tone = absErr <= 0.5
                          ? "text-emerald-300 bg-emerald-500/10 border-emerald-500/30"
                          : absErr <= 1
                            ? "text-amber-300 bg-amber-500/10 border-amber-500/30"
                            : "text-red-300 bg-red-500/10 border-red-500/30";
                        const sign = err > 0 ? "+" : "";
                        return <span className={`inline-flex min-w-[66px] justify-center rounded border px-2 py-1 text-xs font-medium ${tone}`}>{sign}{err.toFixed(2)}%</span>;
                      })()}
                    </td>
                    <td className="py-1.5 pr-3 text-center tabular-nums">
                      {(() => {
                        const planned = it.base * ratio;
                        const actual = parseFloat(it.actual);
                        if (!(planned > 0) || Number.isNaN(actual)) return <span className="text-slate-500">—</span>;
                        const pct = actual / planned * 100;
                        const tone = Math.abs(pct - 100) <= 0.5
                          ? "text-emerald-300 bg-emerald-500/10 border-emerald-500/30"
                          : Math.abs(pct - 100) <= 1
                            ? "text-amber-300 bg-amber-500/10 border-amber-500/30"
                            : "text-red-300 bg-red-500/10 border-red-500/30";
                        return <span className={`inline-flex min-w-[66px] justify-center rounded border px-2 py-1 text-xs font-medium ${tone}`}>{pct.toFixed(2)}%</span>;
                      })()}
                    </td>
                    <td className="py-1.5">
                      <div className="flex items-center gap-2">
                        <input value={it.note} onChange={(e) => setPlanItems(planItems.map((row, i) => i === idx ? { ...row, note: e.target.value } : row))} placeholder="비고" className="flex-1 bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-100 focus:outline-none focus:border-sky-500" />
                        <button onClick={() => setPlanItems(planItems.filter((_, i) => i !== idx))} className="text-[11px] text-red-300 border border-red-500/30 rounded px-2 py-1.5 hover:bg-red-500/10">삭제</button>
                      </div>
                    </td>
                  </tr>
                ))}
                <tr>
                  <td className="py-1.5 pr-3" />
                  <td className="py-1.5 pr-3 font-medium text-slate-200">계</td>
                  <td className="py-1.5 px-2" />
                  <td className="py-1.5 pr-3 text-right tabular-nums text-slate-400">{planItems.reduce((a, it) => a + Number(it.base || 0), 0).toFixed(3)} kg</td>
                  <td className="py-1.5 pr-3 text-right tabular-nums font-medium text-sky-300">{planItems.reduce((a, it) => a + it.base * ratio, 0).toFixed(3)} kg</td>
                  <td className="py-1.5 pr-3 text-right tabular-nums font-medium text-emerald-300">
                    {planItems.reduce((a, it) => a + (parseFloat(it.actual) || 0), 0).toFixed(3)} kg
                  </td>
                  <td className="py-1.5 pr-3 text-center tabular-nums">
                    {(() => {
                      const plannedTotal = planItems.reduce((a, it) => a + it.base * ratio, 0);
                      const actualTotal = planItems.reduce((a, it) => a + (parseFloat(it.actual) || 0), 0);
                      if (!(plannedTotal > 0) || !(actualTotal > 0)) return <span className="text-slate-500">—</span>;
                      const err = (actualTotal - plannedTotal) / plannedTotal * 100;
                      const sign = err > 0 ? "+" : "";
                      const tone = Math.abs(err) <= 0.5 ? "text-emerald-300" : Math.abs(err) <= 1 ? "text-amber-300" : "text-red-300";
                      return <span className={tone}>{sign}{err.toFixed(2)}%</span>;
                    })()}
                  </td>
                  <td className="py-1.5 pr-3 text-center tabular-nums">
                    {(() => {
                      const plannedTotal = planItems.reduce((a, it) => a + it.base * ratio, 0);
                      const actualTotal = planItems.reduce((a, it) => a + (parseFloat(it.actual) || 0), 0);
                      return plannedTotal > 0 && actualTotal > 0
                        ? <span className="text-slate-300">{(actualTotal / plannedTotal * 100).toFixed(2)}%</span>
                        : <span className="text-slate-500">—</span>;
                    })()}
                  </td>
                  <td className="py-1.5 text-right">
                    <button onClick={() => setPlanItems([...planItems, { seq: planItems.length + 1, name: MATERIAL_OPTIONS[0], materialLot: "", base: 0, actual: "", unit: "kg", note: "" }])} className="inline-flex items-center gap-1 rounded border border-sky-500/40 bg-sky-500/10 px-3 py-1.5 text-xs text-sky-300 hover:bg-sky-500/20"><Plus size={13} /> 행 추가</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        {!woReady && (
          <div className="mt-3 bg-red-500/10 border border-red-500/40 rounded-lg px-3 py-2.5">
            <div className="flex items-center gap-2 text-xs text-red-300 font-medium"><XCircle size={14} className="shrink-0" /> 발행 진입 금지 — 아래 항목 수정 전 발행 불가</div>
            <ul className="mt-1 flex flex-col gap-0.5">
              {woErrors.map((e, i) => <li key={i} className="text-[11px] text-red-300/80">· {e}</li>)}
            </ul>
          </div>
        )}

        <div className="flex items-center justify-between mt-3">

          <button onClick={issue} disabled={!woReady}
            className={`flex items-center gap-1.5 rounded px-4 py-2 text-sm font-medium transition-colors ${!woReady ? "bg-slate-800 text-slate-600" : "bg-sky-600 hover:bg-sky-500 text-white"}`}>

        </div>
      </Panel>

      <Panel title="발행 내역" right={<span className="text-xs text-slate-400">{filteredIssued.length}건</span>}>
        <div className="qmes-status-guide">
          <span><i className="status-dot issue"></i>발행</span>
          <span><i className="status-dot production"></i>생산중</span>
          <span><i className="status-dot inspection"></i>검사중</span>
          <span><i className="status-dot complete"></i>완료</span>
          <em>자동 표시되며 필요 시 직접 선택 가능</em>
        </div>
        <div className="qmes-issued-filter">
          <div>
            <span>LOT No.</span>
            <input value={issueSearch.lot} onChange={(e) => { setIssueSearch({ ...issueSearch, lot: e.target.value }); setIssuePage(1); }} placeholder="LOT 검색" />

            <span>품목</span>
            <input value={issueSearch.item} onChange={(e) => { setIssueSearch({ ...issueSearch, item: e.target.value }); setIssuePage(1); }} placeholder="품목 검색" />

          <div>
            <span>생산일자</span>

              <col style={{ width: "220px" }} />
              <col style={{ width: "170px" }} />
              <col style={{ width: "120px" }} />
              <col style={{ width: "135px" }} />
              <col style={{ width: "125px" }} />
              <col style={{ width: "145px" }} />
              <col style={{ width: "120px" }} />
              <col style={{ width: "135px" }} />
              <col style={{ width: "110px" }} />

                <th className="center">생산시간</th>
                <th className="center">근무유형</th>
                <th>작업자</th>
                <th className="center">상태</th>
                <th className="center">관리</th>
              </tr>
            </thead>
            <tbody>
              {pagedIssued.map((r) => {
                const doc = DB.woDocs[r.no] || {};
                const actualTotal = (doc.inputs || []).reduce((sum, it) => sum + (Number(it.act) || 0), 0);
                const prodTime = doc.timeRange || (r.shift ? String(r.shift).split(" · ")[1] : "-");
                const shiftType = doc.shiftType || (r.shift ? String(r.shift).split(" · ")[0] : "-");
                return (
                  <tr key={r.no} className="border-b border-slate-800/60 hover:bg-slate-800/30">
                    <td className="font-mono whitespace-nowrap">
                      <button onClick={() => setViewingWo(r.no)} className="text-sky-300 hover:text-sky-200 hover:underline">{r.no}</button>
                    </td>
                    <td className="truncate" title={r.item}>
                      <button onClick={() => setViewingWo(r.no)} className="text-slate-100 hover:text-white hover:underline text-left">{r.item}</button>

                    <td className="truncate text-slate-400" title={r.tank}>{r.tank}</td>
                    <td className="num text-slate-100">{Number(r.plan || 0).toLocaleString()} kg</td>
                    <td className="num text-emerald-300">{actualTotal > 0 ? `${actualTotal.toFixed(3)} kg` : "—"}</td>
                    <td className="center text-slate-300 whitespace-nowrap">{r.due || "-"}</td>
                    <td className="center text-slate-400 whitespace-nowrap">{prodTime || "-"}</td>

                      <select
                        value={getAutoWoStatus(r.no)}
                        onChange={(e) => {
                          saveWoManualStatus(r.no, e.target.value);

                      >
                        <option value="발행">발행</option>
                        <option value="생산중">생산중</option>
                        <option value="검사중">검사중</option>
                        <option value="완료">완료</option>
                      </select>
                    </td>
                    <td className="center whitespace-nowrap">
                      <button onClick={() => setViewingWo(r.no)} className="qmes-manage-btn view">보기</button>

                      <button onClick={() => deleteWo(r)} className="qmes-manage-btn delete">삭제</button>
                    </td>
                  </tr>
                );
              })}
              {filteredIssued.length === 0 && (
                <tr>
                  <td colSpan="11" className="py-8 text-center text-slate-500">검색 조건에 맞는 발행 내역이 없습니다.</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>

        {filteredIssued.length > issuePageSize && (
          <div className="flex items-center justify-center gap-2 mt-3">
            <button onClick={() => setIssuePage((p) => Math.max(1, p - 1))}
              disabled={safeIssuePage === 1}
              className="px-3 py-1.5 rounded border border-slate-700 text-xs text-slate-300 disabled:opacity-40">이전</button>
            <span className="text-xs text-slate-400">{safeIssuePage} / {issuePageCount}</span>
            <button onClick={() => setIssuePage((p) => Math.min(issuePageCount, p + 1))}
              disabled={safeIssuePage === issuePageCount}
              className="px-3 py-1.5 rounded border border-slate-700 text-xs text-slate-300 disabled:opacity-40">다음</button>
          </div>
        )}
      </Panel>

      {viewingWo && (() => {
        const batch = issued.find((r) => r.no === viewingWo) || DB.batches.find((r) => r.no === viewingWo);
        const doc = DB.woDocs[viewingWo] || {};
        if (!batch) return null;

        const inputs = doc.inputs || [];
        const plannedTotal = inputs.reduce((sum, it) => sum + Number(it.plan ?? it.std ?? 0), 0);
        const actualTotal = inputs.reduce((sum, it) => sum + (Number(it.act) || 0), 0);

        return (
          <div className="qmes-modal-backdrop" onClick={() => setViewingWo(null)}>
            <div className="qmes-wo-viewer" onClick={(e) => e.stopPropagation()}>
              <div className="qmes-wo-viewer-head">
                <div>
                  <div className="text-lg font-bold text-white">작업지시 상세</div>
                  <div className="text-xs text-slate-400 mt-0.5">LOT No. <span className="font-mono text-sky-300">{viewingWo}</span></div>
                </div>
                <button onClick={() => setViewingWo(null)} className="qmes-modal-close">×</button>
              </div>

              <div className="qmes-wo-summary">
                <div><span>품목</span><strong>{batch.item}</strong></div>
                <div><span>설비</span><strong>{batch.tank}</strong></div>
                <div><span>생산일자</span><strong>{batch.due}</strong></div>
                <div><span>계획량</span><strong>{Number(batch.plan || 0).toLocaleString()} kg</strong></div>
                <div><span>근무유형</span><strong>{doc.shiftType || batch.shift || "-"}</strong></div>
                <div><span>생산시간</span><strong>{doc.timeRange || "-"}</strong></div>
                <div><span>작업시간</span><strong>{doc.hours || "-"}</strong></div>
                <div><span>작업자</span><strong>{doc.workers || batch.worker || "-"}</strong></div>
                <div><span>상태</span><strong>{getAutoWoStatus(viewingWo)}</strong></div>
              </div>

              <div className="mt-4">
                <div className="text-sm font-semibold text-slate-200 mb-2">원재료 투입 계획</div>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm min-w-[900px]">
                    <thead>
                      <tr className="text-xs text-slate-400 border-b border-slate-700">
                        <th className="text-center py-2 px-2">순서</th>
                        <th className="text-left py-2 px-2">원재료명</th>
                        <th className="text-left py-2 px-2">원재료 LOT No.</th>
                        <th className="text-right py-2 px-2">기준량</th>
                        <th className="text-right py-2 px-2">계획량</th>
                        <th className="text-right py-2 px-2">실투입량</th>
                        <th className="text-center py-2 px-2">오차</th>
                        <th className="text-center py-2 px-2">투입비율</th>
                        <th className="text-left py-2 px-2">비고</th>
                      </tr>
                    </thead>
                    <tbody>
                      {inputs.map((it, i) => (
                        <tr key={`${viewingWo}-${i}`} className="border-b border-slate-800/70">
                          <td className="text-center py-2 px-2 text-slate-400">{it.seq || i + 1}</td>
                          <td className="py-2 px-2 text-slate-100">{it.name}</td>
                          <td className="py-2 px-2 font-mono text-xs text-slate-300">{it.materialLot || it.lot || "-"}</td>
                          <td className="text-right py-2 px-2 tabular-nums">{Number(it.base || 0).toFixed(3)} {it.unit || "kg"}</td>
                          <td className="text-right py-2 px-2 tabular-nums text-sky-300">{Number(it.plan ?? it.std ?? 0).toFixed(3)} {it.unit || "kg"}</td>
                          <td className="text-right py-2 px-2 tabular-nums text-emerald-300">{it.act == null ? "—" : `${Number(it.act).toFixed(3)} ${it.unit || "kg"}`}</td>
                          <td className="text-center py-2 px-2 tabular-nums">{it.error == null ? "—" : `${it.error > 0 ? "+" : ""}${Number(it.error).toFixed(2)}%`}</td>
                          <td className="text-center py-2 px-2 tabular-nums">{it.ratio == null ? "—" : `${Number(it.ratio).toFixed(2)}%`}</td>
                          <td className="py-2 px-2 text-xs text-slate-400">{it.note || "-"}</td>
                        </tr>
                      ))}
                      <tr className="bg-slate-800/40 font-medium">
                        <td className="py-2 px-2" />
                        <td className="py-2 px-2 text-slate-200">합계</td>
                        <td className="py-2 px-2" />
                        <td className="py-2 px-2" />
                        <td className="text-right py-2 px-2 text-sky-300">{plannedTotal.toFixed(3)} kg</td>
                        <td className="text-right py-2 px-2 text-emerald-300">{actualTotal > 0 ? `${actualTotal.toFixed(3)} kg` : "—"}</td>
                        <td className="text-center py-2 px-2">
                          {plannedTotal > 0 && actualTotal > 0 ? `${(((actualTotal - plannedTotal) / plannedTotal) * 100).toFixed(2)}%` : "—"}
                        </td>
                        <td className="text-center py-2 px-2">
                          {plannedTotal > 0 && actualTotal > 0 ? `${((actualTotal / plannedTotal) * 100).toFixed(2)}%` : "—"}
                        </td>
                        <td className="py-2 px-2" />
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>

              <div className="mt-4 flex justify-end gap-2">
                <button onClick={() => { setViewingWo(null); editWo(batch); }} className="px-3 py-2 rounded border border-sky-500/40 text-sky-300 text-xs hover:bg-sky-500/10">수정하기</button>
                <button onClick={() => setViewingWo(null)} className="px-3 py-2 rounded bg-slate-700 text-slate-100 text-xs hover:bg-slate-600">닫기</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ──────────────────────────── 공정검사(PQC) · 출하검사(OQC) 분리 ──────────────────────────── */

const PQC_KEYS = ["점도", "고형분", "입도(Dmax)", "외관"];
const OQC_KEYS = ["외관", "점도", "고형분", "입도(Dmax)", "접착력", "절연저항", "수분", "전해액 안정성"];

const PQC_INIT = [];

const OQC_INIT = [];

function PqcTab() {
  return (
    <InspectionTab
      docName="공정검사 성적서"
      itemKeys={PQC_KEYS}
      initial={PQC_INIT}
      lotOptions={["CBG0803", "CBG0802", "CBG0801"]}
      idPrefix="PQC-" idStart={1} storeKey="PQC" traceStage="생산"
      notice="공정 40(바인더)·50(슬러리) 공정관리 검사 — CTQ 항목(점도/고형분/입도)은 n=1, 3회 측정 후 공정검사 성적서에 기록합니다. 부적합 시 해당 배치 홀드."
    />
  );
}

function OqcTab() {
  return (
    <InspectionTab
      docName="출하검사 성적서"
      itemKeys={OQC_KEYS}
      initial={OQC_INIT}
      lotOptions={["CBG0802", "CBG0701"]}
      idPrefix="OQC-" idStart={1} storeKey="OQC" traceStage="출하"
      notice="출하검사 8개 항목 전부 합격한 Lot만 출하성적서(CoA) 발행 및 출하가 가능합니다. CBG0802: 8/8 합격 — CoA 발행 대상. 파손 용기는 교체 후 수분/고형분/점도 재검사."
    />
  );
}

/* ──────────────────────────── 품질 인터락 (차단) 탭 ──────────────────────────── */

function holdTone(s) {
  if (s === "차단중") return "red";
  if (s.includes("조건부")) return "amber";
  if (s.includes("요청")) return "blue";
  return "green";
}

function InterlockTab() {
  const [holds, setHolds] = useState(DB.holds);
  const active = holds.filter((h) => h.status === "차단중").length;
  const cond = holds.filter((h) => h.status.includes("조건부") || h.status.includes("요청")).length;

  const requestRelease = (id) => {
    const next = holds.map((h) => (h.id === id && h.status === "차단중" ? { ...h, status: "해제 요청중 (승인 대기)" } : h));
    setHolds(next); DB.holds = next; dbSave();
  };
  const approve = (id) => {
    const now = new Date();
    const t = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const next = holds.map((h) => (h.id === id && h.status.includes("요청") ? { ...h, status: "해제 완료", release: `${t} · 승인 ${window.__QMES_USER__ || "품질부장"}` } : h));
    setHolds(next); DB.holds = next; dbSave();
  };

  return (
    <div className="flex flex-col gap-4">
      <div className="grid grid-cols-3 gap-3">
        <Kpi icon={Lock} label="차단중 (Hold)" value={active} unit="건" tone="text-red-400" />
        <Kpi icon={ShieldAlert} label="조건부 · 승인 대기" value={cond} unit="건" tone="text-amber-400" />
        <Kpi icon={Unlock} label="해제 완료" value={holds.length - active - cond} unit="건" tone="text-emerald-400" />
      </div>

      {/* 게이트 규칙 */}
      <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-3">
        {GATES.map((g, i) => (
          <div key={i} className="bg-slate-900 border border-slate-800 rounded-lg p-4">
            <div className="flex items-center gap-2">
              <g.icon size={15} className="text-sky-400 shrink-0" />
              <span className="text-sm font-medium text-slate-100 leading-tight">{g.name}</span>
            </div>
            <div className="mt-2"><Badge tone="red">{g.target}</Badge></div>
            <p className="text-xs text-slate-300 mt-2 leading-relaxed">{g.rule}</p>
            <div className="flex items-center gap-1.5 mt-2 text-[11px] text-slate-500">
              <ShieldCheck size={12} className="text-slate-500" /> {g.sys}
            </div>
          </div>
        ))}
      </div>

      {/* 부적합 격리 Rack 현황 — 개선요청 6번: 실물 격리와 시스템 홀드 1:1 연결 */}
      <Panel title="현장 부적합 격리 Rack 현황" right={<span className="text-xs text-slate-400">Rack 입고/출고는 홀드 등록·해제와 연동 (임의 반출 시 스캔 거부)</span>}>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          {RACKS.map((r) => (
            <div key={r.id} className={`rounded-lg border p-3 ${r.state === "사용중" ? "bg-amber-500/5 border-amber-500/40" : "bg-slate-800/40 border-slate-700/60"}`}>
              <div className="flex items-center justify-between">
                <span className="font-mono text-sm text-slate-100">{r.id}</span>
                <Badge tone={r.state === "사용중" ? "amber" : "gray"}>{r.state}</Badge>
              </div>
              <div className="text-[11px] text-slate-500 mt-1">{r.zone}</div>
              <div className="text-xs text-slate-200 mt-2 leading-snug min-h-[32px]">{r.item}</div>
              {r.hold !== "-" && <div className="text-[10px] font-mono text-sky-300 mt-1">{r.hold} 연계</div>}
            </div>
          ))}
        </div>
      </Panel>

      {/* 홀드 목록 */}
      <Panel title="차단(Hold) 현황 및 해제 관리" right={<span className="text-xs text-slate-400">해제는 조건 충족 + 승인권자 승인 시에만 가능 (이력 보존)</span>}>
        <div className="flex flex-col divide-y divide-slate-800/60">
          {holds.length === 0 && <p className="py-2 text-sm text-slate-500">현재 차단(Hold) 건이 없습니다 — 부적합 발생 시 자동 등록됩니다.</p>}
          {holds.map((h) => (
            <div key={h.id} className="py-3.5 flex flex-col md:flex-row md:items-start gap-3">
              <div className="flex items-center gap-2 md:w-52 shrink-0">
                {h.status === "차단중" ? <Lock size={15} className="text-red-400 shrink-0" />
                  : h.status === "해제 완료" ? <Unlock size={15} className="text-emerald-400 shrink-0" />
                  : <ShieldAlert size={15} className="text-amber-400 shrink-0" />}
                <div>
                  <div className="font-mono text-xs text-sky-300">{h.id}</div>
                  <div className="font-mono text-xs text-slate-200 mt-0.5">{h.target}</div>
                  <div className="text-[10px] text-slate-500 mt-0.5">{h.type} · {h.gate}</div>
                </div>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex flex-wrap items-center gap-2">
                  <Badge tone={holdTone(h.status)}>{h.status}</Badge>
                  {h.ncr !== "-" && <span className="text-[11px] font-mono text-slate-500">{h.ncr} 연계</span>}
                  <span className="text-[11px] text-slate-500 font-mono">차단 {h.since}</span>
                </div>
                <p className="text-xs text-slate-300 mt-1.5 leading-relaxed">{h.reason}</p>
                <p className="text-[11px] text-slate-500 mt-1">해제 조건: {h.cond}{h.release && <span className="text-emerald-400 ml-2">✓ {h.release}</span>}</p>
                {h.rack && <p className="text-[11px] text-amber-300/80 mt-0.5">격리 위치: {h.rack}</p>}
              </div>
              <div className="shrink-0 flex md:flex-col gap-1.5">
                {h.status === "차단중" && (
                  <button onClick={() => requestRelease(h.id)}
                    className="px-3 py-1.5 rounded border border-slate-600 text-xs text-slate-200 hover:bg-slate-800 transition-colors">
                    해제 요청
                  </button>
                )}
                {h.status.includes("요청") && (
                  <button onClick={() => approve(h.id)}
                    className="px-3 py-1.5 rounded bg-emerald-600 hover:bg-emerald-500 text-xs text-white font-medium transition-colors">
                    승인 (품질부장)
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
        <p className="text-[11px] text-slate-500 mt-3">
          차단중인 Lot은 해당 게이트에서 시스템이 진행을 물리적으로 막습니다 — CBG0803은 재측정 합격 전까지 OQC 등록·CoA 발행·출하지시가 비활성화되고, RML-BOEH-260708은 IQC 판정 전까지 불출 스캔이 거부됩니다. 실제 구축 시 PLC·바코드·전자저울 연동으로 강제됩니다 (NMCOP3-SP05 부적합 프로세스).
        </p>
      </Panel>
    </div>
  );
}

/* ──────────────────────────── 현장 입력 (iPad · POP) 탭 ──────────────────────────── */
/* 현장 작업자가 태블릿으로 측정값만 입력하면: 규격 자동판정 → 성적서 자동기록 → Lot 이력 반영 → 불합격 시 자동 홀드·알람 */

/* ──────────────────────────── 현장 입력 (iPad · POP) 탭 ──────────────────────────── */
/* 측정값 입력 즉시: 규격 자동판정 → 성적서 자동기록 → Lot 이력 반영 → 불합격 시 자동 홀드·알람 */

const FIELD_ITEMS = ["점도", "고형분", "입도(Dmax)", "수분", "접착력", "절연저항", "Gauss(필터)", "외관", "전해액 안정성"];

function autoJudge(check, raw) {
  const spec = QC_ITEMS[check];
  const num = parseFloat(String(raw).replace(/[^0-9.\-]/g, ""));
  if (isNaN(num)) return null;
  if (spec.lo != null && num < spec.lo) return "불합격";
  if (spec.hi != null && num > spec.hi) return "불합격";
  return "합격";
}

function FieldInputTab() {
  const [lot, setLot] = useState("");
  const [check, setCheck] = useState("점도");
  const [value, setValue] = useState("");
  const [visualOk, setVisualOk] = useState(null);
  const [entries, setEntries] = useState(DB.popEntries);
  const [seq, setSeq] = useState(DB.seqs.POP || 1);
  const [tried, setTried] = useState(false);
  const [editingPop, setEditingPop] = useState(null);

  const spec = QC_ITEMS[check];
  const isVisual = spec.lo == null && spec.hi == null;
  const trimmed = value.trim();
  const lotFormatOk = /^[A-D][A-Z][A-L]\d{4}$/.test(lot.trim());

  let inputError = null;
  if (!isVisual && trimmed !== "") {
    if (!/^\d+(\.\d+)?$/.test(trimmed)) {
      inputError = "숫자만 입력할 수 있습니다 — 문자·기호 포함 시 저장이 금지됩니다";
    } else {
      const num = parseFloat(trimmed);
      const lo = spec.lo, hi = spec.hi;
      const span = lo != null && hi != null ? hi - lo : (hi ?? lo);
      const min = lo != null ? Math.max(0, lo - span) : 0;
      const max = hi != null ? hi + span * 2 : lo * 10;
      if (!(num > min && num < max)) {
        inputError = `입력값 ${trimmed}이(가) 통상 측정 범위를 벗어났습니다 — 오타(자릿수) 확인 후 재입력 전까지 진입 금지`;
      }
    }
  }

  const judged = isVisual
    ? (visualOk == null ? null : visualOk ? "합격" : "불합격")
    : (trimmed === "" || inputError ? null : autoJudge(check, trimmed));

  const triedErrors = [];
  if (tried && !lotFormatOk) triedErrors.push(lot.trim() === "" ? "배치 Lot 번호를 입력하세요 (예: CBG1001)" : "Lot 형식 오류 — 예: CBG1001");
  if (tried && !inputError && judged == null) triedErrors.push(isVisual ? "적합 / 부적합 중 하나를 선택하세요" : "측정값을 입력하세요");

  const save = () => {
    if (judged == null || inputError || !lotFormatOk) { setTried(true); return; }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const recId = editingPop || `POP-${String(seq).padStart(4, "0")}`;
    const lotNo = lot.trim();
    const display = isVisual ? (visualOk ? "적합" : "부적합") : trimmed;
    /* 공정검사 성적서 자동 기록 */
    const pqcRec = { id: recId, time, lot: lotNo, check, value: display, judge: judged, note: "현장 입력", inspector: window.__QMES_USER__ || "-" };
    DB.insp.PQC = editingPop ? DB.insp.PQC.map((r)=>r.id===recId?pqcRec:r) : [pqcRec, ...DB.insp.PQC];
    if (!editingPop) DB.seqs.POP = seq + 1;
    /* Lot 이력 자동 반영 */
    const L = DB.lots[lotNo];
    if (L) {
      L.steps = [...L.steps, { stage: "생산", name: `현장 검사 — ${check}`, time, detail: `측정값 ${display} · 규격 ${spec.spec}`, result: judged, by: window.__QMES_USER__ || "-" }];
      L.stage = "생산";
      if (judged === "불합격") L.status = "홀드 — 부적합 발생 (게이트 차단)";
      else if (!L.status.includes("홀드")) L.status = "생산중";
    }
    /* 불합격 → 자동 홀드 */
    if (judged === "불합격") {
      DB.holds = [{ id: `HLD-${String(Date.now()).slice(-6)}`, target: lotNo, type: "제품 Lot", gate: "공정 게이트", reason: `${check} ${display} — 규격(${spec.spec}) 부적합 (현장 입력)`, since: time, cond: "재검사 합격 + 품질부장 승인", status: "차단중", ncr: "-" }, ...DB.holds];
    }
    const entry = {
      id: recId, time, lot: lotNo, check, value: display, judge: judged,
      auto: judged === "합격"
        ? [`규격(${spec.spec}) 자동판정 → 합격`, `${recId} 공정검사 성적서 자동 기록`, L ? `Lot ${lotNo} 이력 반영 완료` : `Lot ${lotNo} 미등록 — 작업지시 발행 시 이력 연결`]
        : [`규격(${spec.spec}) 자동판정 → 불합격`, `${recId} 성적서 자동 기록`, `자동 홀드 생성 — 공정 게이트 차단`, `품질부 알람 · 격리 Rack 지정 대기`, `NCR 발행 대기 (8D 착수)`],
    };
    const nextEntries = editingPop ? entries.map((e)=>e.id===editingPop?entry:e) : [entry, ...entries];
    setEntries(nextEntries);
    DB.popEntries = nextEntries;
    auditLog("현장입력", editingPop ? "수정" : "등록", recId, `${lotNo} / ${check} / ${display} / ${judged}`);
    dbSave();
    if (!editingPop) setSeq(seq + 1);
    setEditingPop(null);
    setValue("");
    setVisualOk(null);
    setTried(false);
  };

  const editPop = (e) => { setEditingPop(e.id); setLot(e.lot); setCheck(e.check); const numeric=QC_ITEMS[e.check]?.lo!=null||QC_ITEMS[e.check]?.hi!=null; if(numeric){setValue(String(e.value));setVisualOk(null);}else{setValue("");setVisualOk(e.judge==="합격");} window.scrollTo({top:0,behavior:"smooth"}); };
  const deletePop = (e) => { const reason=askDeleteReason(`현장 입력 ${e.id}`); if(reason===null)return; const next=entries.filter(x=>x.id!==e.id); setEntries(next); DB.popEntries=next; DB.insp.PQC=DB.insp.PQC.filter(x=>x.id!==e.id); auditLog("현장입력","삭제",e.id,reason); dbSave(); };

  const bigBtn = (active) =>
    `rounded-xl border px-4 py-3.5 text-base font-medium transition-colors ${
      active ? "bg-sky-500/20 border-sky-500/60 text-sky-200" : "bg-slate-800 border-slate-700 text-slate-300 hover:border-slate-500"
    }`;

  return (
    <div className="flex flex-col gap-4 max-w-3xl mx-auto w-full">
      <div className="flex items-center gap-2.5 bg-slate-900 border border-slate-800 rounded-lg px-4 py-3">
        <Tablet size={18} className="text-sky-400" />
        <div>
          <div className="text-sm font-semibold text-slate-100">현장 검사 입력 (POP)</div>
          <div className="text-[11px] text-slate-500">측정값 입력 즉시 자동 판정·기록됩니다 — 판정을 직접 고를 수 없습니다 (데이터 무결성)</div>
        </div>
      </div>

      <Panel title="1. 배치 (Lot) 입력" right={<span className="text-xs text-slate-400">채번: 사이트·년·월·일·순번 (예: CBG1001)</span>}>
        <input value={lot} onChange={(e) => setLot(e.target.value.toUpperCase())}
          placeholder="배치 Lot 번호 입력 (바코드 스캔 대체)"
          className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3.5 text-lg text-center font-mono text-slate-100 placeholder-slate-600 placeholder:text-sm focus:outline-none focus:border-sky-500" />
        {lot !== "" && !lotFormatOk && (
          <p className="text-xs text-red-300 mt-2">Lot 형식 오류 — 형식 불일치 시 저장(다음 단계) 진입 금지</p>
        )}
      </Panel>

      <Panel title="2. 검사 항목" right={<span className="text-xs text-slate-400">규격: <span className="text-sky-300">{spec.spec}</span> · {spec.method}</span>}>
        <div className="grid grid-cols-3 gap-2">
          {FIELD_ITEMS.map((k) => (
            <button key={k} onClick={() => { setCheck(k); setValue(""); setVisualOk(null); }} className={bigBtn(check === k)}>{k}</button>
          ))}
        </div>
      </Panel>

      <Panel title="3. 측정값 입력">
        {isVisual ? (
          <div className="grid grid-cols-2 gap-2">
            <button onClick={() => setVisualOk(true)}
              className={`rounded-xl border px-4 py-6 text-lg font-bold transition-colors ${visualOk === true ? "bg-emerald-500/20 border-emerald-500/60 text-emerald-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
              적합 (이상 없음)
            </button>
            <button onClick={() => setVisualOk(false)}
              className={`rounded-xl border px-4 py-6 text-lg font-bold transition-colors ${visualOk === false ? "bg-red-500/20 border-red-500/60 text-red-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
              부적합 발견
            </button>
          </div>
        ) : (
          <input
            inputMode="decimal" value={value} onChange={(e) => setValue(e.target.value)}
            placeholder={`측정값 입력 (${spec.spec})`}
            className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-4 text-2xl text-center tabular-nums text-slate-100 placeholder-slate-600 placeholder:text-base focus:outline-none focus:border-sky-500"
          />
        )}

        {(inputError || triedErrors.length > 0) && (
          <div className="mt-3 bg-red-500/10 border border-red-500/40 rounded-lg px-3 py-2.5">
            {[inputError, ...triedErrors].filter(Boolean).map((e, i) => (
              <div key={i} className="flex items-center gap-2 text-xs text-red-300"><XCircle size={14} className="shrink-0" /> {e}</div>
            ))}
          </div>
        )}

        <div className="flex items-center justify-between mt-3">
          <div className="flex items-center gap-2">
            <span className="text-xs text-slate-500">자동 판정:</span>
            {inputError ? <Badge tone="red">진입 금지 — 재입력 필요</Badge>
              : judged == null ? <Badge tone="gray">입력 대기</Badge>
              : judged === "합격" ? <Badge tone="green">합격</Badge>
              : <Badge tone="red">불합격 — 저장 시 자동 홀드</Badge>}
          </div>
          <button onClick={save}
            className={`rounded-xl px-6 py-3 text-base font-bold transition-colors text-white ${judged === "불합격" ? "bg-red-600 hover:bg-red-500" : judged === "합격" ? "bg-emerald-600 hover:bg-emerald-500" : "bg-sky-600 hover:bg-sky-500"}`}>
            {editingPop ? "수정 저장 (자동 처리)" : "저장 (자동 처리)"}
          </button>
        </div>
      </Panel>

      {entries.length > 0 && (
        <Panel title="입력 이력 · 자동 처리 내역" right={<span className="text-xs text-slate-400">{entries.length}건</span>}>
          <div className="flex flex-col divide-y divide-slate-800/60">
            {entries.map((e) => (
              <div key={e.id} className="py-3">
                <div className="flex flex-wrap items-center gap-2">
                  <span className="font-mono text-xs text-sky-300">{e.id}</span>
                  <span className="text-xs font-mono text-slate-500">{e.time}</span>
                  <span className="font-mono text-xs text-slate-300">{e.lot}</span>
                  <span className="text-sm text-slate-100">{e.check}</span>
                  <span className="text-sm tabular-nums text-slate-200">{e.value}</span>
                  <Badge tone={e.judge === "합격" ? "green" : "red"}>{e.judge}</Badge>
                  <span className="ml-auto whitespace-nowrap">
                    <button onClick={() => editPop(e)} className="px-2 py-1 mr-1 rounded border border-sky-500/40 text-sky-300 text-xs hover:bg-sky-500/10">수정</button>
                    <button onClick={() => deletePop(e)} className="px-2 py-1 rounded border border-red-500/40 text-red-300 text-xs hover:bg-red-500/10">삭제</button>
                  </span>
                </div>
                <ul className="mt-1.5 flex flex-col gap-0.5">
                  {e.auto.map((a, i) => (
                    <li key={i} className={`text-[11px] flex items-center gap-1.5 ${e.judge === "합격" ? "text-slate-400" : i === 0 ? "text-slate-400" : "text-amber-300/80"}`}>
                      <ChevronRight size={10} className="shrink-0" /> {a}
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        </Panel>
      )}
    </div>
  );
}

/* ──────────────────────────── 고객불만 관리 (GQMS) 탭 ──────────────────────────── */

function ComplaintTab() {
  const [items, setItems] = useState(DB.complaints);
  const [form, setForm] = useState({ customer: "K배터리솔루션", channel: "GQMS 시정조치 요구", lot: "", item: "", grade: "경미" });
  const [seq, setSeq] = useState(DB.seqs.cc || 1);
  const [tried, setTried] = useState(false);

  const open = items.filter((c) => c.status !== "완료").length;
  const lotOk = form.lot.trim() === "" || /^[A-D][A-Z][A-L]\d{4}$/.test(form.lot.trim());
  const ccErrors = [];
  if (!lotOk) ccErrors.push("Lot 형식 오류 — 채번 체계(예: CBG1001)에 맞게 입력하거나 비워두세요");
  if (tried && form.item.trim() === "") ccErrors.push("불만 내용을 입력하세요 — 접수 진입 금지");
  const ccReady = lotOk && form.item.trim() !== "";

  const receive = () => {
    if (!ccReady) { setTried(true); return; }
    const now = new Date();
    const t = `${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")} ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const ni = [
      {
        no: `CC-${String(seq).padStart(3, "0")}`, date: new Date().toLocaleDateString("ko-KR"), customer: form.customer, channel: form.channel,

        flow: [`${t} 접수 — ${form.grade === "중대" ? "4시간" : "24시간"} 내 초동 회신 기한 · 담당 ${window.__QMES_USER__ || "미지정"}`, "-", "-", "-", "-", "-"],
      },
      ...items,
    ];
    setItems(ni);
    DB.complaints = ni;
    DB.seqs.cc = seq + 1;
    dbSave();
    setSeq(seq + 1);
    setForm({ ...form, lot: "", item: "" });
    setTried(false);
  };

  return (
    <div className="flex flex-col gap-4">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
        <Kpi icon={MessageSquareWarning} label="당월 접수" value={items.length} unit="건" tone="text-amber-400" />
        <Kpi icon={Activity} label="진행중 (Open)" value={open} unit="건" tone="text-sky-400" />
        <Kpi icon={CheckCircle2} label="완료 (Close)" value={items.length - open} unit="건" tone="text-emerald-400" />
        <Kpi icon={PhoneCall} label="초동 회신 준수율" value="—" unit="%" tone="text-violet-400" />
      </div>

      <Panel title="고객불만 접수 (GQMS · 품질 협의체 · 유선)" right={<span className="text-xs text-slate-400">중대 4시간 / 경미 24시간 내 초동 회신</span>}>
        <div className="grid grid-cols-2 md:grid-cols-6 gap-2 items-end">
          <div className="flex flex-col gap-1">
            <span className="text-[10px] text-slate-500">고객사</span>
            <select value={form.customer} onChange={(e) => setForm({ ...form, customer: e.target.value })}
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              <option>K배터리솔루션</option><option>기타 고객사</option>
            </select>
          </div>
          <div className="flex flex-col gap-1">
            <span className="text-[10px] text-slate-500">접수 채널</span>
            <select value={form.channel} onChange={(e) => setForm({ ...form, channel: e.target.value })}
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              <option>GQMS 시정조치 요구</option><option>품질 협의체</option><option>유선/메일</option>
            </select>
          </div>
          <div className="flex flex-col gap-1">
            <span className="text-[10px] text-slate-500">대상 Lot (선택)</span>
            <input value={form.lot} onChange={(e) => setForm({ ...form, lot: e.target.value.toUpperCase() })} placeholder="예: CBG1001"
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm font-mono text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
          </div>
          <div className="flex flex-col gap-1 col-span-2">
            <span className="text-[10px] text-slate-500">불만 내용</span>
            <input value={form.item} onChange={(e) => setForm({ ...form, item: e.target.value })} placeholder="불만·결함 내용 입력"
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
          </div>
          <div className="flex gap-2">
            <select value={form.grade} onChange={(e) => setForm({ ...form, grade: e.target.value })}

        <Panel title="접수 이력">

        </Panel>
      )}

      {items.map((c) => {
        const doneCount = c.flow.filter((f) => f !== "-").length;
        return (
          <Panel key={c.no}
            title={`${c.no} — ${c.item}`}
            right={<div className="flex items-center gap-2"><Badge tone={c.grade === "중대" ? "red" : "amber"}>{c.grade}</Badge><Badge tone={c.status === "완료" ? "green" : "blue"}>{c.status}</Badge></div>}
          >
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              <div><div className="text-xs text-slate-500">접수일</div><div className="text-sm text-slate-100 mt-0.5 tabular-nums">{c.date}</div></div>
              <div><div className="text-xs text-slate-500">고객사 / 채널</div><div className="text-sm text-slate-100 mt-0.5">{c.customer} <span className="text-xs text-slate-500">· {c.channel}</span></div></div>
              <div><div className="text-xs text-slate-500">대상 Lot</div><div className="text-xs text-sky-300 font-mono mt-1">{c.lot}</div></div>
              <div><div className="text-xs text-slate-500">진행</div><div className="text-sm text-slate-100 mt-0.5 tabular-nums">{doneCount} / 6 단계</div></div>
            </div>

            <div className="flex gap-1 mb-3">
              {COMPLAINT_FLOW_LABELS.map((l, i) => (
                <div key={i} className="flex-1 min-w-0">
                  <div className={`h-1.5 rounded ${c.flow[i] !== "-" ? (c.status === "완료" ? "bg-emerald-400" : "bg-sky-400") : "bg-slate-800"}`} />
                </div>
              ))}
            </div>

/* 가입: 이름·부서·비밀번호만 입력, 사번 없음. 가입 즉시 자동 승인되어 바로 시스템에 입장합니다.
   로그인: 이름 + 비밀번호. 관리자 권한은 [회원 관리]에서 지정. 비밀번호는 SHA-256 해시로만 저장. */

const AUTH_MEM = { users: null };
const DEFAULT_USERS = [{ id: "admin", uid: "U-0001", pw: "1234", name: "관리자", dept: "관리부", role: "admin" }];
function nextUid(users) {
  const max = users.reduce((m, u) => Math.max(m, parseInt((u.uid || "U-0000").slice(2), 10) || 0), 0);
  return `U-${String(max + 1).padStart(4, "0")}`;
}
const USERS_KEY = "qmes-users-v3";

async function hashText(t) {
  try {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(t));
    return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
  } catch (e) {
    let h = 0x811c9dc5;
    for (let i = 0; i < t.length; i++) { h ^= t.charCodeAt(i); h = Math.imul(h, 0x01000193) >>> 0; }
    return "f" + h.toString(16);
  }
}

function loadUsers() {
  try {
    window.localStorage.removeItem("qmes-users");
    window.localStorage.removeItem("qmes-users-v2");
    window.localStorage.removeItem("qmes-settings");
    const raw = window.localStorage.getItem(USERS_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* 저장소 미지원 — 메모리 사용 */ }
  return AUTH_MEM.users || DEFAULT_USERS.map((u) => ({ ...u }));
}
function saveUsers(users) {
  AUTH_MEM.users = users;
  try { window.localStorage.setItem(USERS_KEY, JSON.stringify(users)); } catch (e) { /* 무시 */ }
}

const DEPTS = ["생산부", "품질부", "연구소", "영업부", "관리부"];

function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [msg, setMsg] = useState(null);
  const [lf, setLf] = useState({ name: "", pw: "" });
  const [rf, setRf] = useState({ name: "", dept: DEPTS[0], pw: "", pw2: "" });
  const [lock, setLock] = useState({ fail: 0, until: 0 });

  const users = loadUsers();
  const dup = users.some((u) => u.name === rf.name.trim() || u.id === rf.name.trim());
  const regErrors = [];
  if (rf.name.trim() !== "" && dup) regErrors.push("이미 등록된 이름입니다 — 뒤에 구분자를 붙여주세요 (예: 홍길동B)");
  if (rf.pw !== "" && rf.pw.length < 4) regErrors.push("비밀번호는 4자 이상");
  if (rf.pw2 !== "" && rf.pw !== rf.pw2) regErrors.push("비밀번호가 일치하지 않습니다");
  const regReady = rf.name.trim() !== "" && !dup && rf.pw.length >= 4 && rf.pw === rf.pw2;

  const register = async () => {
    if (!regReady) return;
    const cur = loadUsers();
    const pwHash = await hashText(rf.pw);
    const nu = { id: rf.name.trim(), uid: nextUid(cur), pwHash, name: rf.name.trim(), dept: rf.dept, role: "user", joined: new Date().toLocaleString("ko-KR", { hour12: false }) };
    saveUsers([...cur, nu]);
    onLogin(nu); // 가입 즉시 자동 승인 — 바로 입장
  };

  const login = async () => {
    if (Date.now() < lock.until) {
      setMsg({ tone: "red", text: `로그인 잠금 중 — ${Math.ceil((lock.until - Date.now()) / 1000)}초 후 다시 시도하세요` });
      return;
    }
    const cur = loadUsers();
    const key = lf.name.trim();
    const u = cur.find((x) => x.name === key || x.id === key);
    let ok = false;
    if (u) {
      if (u.pwHash) ok = (await hashText(lf.pw)) === u.pwHash;
      else if (u.pw != null) {
        ok = u.pw === lf.pw;
        if (ok) { u.pwHash = await hashText(lf.pw); delete u.pw; saveUsers(cur); }
      }
    }
    if (!ok) {
      const fail = lock.fail + 1;
      if (fail >= 5) { setLock({ fail: 0, until: Date.now() + 60000 }); setMsg({ tone: "red", text: "5회 실패 — 60초간 로그인이 잠깁니다" }); }
      else { setLock({ ...lock, fail }); setMsg({ tone: "red", text: `이름 또는 비밀번호가 올바르지 않습니다 (${fail}/5)` }); }
      return;
    }
    setLock({ fail: 0, until: 0 });
    setMsg(null);
    onLogin(u);
  };

  const inputCls = "w-full bg-slate-800 border border-slate-700 rounded-lg px-3.5 py-2.5 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500";
  const label = (t) => <div className="text-[11px] text-slate-500 mb-1">{t}</div>;

  return (
    <div className="min-h-screen bg-slate-950 text-slate-100 flex items-center justify-center px-4" style={{ fontFamily: "'Pretendard', 'Noto Sans KR', system-ui, sans-serif" }}>
      <div className="w-full max-w-md">
        <div className="flex items-center justify-center gap-3 mb-6">
          <div className="w-10 h-10 rounded-lg bg-sky-500/15 border border-sky-500/40 flex items-center justify-center">
            <FlaskConical size={20} className="text-sky-400" />
          </div>
          <div>
            <div className="text-lg font-bold tracking-widest">QMES</div>
            <div className="text-[11px] text-slate-500 -mt-0.5">나모케미칼㈜  · 품질제조실행시스템</div>
          </div>
        </div>

        <div className="bg-slate-900 border border-slate-800 rounded-xl p-6">
          <div className="grid grid-cols-2 gap-1 bg-slate-800/60 rounded-lg p-1 mb-5">
            {[["login", "로그인"], ["register", "회원가입"]].map(([m, t]) => (
              <button key={m} onClick={() => { setMode(m); setMsg(null); }}
                className={`py-2 rounded-md text-sm font-medium transition-colors ${mode === m ? "bg-sky-600 text-white" : "text-slate-400 hover:text-slate-200"}`}>
                {t}
              </button>
            ))}
          </div>

          {msg && (
            <div className={`mb-4 rounded-lg px-3 py-2.5 text-xs border ${msg.tone === "green" ? "bg-emerald-500/10 border-emerald-500/40 text-emerald-300" : "bg-red-500/10 border-red-500/40 text-red-300"}`}>
              {msg.text}
            </div>
          )}

          {mode === "login" ? (
            <div className="flex flex-col gap-3">
              <div>{label("이름")}<input value={lf.name} onChange={(e) => setLf({ ...lf, name: e.target.value })} placeholder="이름 입력" className={inputCls} /></div>
              <div>{label("비밀번호")}
                <input type="password" value={lf.pw} onChange={(e) => setLf({ ...lf, pw: e.target.value })}
                  onKeyDown={(e) => e.key === "Enter" && login()} placeholder="비밀번호" className={inputCls} />
              </div>
              <button onClick={login}
                className="mt-1 w-full bg-sky-600 hover:bg-sky-500 text-white rounded-lg py-2.5 text-sm font-bold transition-colors">
                로그인
              </button>
              <p className="text-[11px] text-slate-500 text-center">관리자 초기 계정: 관리자 / 1234 · 계정이 없으면 회원가입 (즉시 사용 가능)</p>
            </div>
          ) : (
            <div className="flex flex-col gap-3">
              <div className="grid grid-cols-2 gap-3">
                <div>{label("이름")}<input value={rf.name} onChange={(e) => setRf({ ...rf, name: e.target.value })} placeholder="홍길동" className={inputCls} /></div>
                <div>{label("부서")}
                  <select value={rf.dept} onChange={(e) => setRf({ ...rf, dept: e.target.value })} className={inputCls}>
                    {DEPTS.map((d) => <option key={d}>{d}</option>)}
                  </select>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>{label("비밀번호 (4자 이상)")}<input type="password" value={rf.pw} onChange={(e) => setRf({ ...rf, pw: e.target.value })} className={inputCls} /></div>
                <div>{label("비밀번호 확인")}
                  <input type="password" value={rf.pw2} onChange={(e) => setRf({ ...rf, pw2: e.target.value })}
                    onKeyDown={(e) => e.key === "Enter" && register()} className={inputCls} />
                </div>
              </div>
              {regErrors.length > 0 && (
                <div className="bg-red-500/10 border border-red-500/40 rounded-lg px-3 py-2">
                  {regErrors.map((e, i) => <div key={i} className="text-[11px] text-red-300">· {e}</div>)}
                </div>
              )}
              <button onClick={register} disabled={!regReady}
                className={`mt-1 w-full rounded-lg py-2.5 text-sm font-bold transition-colors ${regReady ? "bg-sky-600 hover:bg-sky-500 text-white" : "bg-slate-800 text-slate-600"}`}>
                가입하고 바로 시작
              </button>
              <p className="text-[11px] text-slate-500 text-center">가입 즉시 자동 승인 · 고유번호(U-xxxx)가 자동 부여되어 이름과 함께 모든 기록에 남습니다</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function MembersTab() {
  const [users, setUsers] = useState(loadUsers);
  const [info, setInfo] = useState(null);

  const update = (next) => { setUsers(next); saveUsers(next); };
  const remove = (id) => { if (id === "admin") return; update(users.filter((u) => u.id !== id)); };
  const toggleRole = (id) => {
    if (id === "admin") return;
    update(users.map((u) => (u.id === id ? { ...u, role: u.role === "admin" ? "user" : "admin" } : u)));
  };
  const resetPw = async (id) => {
    const tempHash = await hashText("0000");
    update(users.map((u) => (u.id === id ? { ...u, pwHash: tempHash, pw: undefined } : u)));
    const t = users.find((u) => u.id === id);
    setInfo(`${t ? t.name : id} 비밀번호를 임시번호 0000 으로 초기화했습니다`);
  };
  const resetAll = () => {
    AUTH_MEM.users = null;
    try { window.localStorage.removeItem(USERS_KEY); } catch (e) { /* 무시 */ }
    dbReset();
    setUsers(loadUsers());
    setInfo("모든 회원·업무 기록(배치/검사/Lot/홀드/점검)을 초기화했습니다 — 초기 계정(관리자/1234)만 남습니다");
  };

  return (
    <div className="flex flex-col gap-4">
      {info && (
        <div className="rounded-lg px-4 py-3 text-sm border bg-emerald-500/10 border-emerald-500/40 text-emerald-300">{info}</div>
      )}

      <Panel title="회원 관리" right={
        <button onClick={resetAll}
          className="text-[11px] px-2.5 py-1.5 rounded border border-red-500/40 text-red-400 hover:bg-red-500/10 transition-colors">
          전체 기록 초기화
        </button>
      }>
        <div className="overflow-x-auto -mx-4 px-4">
          <table className="w-full text-sm min-w-[680px]">
            <thead>
              <tr className="text-xs text-slate-400 border-b border-slate-800">
                <th className="text-left py-2 pr-3 font-medium">고유번호</th>
                <th className="text-left py-2 pr-3 font-medium">이름</th>
                <th className="text-left py-2 pr-3 font-medium">부서</th>
                <th className="text-left py-2 pr-3 font-medium">가입일시</th>
                <th className="text-left py-2 pr-3 font-medium">권한</th>
                <th className="text-left py-2 font-medium">관리</th>
              </tr>
            </thead>
            <tbody>
              {users.map((u) => (
                <tr key={u.id} className="border-b border-slate-800/60 hover:bg-slate-800/30">
                  <td className="py-2.5 pr-3 font-mono text-xs text-sky-300">{u.uid || "-"}</td>
                  <td className="py-2.5 pr-3 text-slate-100">{u.name}</td>
                  <td className="py-2.5 pr-3 text-slate-300 text-xs">{u.dept}</td>
                  <td className="py-2.5 pr-3 text-xs text-slate-400 tabular-nums">{u.joined || "-"}</td>
                  <td className="py-2.5 pr-3">{u.role === "admin" ? <Badge tone="violet">관리자</Badge> : <Badge tone="gray">일반</Badge>}</td>
                  <td className="py-2.5">
                    <div className="flex gap-1.5 flex-wrap">
                      {u.id !== "admin" && (
                        <button onClick={() => toggleRole(u.id)}
                          className="text-[11px] px-2 py-1 rounded border border-violet-500/40 text-violet-300 hover:bg-violet-500/10 transition-colors">
                          {u.role === "admin" ? "관리자 해제" : "관리자 지정"}
                        </button>
                      )}
                      <button onClick={() => resetPw(u.id)}
                        className="text-[11px] px-2 py-1 rounded border border-slate-600 text-slate-300 hover:bg-slate-800 transition-colors">
                        비밀번호 초기화
                      </button>
                      {u.id !== "admin" && (
                        <button onClick={() => remove(u.id)}
                          className="text-[11px] px-2 py-1 rounded border border-red-500/40 text-red-400 hover:bg-red-500/10 transition-colors">
                          삭제
                        </button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <p className="text-[11px] text-slate-500 mt-3">
          가입은 이름·부서·비밀번호만으로 즉시 승인되며, 관리자 권한은 이 화면에서 지정·해제합니다. 비밀번호는 해시로만 저장되어 원문 조회가 불가하며, 분실 시 초기화(0000)만 가능합니다.
        </p>
      </Panel>
    </div>
  );
}

qmesStart();

</script>
</body>
</html>
