html{font-size:17px;}
html,body{background:#050D1B;}
/* ── 프리미엄 다크(네이비) 마감 ── */
body{font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',system-ui,sans-serif;
background:
 radial-gradient(1100px 480px at 14% -10%, rgba(0,170,210,.10), transparent 60%),
 radial-gradient(820px 400px at 92% -4%, rgba(51,193,232,.06), transparent 55%),
 linear-gradient(180deg,#071226 0%,#050D1B 100%);
background-attachment:fixed;}
::-webkit-scrollbar{height:10px;width:10px}
::-webkit-scrollbar-thumb{background:#24405F;border-radius:8px;border:2px solid #071226}
::-webkit-scrollbar-track{background:transparent}

/* 카드 — 다크 입체감 */
.bg-slate-900{box-shadow:0 1px 2px rgba(0,0,0,.35),0 12px 32px -20px rgba(0,0,0,.6);transition:box-shadow .25s ease}
.bg-slate-900:hover{box-shadow:0 2px 4px rgba(0,0,0,.4),0 20px 48px -22px rgba(0,0,0,.7)}

/* 슬림 헤더 — 다크 유리 질감 */
header{backdrop-filter:blur(12px);box-shadow:0 6px 22px -14px rgba(0,0,0,.7);border-bottom:1px solid rgba(255,255,255,.06)!important}
aside{border-right:1px solid rgba(255,255,255,.06)}
aside::-webkit-scrollbar{width:6px}
aside::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}

/* 주요 버튼 — 그라데이션 광택 */
.bg-sky-600{background-image:linear-gradient(180deg,#00A2D8 0%,#007BA8 100%);box-shadow:0 1px 2px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.22)}
.hover\:bg-sky-500:hover{background-image:linear-gradient(180deg,#00B4EA 0%,#008BBC 100%)}
.bg-emerald-600{background-image:linear-gradient(180deg,#0FA968 0%,#0B8653 100%)}
.bg-red-600{background-image:linear-gradient(180deg,#E5484D 0%,#C2363B 100%)}

/* 인쇄 — 선택한 성적서만 A4 세로 첫 페이지 중앙 출력 */
#qmes-print-root{display:none}

@page{
  size:A4 portrait;
  margin:8mm;
}
@media print{
  html,body{
    width:auto!important;
    min-height:0!important;
    margin:0!important;
    padding:0!important;
    background:#fff!important;
    overflow:visible!important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }

  /* 기존 화면은 공간까지 완전히 제거하고, 인쇄용 복제본만 출력 */
  body.print-doc #root{display:none!important}
  body.print-doc #qmes-print-root{
    display:block!important;
    width:194mm!important;
    margin:0 auto!important;
    padding:0!important;
    background:#fff!important;
  }

  body.print-doc #qmes-print-root .doc-paper{
    position:static!important;
    display:block!important;
    width:194mm!important;
    max-width:194mm!important;
    min-height:0!important;
    margin:0 auto!important;
    padding:5mm!important;
    border:0!important;
    border-radius:0!important;
    box-shadow:none!important;
    box-sizing:border-box!important;
    overflow:visible!important;
    background:#fff!important;
    font-size:10px!important;
    line-height:1.25!important;
    break-inside:avoid-page!important;
    page-break-inside:avoid!important;
  }

  body.print-doc #qmes-print-root .doc-paper .text-xl{font-size:16px!important;line-height:1.2!important}
  body.print-doc #qmes-print-root .doc-paper .text-sm{font-size:11px!important;line-height:1.25!important}
  body.print-doc #qmes-print-root .doc-paper .text-xs{font-size:9.5px!important;line-height:1.25!important}
  body.print-doc #qmes-print-root .doc-paper .text-\[10px\]{font-size:8.5px!important;line-height:1.2!important}
  body.print-doc #qmes-print-root .doc-paper .p-6,
  body.print-doc #qmes-print-root .doc-paper .md\:p-8{padding:0!important}
  body.print-doc #qmes-print-root .doc-paper .mt-5{margin-top:3mm!important}
  body.print-doc #qmes-print-root .doc-paper .mt-4{margin-top:2.5mm!important}
  body.print-doc #qmes-print-root .doc-paper .pb-4{padding-bottom:2.5mm!important}
  body.print-doc #qmes-print-root .doc-paper .py-2{padding-top:1.5mm!important;padding-bottom:1.5mm!important}
  body.print-doc #qmes-print-root .doc-paper .px-3{padding-left:2mm!important;padding-right:2mm!important}
  body.print-doc #qmes-print-root .doc-paper .h-14{height:12mm!important}

  body.print-doc #qmes-print-root .doc-paper table{
    width:100%!important;
    table-layout:fixed!important;
    border-collapse:collapse!important;
    break-inside:avoid-page!important;
    page-break-inside:avoid!important;
  }
  body.print-doc #qmes-print-root .doc-paper tr,
  body.print-doc #qmes-print-root .doc-paper thead,
  body.print-doc #qmes-print-root .doc-paper tbody,
  body.print-doc #qmes-print-root .doc-paper > *{
    break-inside:avoid-page!important;
    page-break-inside:avoid!important;
  }
}

.doc-paper .border-slate-900{border-color:#1c1917}.doc-paper .border-slate-400{border-color:#a8a29e}.doc-paper .border-slate-300{border-color:#d6d3d1}.doc-paper .border-slate-200{border-color:#e7e5e4}
.doc-paper .bg-slate-50{background:#fafaf9}
.doc-paper{box-shadow:0 2px 6px rgba(28,25,23,.08),0 24px 60px -24px rgba(28,25,23,.25)!important}

}

function spcStats(values, lsl, usl) {
  const n = values.length;
  const mean = values.reduce((a, b) => a + b, 0) / n;
  const sd = Math.sqrt(values.reduce((a, b) => a + (b - mean) ** 2, 0) / (n - 1));
  const cp = lsl != null && usl != null ? (usl - lsl) / (6 * sd) : null;
  const cpu = usl != null ? (usl - mean) / (3 * sd) : null;
  const cpl = lsl != null ? (mean - lsl) / (3 * sd) : null;
  const cpk = Math.min(...[cpu, cpl].filter((v) => v != null));
  return { mean, sd, cp, cpk, n };
}

function printDoc(sourceEl) {
  const source = sourceEl || Array.from(document.querySelectorAll(".doc-paper"))
    .find((el) => el.offsetParent !== null);
  const printRoot = document.getElementById("qmes-print-root");
  if (!source || !printRoot) {
    alert("인쇄할 문서를 찾을 수 없습니다.");
    return;
  }

  printRoot.innerHTML = "";
  printRoot.appendChild(source.cloneNode(true));
  document.body.classList.add("print-doc");

  let cleaned = false;
  const cleanup = () => {
    if (cleaned) return;
    cleaned = true;
    document.body.classList.remove("print-doc");
    printRoot.innerHTML = "";
    window.removeEventListener("afterprint", cleanup);
  };

  window.addEventListener("afterprint", cleanup);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      window.print();
      setTimeout(cleanup, 500);
    });
  });
}

/* ──────────────────────────── 통합 데이터 저장소 ──────────────────────────── */
/* 화면 간 연동 + 새로고침 후에도 기록 유지. 실제 서버 구축 시 이 계층만 API로 교체하면 됩니다. */

const DB_KEY = "qmes-local-iqc-v3";
const DB_RESET_MARKER = "qmes-iqc-v3-initialized";

/* 수입검사 개선본 최초 실행 시 기존 테스트 DB를 한 번 초기화합니다.
   이후 입력한 데이터는 새 DB_KEY에 저장되어 새로고침 후에도 유지됩니다. */
try {
  if (!window.localStorage.getItem(DB_RESET_MARKER)) {
    ["qmes-local-v1", "qmes-db-v1", "qmes-local-iqc-v2", DB_KEY].forEach((key) => window.localStorage.removeItem(key));
    window.localStorage.setItem(DB_RESET_MARKER, "1");
  }
} catch (e) { /* 무시 */ }

/* 공용 서버 DB(Supabase) 연결 제거
   - 입력 데이터는 이 브라우저의 localStorage에만 저장됩니다.
   - 외부 서버 전송 및 장치 간 자동 동기화는 수행하지 않습니다. */
function dbDefault() {
  return { batches: [], woDocs: {}, iqc: [], iqcMaterials: [], insp: { PQC: [], OQC: [] }, holds: [], eqReadings: {}, eqLogs: [], eqAlarms: [], complaints: [], lots: {}, coa: {}, popEntries: [], auditLogs: [], seqs: {} };
}
let DB = (() => {
  try {
    const current = window.localStorage.getItem(DB_KEY);
    if (current) return { ...dbDefault(), ...JSON.parse(current) };
    /* 기존 원본에서 저장한 로컬 데이터가 있으면 최초 1회 이어받기 */
    const legacy = window.localStorage.getItem("qmes-db-v1");
    if (legacy) {
      const migrated = { ...dbDefault(), ...JSON.parse(legacy) };
      window.localStorage.setItem(DB_KEY, JSON.stringify(migrated));
      return migrated;
    }
  } catch (e) { /* 무시 */ }
  return dbDefault();
})();

function auditLog(module, action, target, reason = "") {
  const now = new Date();
  DB.auditLogs = [{
    id: `AUD-${Date.now()}`, module, action, target, reason,
    by: (window.__QMES_USER__ || "현재 사용자"),
    at: now.toLocaleString("ko-KR", { hour12: false })
  }, ...(DB.auditLogs || [])].slice(0, 500);
}

function askDeleteReason(label) {
  const reason = window.prompt(`${label} 삭제 사유를 입력하세요.\n※ 삭제 이력은 감사 로그에 남습니다.`);
  if (reason === null) return null;
  if (!reason.trim()) { window.alert("삭제 사유를 입력해야 합니다."); return null; }
  return reason.trim();
}

function dbSave() {
  try { window.localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch (e) { /* 무시 */ }
}
function dbReset() {
  DB = dbDefault();
  try { window.localStorage.setItem(DB_KEY, JSON.stringify(DB)); } catch (e) { /* 무시 */ }
}


function downloadQmesBackup() {
  const payload = {
    format: "QMES_BACKUP_V1",
    exportedAt: new Date().toISOString(),
    data: DB,
    users: (() => {
      try { return JSON.parse(localStorage.getItem("qmes-users-v3") || "[]"); }
      catch (e) { return []; }
    })(),
    ui: {
      currentTab: localStorage.getItem("qmes_current_tab") || "dash",
      openMenu: localStorage.getItem("qmes_open_menu") || "",
      selectedWo: localStorage.getItem("qmes_selected_wo") || "",
    },
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}_${String(d.getHours()).padStart(2,"0")}${String(d.getMinutes()).padStart(2,"0")}`;
  a.href = url;
  a.download = `QMES_BACKUP_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function restoreQmesBackup() {
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".json,application/json";
  input.onchange = () => {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const payload = JSON.parse(String(reader.result || ""));
        if (payload.format !== "QMES_BACKUP_V1" || !payload.data) throw new Error("QMES 백업 파일이 아닙니다.");
        if (!confirm("현재 로컬 데이터를 백업 파일 내용으로 교체할까요?")) return;
        localStorage.setItem(DB_KEY, JSON.stringify({ ...dbDefault(), ...payload.data }));
        if (Array.isArray(payload.users)) localStorage.setItem("qmes-users-v3", JSON.stringify(payload.users));
        if (payload.ui?.currentTab) localStorage.setItem("qmes_current_tab", payload.ui.currentTab);
        if (payload.ui?.openMenu) localStorage.setItem("qmes_open_menu", payload.ui.openMenu);
        if (payload.ui?.selectedWo) localStorage.setItem("qmes_selected_wo", payload.ui.selectedWo);
        alert("복원이 완료되었습니다.");
        location.reload();
      } catch (e) {
        alert(`복원 실패: ${e.message || "파일을 확인하세요."}`);
      }
    };
    reader.readAsText(file, "utf-8");
  };
  input.click();
}

function IqcBarcodeQr({ record }) {
  const barcodeRef = React.useRef(null);
  const [qrSrc, setQrSrc] = useState("");
  const inNo = String(record?.inNo || "").trim();
  const qrText = [
    "NAMO CHEMICAL IQC",
    `입고번호: ${inNo || "-"}`,
    `입고일자: ${(record?.recv || "-").slice(0,10)}`,
    `원재료명: ${record?.name || "-"}`,
    `원재료 LOT No.: ${record?.lot || "-"}`,
    `업체명: ${record?.supplier || "-"}`,
  ].join("\\n");

  useEffect(() => {
    if (!inNo || !barcodeRef.current) return;
    try {
      window.JsBarcode(barcodeRef.current, inNo, {
        format: "CODE128",
        displayValue: false,
        margin: 0,
        height: 44,
        width: 1.55,
        lineColor: "#111111",
        background: "#ffffff",
      });
    } catch (e) {
      console.warn("Barcode render failed", e);
    }
    if (window.QRCode?.toDataURL) {
      window.QRCode.toDataURL(qrText, {
        width: 180,
        margin: 1,
        errorCorrectionLevel: "M",
        color: { dark: "#111111", light: "#ffffff" },
      }).then(setQrSrc).catch((e) => console.warn("QR render failed", e));
    }
  }, [inNo, qrText]);

  return (
    <div className="qmes-iqc-code-area">
      <div className="qmes-iqc-barcode-wrap">
        <svg ref={barcodeRef} aria-label={`입고번호 바코드 ${inNo}`} />
        <div className="qmes-iqc-code-caption">{inNo || "입고번호 미등록"}</div>
      </div>
      <div className="qmes-iqc-qr-wrap">
        {qrSrc ? <img src={qrSrc} alt={`${inNo} QR 코드`} /> : <div className="w-16 h-16 border border-slate-300" />}
        
      </div>
    </div>
  );
}

function localISODate(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function nextInspectionNo(prefix, dateValue, rows, fieldName) {
  const fullDate = String(dateValue || "").replaceAll("-", "").slice(0, 8);
  const dateKey = fullDate.length === 8 ? fullDate.slice(2) : fullDate;
  const base = `${prefix}-${dateKey}-`;
  const maxSeq = (rows || []).reduce((max, row) => {
    const value = String(row?.[fieldName] || "");
    if (!value.startsWith(base)) return max;
    const seq = Number(value.slice(base.length));
    return Number.isFinite(seq) ? Math.max(max, seq) : max;
  }, 0);
  return `${base}${String(maxSeq + 1).padStart(4, "0")}`;
}

function InspectionTab({ docName, itemKeys, initial, lotOptions, idPrefix, idStart, notice, storeKey, traceStage }) {
  const today = new Date().toISOString().slice(0, 10);
  const isOqc = storeKey === "OQC";
  const [records, setRecords] = useState(DB.insp[storeKey] || initial);
  const [form, setForm] = useState({
    date: today,
    shipDate: today,
    lot: isOqc ? (DB.batches?.[0]?.no || lotOptions?.[0] || "") : "",
    check: itemKeys[0],
    value: "",
    judge: "합격"
  });
  const [tried, setTried] = useState(false);
  const [nextId, setNextId] = useState(DB.seqs[storeKey] || idStart);
  const [editingId, setEditingId] = useState(null);
  const [recordSearch, setRecordSearch] = useState("");
  const [recordPage, setRecordPage] = useState(1);
  const [viewingRecord, setViewingRecord] = useState(null);
  const recordPageSize = 10;
  const availableLots = Array.from(new Set((DB.batches || []).map((b) => b.no).filter(Boolean)));
  const selectedBatch = (DB.batches || []).find((b) => b.no === form.lot);
  const rawSelectedProduct = selectedBatch?.itemName || selectedBatch?.item || "";
  const selectedProduct = rawSelectedProduct === "절연 슬러리" ? "" : rawSelectedProduct;
  const numberLabel = isOqc ? "출하번호" : "공정번호";
  const previewNo = editingId || nextInspectionNo(storeKey, form.date, records, "id");

  const pass = records.filter((r) => r.judge === "합격").length;
  const rate = records.length ? ((pass / records.length) * 100).toFixed(1) : "—";
  const spec = QC_ITEMS[form.check];
  const isNumericItem = spec.lo != null || spec.hi != null;
  const trimmedVal = form.value.trim();
  const inputError = isNumericItem && trimmedVal !== "" && !/^\d+(\.\d+)?$/.test(trimmedVal.replace(/,/g, ""))
    ? "숫자 형식이 아닙니다 — 오입력 상태에서는 등록(다음 단계 진입)이 금지됩니다"
    : null;
  const autoJ = isNumericItem && trimmedVal !== "" && !inputError ? autoJudge(form.check, trimmedVal) : null;
  const lotErr = isOqc && form.lot.trim() !== "" && availableLots.length > 0 && !availableLots.includes(form.lot.trim())
    ? "작업지시에서 발행된 LOT를 선택하세요." : null;
  const triedErrors = [];
  if (tried && form.lot.trim() === "") triedErrors.push("작업지시 LOT를 선택하세요.");
  if (tried && form.date.trim() === "") triedErrors.push("검사일자를 입력하세요");
  if (isOqc && tried && form.shipDate.trim() === "") triedErrors.push("출하일자를 입력하세요");
  if (tried && trimmedVal === "") triedErrors.push("측정값을 입력하세요");
  const canAdd = trimmedVal !== "" && !inputError && !lotErr && form.date.trim() !== "" && form.lot.trim() !== "" && (!isOqc || form.shipDate.trim() !== "");

  const addRecord = () => {
    if (!canAdd) { setTried(true); return; }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const date = form.date;
    const judge = isNumericItem ? autoJ : form.judge;
    const lotNo = form.lot.trim();
    const prev = editingId ? records.find((r) => r.id === editingId) : null;
    const inspectionNo = editingId || nextInspectionNo(storeKey, date, records, "id");
    const matchedProduct = (DB.batches || []).find((b) => b.no === lotNo)?.itemName || (DB.batches || []).find((b) => b.no === lotNo)?.item || prev?.product || "";
    const product = matchedProduct === "절연 슬러리" ? "" : matchedProduct;
    const rec = { id: inspectionNo, date, shipDate: isOqc ? form.shipDate : (prev?.shipDate || ""), time, lot: lotNo, product, check: form.check, value: form.value, judge, note: `${spec.stage}`, inspector: (window.__QMES_USER__ || "현재 사용자") };
    const next = editingId ? records.map((r) => r.id === editingId ? rec : r) : [rec, ...records];
    setRecords(next);
    DB.insp[storeKey] = next;
    auditLog(storeKey, editingId ? "수정" : "등록", rec.id, `${rec.lot} / ${rec.check} / ${rec.value} / ${rec.judge}`);

    /* Lot 이력 자동 반영 */
    const L = DB.lots[lotNo];
    if (L) {
      L.steps = [...L.steps, { stage: traceStage, name: `${docName.replace(" 성적서", "")} — ${form.check}`, time, detail: `측정값 ${form.value} · 규격 ${spec.spec}`, result: judge, by: rec.inspector }];
      if (judge === "불합격") L.status = "홀드 — 부적합 발생 (게이트 차단)";
      else if (traceStage === "출하") L.stage = "출하";
      else { L.stage = "생산"; if (!L.status.includes("홀드")) L.status = "생산중"; }
    }
    /* 불합격 → 자동 홀드 (게이트 차단) */
    if (judge === "불합격") {
      DB.holds = [{ id: `HLD-${String(Date.now()).slice(-6)}`, target: lotNo, type: "제품 Lot", gate: traceStage === "출하" ? "출하 게이트" : "공정 게이트", reason: `${form.check} ${form.value} — 규격(${spec.spec}) 부적합`, since: time, cond: "재검사 합격 + 품질부장 승인", status: "차단중", ncr: "-" }, ...DB.holds];
    }
    /* OQC 8항목 전부 합격 → CoA 자동 발행 */
    if (storeKey === "OQC" && L) {
      const passed = {};
      DB.insp.OQC.filter((r) => r.lot === lotNo && r.judge === "합격").forEach((r) => { passed[r.check] = r; });
      if (OQC_KEYS.every((k) => passed[k])) {
        const d = decodeLot(lotNo);
        DB.coa[lotNo] = {
          no: `COA-${lotNo}`, customer: "K배터리솔루션", product: L.itemName,
          mfg: d ? `${d.year}-${String(d.month).padStart(2, "0")}-${String(d.day).padStart(2, "0")}` : "-",
          ship: "-", shipNo: "-", qty: L.qty,
          results: OQC_KEYS.map((k) => ({ item: k, spec: QC_ITEMS[k].spec, val: passed[k].value, judge: "합격" })),
        };
        L.status = "OQC 전 항목 합격 — CoA 발행 대상";
      }
    }
    dbSave();
    setEditingId(null);
    setForm({ ...form, value: "", judge: "합격" });
    setTried(false);
  };

  const editRecord = (r) => {
    setEditingId(r.id);
    setForm({ date: r.date || today, shipDate: r.shipDate || today, lot: r.lot, check: r.check, value: String(r.value ?? ""), judge: r.judge || "합격" });
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
  const deleteRecord = (r) => {
    const reason = askDeleteReason(`${docName} ${r.id}`);
    if (reason === null) return;
    const next = records.filter((x) => x.id !== r.id);
    setRecords(next); DB.insp[storeKey] = next;
    auditLog(storeKey, "삭제", r.id, reason); dbSave();
  };

  const filteredRecords = records.filter((r) => {
    const q = recordSearch.trim().toLowerCase();
    return !q || [r.id, r.lot, r.product, r.check, r.inspector, r.judge]
      .some((v) => String(v || "").toLowerCase().includes(q));
  });
  const recordPageCount = Math.max(1, Math.ceil(filteredRecords.length / recordPageSize));
  const safeRecordPage = Math.min(recordPage, recordPageCount);
  const pagedRecords = filteredRecords.slice((safeRecordPage - 1) * recordPageSize, safeRecordPage * recordPageSize);

  return (
    <div className="flex flex-col gap-4">
      <div className="grid grid-cols-3 gap-3">
        <Kpi icon={ClipboardCheck} label="금일 검사 건수" value={records.length} unit="건" tone="text-sky-400" />
        <Kpi icon={CheckCircle2} label="합격률" value={rate} unit="%" tone="text-emerald-400" />
        <Kpi icon={XCircle} label="부적합" value={records.length - pass} unit="건" tone="text-red-400" />
      </div>

      {notice && (
        <div className="flex items-center gap-2.5 bg-sky-500/10 border border-sky-500/30 rounded-lg px-4 py-3">
          <ClipboardCheck size={15} className="text-sky-400 shrink-0" />
          <p className="text-sm text-sky-200">{notice}</p>
        </div>
      )}

      <Panel title="검사 결과 등록" right={spec && <span className="text-xs text-slate-400">규격: <span className="text-sky-300">{spec.spec}</span> · {spec.method} · {spec.type !== "-" && <Badge tone="violet">{spec.type}</Badge>}</span>}>
        <div className="overflow-x-auto pb-1">
          <div className={`qmes-register-grid ${isOqc ? "qmes-register-grid-oqc" : "qmes-register-grid-pqc"}`}>
          <div className="flex flex-col gap-1">
            <label className="text-xs font-medium text-slate-400">{numberLabel}</label>
            <input value={previewNo} readOnly
              className="bg-slate-800/60 border border-slate-700 rounded px-3 py-2 text-sm text-slate-400 font-mono cursor-not-allowed" />
          </div>
          <div className="flex flex-col gap-1">
            <label className="text-xs font-medium text-slate-400">검사일자</label>
            <input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })}
              aria-label="검사일자"
              className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500" />
          </div>
          {isOqc && (
            <div className="flex flex-col gap-1">
              <label className="text-xs font-medium text-slate-400">출하일자</label>
              <input type="date" value={form.shipDate} onChange={(e) => setForm({ ...form, shipDate: e.target.value })}

                <th className="text-center py-2 px-3 font-medium whitespace-nowrap">관리</th>
              </tr>
            </thead>
            <tbody>
              {filteredRecords.length === 0 && (
                <tr><td colSpan={isOqc ? 11 : 10} className="py-6 text-center text-sm text-slate-500">검사 기록이 없습니다 — 상단에서 측정값을 등록하면 여기에 기록됩니다.</td></tr>
              )}
              {pagedRecords.map((r) => (
                <tr key={r.id} className="border-b border-slate-800/60 hover:bg-slate-800/30">
                  <td className="py-2.5 px-3 font-mono text-xs text-sky-300 truncate" title={r.id}>{r.id}</td>
                  <td className="py-2.5 px-3 text-xs font-mono text-slate-300 whitespace-nowrap">{r.date || "-"}</td>
                  <td className="py-2.5 px-3 text-xs font-mono text-slate-300 truncate" title={r.lot}>{r.lot}</td>
                  <td className="py-2.5 px-3 text-slate-300 truncate" title={r.product || "-"}>{r.product || (DB.batches || []).find((b) => b.no === r.lot)?.itemName || (DB.batches || []).find((b) => b.no === r.lot)?.item || "-"}</td>
                  <td className="py-2.5 px-3 text-slate-100 truncate" title={r.check}>
                    {r.check} {QC_ITEMS[r.check]?.type === "CTQ" && <Badge tone="violet">CTQ</Badge>}
                  </td>
                  <td className="py-2.5 px-3 text-xs text-slate-400 truncate" title={QC_ITEMS[r.check]?.spec || "-"}>{QC_ITEMS[r.check]?.spec || "-"}</td>
                  <td className="py-2.5 px-3 text-slate-300 tabular-nums truncate" title={String(r.value)}>{r.value}</td>
                  <td className="py-2.5 px-3"><Badge tone={r.judge === "합격" ? "green" : "red"}>{r.judge}</Badge></td>
                  <td className="py-2.5 px-3 text-slate-400 text-xs truncate" title={r.inspector}>{r.inspector}</td>
                  {isOqc && <td className="py-2.5 px-3 text-xs font-mono text-slate-300 whitespace-nowrap">{r.shipDate || "-"}</td>}
                  <td className="py-2.5 px-3 text-center whitespace-nowrap">
                    <button onClick={() => setViewingRecord(r)} className="px-2 py-1 mr-1 rounded border border-emerald-500/40 text-emerald-300 text-xs hover:bg-emerald-500/10">보기</button>
                    <button onClick={() => editRecord(r)} className="px-2 py-1 mr-1 rounded border border-sky-500/40 text-sky-300 text-xs hover:bg-sky-500/10">수정</button>
                    <button onClick={() => deleteRecord(r)} className="px-2 py-1 rounded border border-red-500/40 text-red-300 text-xs hover:bg-red-500/10">삭제</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        {filteredRecords.length > recordPageSize && (
          <div className="flex items-center justify-center gap-2 mt-3">
            <button onClick={() => setRecordPage((p) => Math.max(1, p - 1))}
              disabled={safeRecordPage === 1}
              className="px-3 py-1.5 rounded border border-slate-700 text-xs text-slate-300 disabled:opacity-40">이전</button>
            <span className="text-xs text-slate-400">{safeRecordPage} / {recordPageCount}</span>
            <button onClick={() => setRecordPage((p) => Math.min(recordPageCount, p + 1))}
              disabled={safeRecordPage === recordPageCount}
              className="px-3 py-1.5 rounded border border-slate-700 text-xs text-slate-300 disabled:opacity-40">다음</button>
          </div>
        )}
      </Panel>
      {viewingRecord && (
        <QualityInspectionViewer
          type={storeKey}
          record={viewingRecord}
          records={records}
          onClose={() => setViewingRecord(null)}
        />
      )}
    </div>
  );
}

function EquipmentTab() {
  const TODAY = new Date().toISOString().slice(0, 10);
  if (DB.eqDate !== TODAY) { DB.eqDate = TODAY; DB.eqReadings = {}; dbSave(); } // 일일 점검표 — 날짜가 바뀌면 점검현황 초기화 (기록·알람 이력은 유지)

  const [eqId, setEqId] = useState(EQUIPMENT[0].id);
  const [pk, setPk] = useState(EQUIPMENT[0].params[0].k);
  const [val, setVal] = useState("");
  const [visOk, setVisOk] = useState(null);
  const [tried, setTried] = useState(false);
  const [readings, setReadings] = useState(DB.eqReadings);
  const [logs, setLogs] = useState(DB.eqLogs);
  const [alarms, setAlarms] = useState(DB.eqAlarms);
  const [mode, setMode] = useState("single");
  const [tourIdx, setTourIdx] = useState(0);
  const [tourVals, setTourVals] = useState({});
  const [tourTried, setTourTried] = useState(false);

  const eq = EQUIPMENT.find((e) => e.id === eqId);
  const param = eq.params.find((x) => x.k === pk) || eq.params[0];
  const isVisual = !!param.visual;
  const trimmed = val.trim();
  const numOk = /^-?\d+(\.\d+)?$/.test(trimmed);
  const inputError = !isVisual && trimmed !== "" && !numOk ? "숫자만 입력할 수 있습니다 — 저장 진입 금지" : null;
  const num = parseFloat(trimmed);
  const judge = isVisual
    ? (visOk == null ? null : visOk ? "정상" : "이탈")
    : (trimmed === "" || !numOk ? null : ((param.lo == null || num >= param.lo) && (param.hi == null || num <= param.hi)) ? "정상" : "이탈");
  const triedErrors = [];
  if (tried && judge == null && !inputError) triedErrors.push(isVisual ? "이상 없음 / 이상 발견 중 하나를 선택하세요" : "판독값을 입력하세요");

  const selectParam = (id, k) => { setEqId(id); setPk(k); setVal(""); setVisOk(null); setTried(false); };

  const save = () => {
    if (judge == null || inputError) { setTried(true); return; }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const display = isVisual ? (visOk ? "이상 없음" : "이상 발견") : `${trimmed} ${param.unit || ""}`.trim();
    const nextReadings = { ...readings, [`${eq.id}:${param.k}`]: { v: display, ok: judge === "정상", time } };
    const nextLogs = [{ time, eqName: eq.name, item: param.label, v: display, judge, by: window.__QMES_USER__ || "-" }, ...logs];
    setReadings(nextReadings); setLogs(nextLogs);
    DB.eqReadings = nextReadings; DB.eqLogs = nextLogs;
    if (judge === "이탈") {
      const nextAlarms = [{ time, eq: eq.id, msg: `${param.label} ${display} — 관리기준(${param.spec}) 이탈, 점검·조치 필요`, level: "경고" }, ...alarms];
      setAlarms(nextAlarms); DB.eqAlarms = nextAlarms;
    }
    dbSave();
    setVal(""); setVisOk(null); setTried(false);
  };

  /* ── 순회 점검 (설비 앞에서 PLC 육안 확인 → 전 항목 기록 → 다음 설비) ── */
  const tourEq = EQUIPMENT[tourIdx];
  const tourJudge = (x, raw) => {
    if (x.visual) return raw === true ? "정상" : raw === false ? "이탈" : null;
    const t = String(raw ?? "").trim();
    if (!/^-?\d+(\.\d+)?$/.test(t)) return null;
    const n = parseFloat(t);
    return ((x.lo == null || n >= x.lo) && (x.hi == null || n <= x.hi)) ? "정상" : "이탈";
  };
  const tourSave = () => {
    if (tourEq.params.some((x) => tourJudge(x, tourVals[x.k]) == null)) { setTourTried(true); return; }
    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    let nr = { ...readings }; let nl = [...logs]; let na = [...alarms];
    tourEq.params.forEach((x) => {
      const raw = tourVals[x.k];
      const j = tourJudge(x, raw);
      const display = x.visual ? (raw ? "이상 없음" : "이상 발견") : `${String(raw).trim()} ${x.unit || ""}`.trim();
      nr[`${tourEq.id}:${x.k}`] = { v: display, ok: j === "정상", time };
      nl = [{ time, eqName: tourEq.name, item: x.label, v: display, judge: j, by: window.__QMES_USER__ || "-" }, ...nl];
      if (j === "이탈") na = [{ time, eq: tourEq.id, msg: `${x.label} ${display} — 관리기준(${x.spec}) 이탈, 점검·조치 필요`, level: "경고" }, ...na];
    });
    setReadings(nr); setLogs(nl); setAlarms(na);
    DB.eqReadings = nr; DB.eqLogs = nl; DB.eqAlarms = na;
    dbSave();
    setTourVals({}); setTourTried(false);
    if (tourIdx < EQUIPMENT.length - 1) setTourIdx(tourIdx + 1);
    else { setMode("single"); setTourIdx(0); }
  };
  const totalParams = EQUIPMENT.reduce((a, e) => a + e.params.length, 0);
  const doneParams = EQUIPMENT.reduce((a, e) => a + e.params.filter((x) => readings[`${e.id}:${x.k}`]).length, 0);

  return (
    <div className="flex flex-col gap-4">
      <div className="flex flex-wrap items-center justify-between gap-3 bg-slate-900 border border-slate-800 rounded-lg px-4 py-3">
        <div className="flex items-center gap-2.5 min-w-0">
          <ClipboardList size={15} className="text-amber-400 shrink-0" />
          <p className="text-sm text-slate-300">
            <span className="text-amber-400 font-medium">PLC·계측기 육안 확인 → iPad 기록</span> 체제 — 판정은 시스템 자동, 이탈 시 즉시 알람. 판독값 항목은 향후 PLC 자동 수집 전환 대상입니다.
          </p>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          {doneParams < totalParams
            ? <Badge tone="amber">금일 점검 {doneParams}/{totalParams} — 미완료</Badge>
            : <Badge tone="green">금일 점검 완료 {doneParams}/{totalParams}</Badge>}
          {mode === "single" && (
            <button onClick={() => { setMode("tour"); setTourIdx(0); setTourVals({}); setTourTried(false); }}
              className="flex items-center gap-1.5 rounded px-3 py-1.5 text-xs font-medium bg-sky-600 hover:bg-sky-500 text-white transition-colors">
              <RotateCw size={13} /> 순회 점검 시작
            </button>
          )}
        </div>
      </div>

      {/* 순회 점검 모드 */}
      {mode === "tour" && (
      <Panel title={`순회 점검 ${tourIdx + 1} / ${EQUIPMENT.length} — ${tourEq.name}`}
        right={<button onClick={() => setMode("single")} className="text-[11px] px-2.5 py-1.5 rounded border border-slate-600 text-slate-300 hover:bg-slate-800 transition-colors">순회 종료</button>}>
        <p className="text-xs text-slate-400 mb-3">설비 앞에서 PLC 패널·계측기를 육안 확인한 뒤 항목을 순서대로 기록하세요. 전 항목 기록 전에는 다음 설비로 진입할 수 없습니다.</p>
        <div className="flex flex-col gap-2.5">
          {tourEq.params.map((x) => {
            const raw = tourVals[x.k];
            const j = tourJudge(x, raw);
            return (
              <div key={x.k} className="flex flex-col md:flex-row md:items-center gap-2 bg-slate-800/50 border border-slate-700/60 rounded-lg px-3 py-2.5">
                <div className="md:w-64 shrink-0">
                  <div className="text-sm text-slate-100">{x.label}</div>
                  <div className="text-[11px] text-slate-500">기준 {x.spec} · {x.src}</div>
                </div>
                {x.visual ? (
                  <div className="flex gap-2 flex-1">
                    <button onClick={() => setTourVals({ ...tourVals, [x.k]: true })}
                      className={`flex-1 rounded border px-3 py-2.5 text-sm font-medium transition-colors ${raw === true ? "bg-emerald-500/20 border-emerald-500/60 text-emerald-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>이상 없음</button>
                    <button onClick={() => setTourVals({ ...tourVals, [x.k]: false })}
                      className={`flex-1 rounded border px-3 py-2.5 text-sm font-medium transition-colors ${raw === false ? "bg-red-500/20 border-red-500/60 text-red-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>이상 발견</button>
                  </div>
                ) : (
                  <input inputMode="decimal" value={raw ?? ""} onChange={(e) => setTourVals({ ...tourVals, [x.k]: e.target.value })}
                    placeholder={`판독값 입력 ${x.unit ? `(${x.unit})` : ""}`}
                    className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-base text-center tabular-nums text-slate-100 placeholder-slate-500 placeholder:text-sm focus:outline-none focus:border-sky-500" />
                )}
                <div className="md:w-16 text-center shrink-0">
                  {j == null ? <Badge tone="gray">대기</Badge> : j === "정상" ? <Badge tone="green">정상</Badge> : <Badge tone="red">이탈</Badge>}
                </div>
              </div>
            );
          })}
        </div>
        {tourTried && tourEq.params.some((x) => tourJudge(x, tourVals[x.k]) == null) && (
          <div className="mt-2 bg-red-500/10 border border-red-500/40 rounded px-3 py-2">
            <div className="flex items-center gap-2 text-xs text-red-300"><XCircle size={13} className="shrink-0" /> 미기록 또는 형식 오류 항목이 있습니다 — 전 항목 기록 전 다음 설비 진입 금지</div>
          </div>
        )}
        <div className="flex items-center justify-between mt-3">
          <button onClick={() => { if (tourIdx > 0) { setTourIdx(tourIdx - 1); setTourVals({}); setTourTried(false); } }}
            className={`px-4 py-2.5 rounded-lg border text-sm transition-colors ${tourIdx === 0 ? "border-slate-800 text-slate-600" : "border-slate-600 text-slate-300 hover:bg-slate-800"}`}>
            ← 이전 설비
          </button>
          <button onClick={tourSave}
            className="px-5 py-2.5 rounded-lg bg-sky-600 hover:bg-sky-500 text-white text-sm font-bold transition-colors">
            {tourIdx < EQUIPMENT.length - 1 ? "이 설비 기록 저장 → 다음 설비" : "이 설비 기록 저장 · 순회 완료"}
          </button>
        </div>
      </Panel>
      )}

      {/* 개별 점검 입력 (단일 모드) */}
      {mode === "single" && (
      <Panel title="설비 점검 입력 (개별)" right={<span className="text-xs text-slate-400">관리기준: <span className="text-sky-300">{param.spec}</span> · {param.src}</span>}>
        <div className="grid grid-cols-2 md:grid-cols-5 gap-2 items-end">
          <div className="flex flex-col gap-1 col-span-2 md:col-span-1">
            <span className="text-[10px] text-slate-500">설비</span>
            <select value={eqId} onChange={(e) => { const ne = EQUIPMENT.find((x) => x.id === e.target.value); setEqId(ne.id); setPk(ne.params[0].k); setVal(""); setVisOk(null); }}
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              {EQUIPMENT.map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
          </div>
          <div className="flex flex-col gap-1">
            <span className="text-[10px] text-slate-500">관리항목</span>
            <select value={param.k} onChange={(e) => { setPk(e.target.value); setVal(""); setVisOk(null); }}
              className="bg-slate-800 border border-slate-700 rounded px-2 py-2 text-sm text-slate-100 focus:outline-none focus:border-sky-500">
              {eq.params.map((x) => <option key={x.k} value={x.k}>{x.label}</option>)}
            </select>
          </div>
          {isVisual ? (
            <div className="flex gap-2 col-span-2">
              <button onClick={() => setVisOk(true)}
                className={`flex-1 rounded border px-3 py-2 text-sm font-medium transition-colors ${visOk === true ? "bg-emerald-500/20 border-emerald-500/60 text-emerald-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
                이상 없음
              </button>
              <button onClick={() => setVisOk(false)}
                className={`flex-1 rounded border px-3 py-2 text-sm font-medium transition-colors ${visOk === false ? "bg-red-500/20 border-red-500/60 text-red-300" : "bg-slate-800 border-slate-700 text-slate-300"}`}>
                이상 발견
              </button>
            </div>
          ) : (
            <div className="flex flex-col gap-1 col-span-2">
              <span className="text-[10px] text-slate-500">판독값 {param.unit && `(${param.unit})`}</span>
              <input inputMode="decimal" value={val} onChange={(e) => setVal(e.target.value)}
                placeholder={`판독값 입력 — 기준 ${param.spec}`}
                className="bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm tabular-nums text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
            </div>
          )}
          <div className="flex items-center gap-2">
            {judge == null ? <Badge tone="gray">대기</Badge> : judge === "정상" ? <Badge tone="green">정상</Badge> : <Badge tone="red">이탈</Badge>}
            <button onClick={save}
              className="flex-1 flex items-center justify-center gap-1.5 rounded px-3 py-2 text-sm font-medium transition-colors bg-sky-600 hover:bg-sky-500 text-white">
              <Plus size={14} /> 기록
            </button>
          </div>
        </div>
        {(inputError || triedErrors.length > 0) && (
          <div className="mt-2 bg-red-500/10 border border-red-500/40 rounded px-3 py-2">
            {[inputError, ...triedErrors].filter(Boolean).map((e, i) => (
              <div key={i} className="flex items-center gap-2 text-xs text-red-300"><XCircle size={13} className="shrink-0" /> {e}</div>
            ))}
          </div>
        )}
      </Panel>
      )}

      {/* 설비 카드 — 기록값 실시간 반영, 항목 클릭 시 입력으로 연결 */}
      <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-3">
        {EQUIPMENT.map((e) => {
          const rs = e.params.map((x) => readings[`${e.id}:${x.k}`]);
          const bad = rs.some((r) => r && !r.ok);
          const done = rs.filter(Boolean).length;
          const st = bad ? "alarm" : done > 0 ? "run" : "idle";
          const m = statusMeta[st];
          return (
            <div key={e.id} className={`bg-slate-900 border ${m.ring} rounded-lg p-4`}>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-2 min-w-0">
                  <Cpu size={16} className="text-slate-400 shrink-0" />
                  <span className="text-sm font-medium text-slate-100 truncate">{e.name}</span>
                </div>
                <span className="flex items-center gap-1.5 shrink-0">
                  <span className={`w-2 h-2 rounded-full ${m.dot} ${st === "run" ? "animate-pulse" : ""}`} />
                  <span className={`text-xs font-medium ${m.text}`}>{st === "run" ? "점검중" : m.label}</span>
                </span>
              </div>
              <div className="text-xs text-slate-500 font-mono mt-0.5">{e.id}</div>
              <div className="mt-3">
                <div className="flex justify-between text-xs mb-1">
                  <span className="text-slate-400">금일 점검</span>
                  <span className="tabular-nums text-slate-200">{done} / {e.params.length}</span>
                </div>
                <div className="h-1.5 bg-slate-800 rounded overflow-hidden">
                  <div className={`h-full rounded ${bad ? "bg-red-400" : "bg-emerald-400"}`} style={{ width: `${(done / e.params.length) * 100}%` }} />
                </div>
              </div>
              <div className="grid grid-cols-1 gap-2 mt-3">
                {e.params.map((x, i) => {
                  const r = readings[`${e.id}:${x.k}`];
                  return (
                    <button key={x.k} onClick={() => selectParam(e.id, x.k)}
                      className="flex items-center justify-between bg-slate-800/60 hover:bg-slate-800 rounded px-2.5 py-2 gap-2 text-left transition-colors">
                      <div className="flex items-center gap-2 min-w-0">
                        {i === 0 ? <Thermometer size={13} className="text-amber-400 shrink-0" /> : <Gauge size={13} className="text-sky-400 shrink-0" />}
                        <span className="text-[11px] text-slate-400 truncate">{x.label} ({x.spec})</span>
                      </div>
                      <div className="flex items-center gap-1.5 shrink-0">
                        <span className={`text-xs tabular-nums ${r ? (r.ok ? "text-slate-200" : "text-red-400 font-medium") : "text-slate-500"}`}>{r ? r.v : "—"}</span>
                        {r && <span className="text-[9px] text-slate-500 font-mono">{r.time}</span>}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* 점검 기록 */}
      <Panel title="설비 점검 기록" right={<span className="text-xs text-slate-400">{logs.length}건 · 기록자 자동 저장</span>}>
        {logs.length === 0 ? (
          <p className="text-sm text-slate-500">점검 기록이 없습니다 — 위 [설비 점검 입력]에서 판독값을 기록하세요. 설비 카드의 항목을 클릭해도 바로 입력으로 연결됩니다.</p>
        ) : (
          <div className="overflow-x-auto -mx-4 px-4">
            <table className="w-full text-sm min-w-[620px]">
              <thead>
                <tr className="text-xs text-slate-400 border-b border-slate-800">
                  <th className="text-left py-2 pr-3 font-medium">시각</th>
                  <th className="text-left py-2 px-3 font-medium">설비</th>
                  <th className="text-left py-2 pr-3 font-medium">관리항목</th>
                  <th className="text-left py-2 pr-3 font-medium">판독값</th>
                  <th className="text-left py-2 pr-3 font-medium">판정</th>
                  <th className="text-left py-2 font-medium">기록자</th>
                </tr>
              </thead>
              <tbody>
                {logs.map((l, i) => (
                  <tr key={i} className="border-b border-slate-800/60 hover:bg-slate-800/30">
                    <td className="py-2.5 pr-3 text-xs font-mono text-slate-400">{l.time}</td>
                    <td className="py-2.5 pr-3 text-slate-100 text-xs">{l.eqName}</td>
                    <td className="py-2.5 pr-3 text-slate-300 text-xs">{l.item}</td>
                    <td className="py-2.5 pr-3 tabular-nums text-slate-200">{l.v}</td>
                    <td className="py-2.5 pr-3"><Badge tone={l.judge === "정상" ? "green" : "red"}>{l.judge}</Badge></td>
                    <td className="py-2.5 text-xs text-slate-400">{l.by}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </Panel>

      {/* 알람 이력 */}
      <Panel title="설비 · 공정 알람 이력" right={<Badge tone="red">{alarms.length}건</Badge>}>
        <ul className="flex flex-col divide-y divide-slate-800/60">
          {alarms.length === 0 && <li className="py-1 text-sm text-slate-500">알람 이력이 없습니다 — 관리기준 이탈 기록 시 자동 발생합니다.</li>}
          {alarms.map((a, i) => (
            <li key={i} className="flex items-start gap-3 py-2.5">
              <Badge tone="amber">{a.level}</Badge>
              <span className="text-xs font-mono text-slate-500 w-12 shrink-0 pt-0.5">{a.time}</span>
              <span className="text-xs text-slate-400 w-24 shrink-0 pt-0.5 font-mono">{a.eq}</span>
              <span className="text-sm text-slate-200">{a.msg}</span>
            </li>
          ))}
        </ul>
      </Panel>
    </div>
  );
}

/* ──────────────────────────── Lot 추적 탭 ──────────────────────────── */

const STAGE_META = {
  수입: { icon: ArrowDownToLine, color: "text-violet-400", bg: "bg-violet-500/10 border-violet-500/40", line: "bg-violet-500/40" },
  생산: { icon: FlaskConical, color: "text-sky-400", bg: "bg-sky-500/10 border-sky-500/40", line: "bg-sky-500/40" },
  출하: { icon: Truck, color: "text-emerald-400", bg: "bg-emerald-500/10 border-emerald-500/40", line: "bg-emerald-500/40" },
};

function resultTone(r) {
  if (r.includes("불합격")) return "red";
  if (r.includes("진행중")) return "blue";
  if (r.includes("조건부")) return "amber";
  return "green";
}

function TraceTab() {
  const lotIds = Object.keys(DB.lots);
  const [query, setQuery] = useState("");
  const [selected, setSelected] = useState(lotIds[0]);
  const lot = DB.lots[selected];
  const dec = decodeLot(selected);

  if (!lot) {
    return (
      <Panel title="Lot 추적">
        <p className="text-sm text-slate-500">등록된 Lot이 없습니다 — 작업지시 발행 후 생산·검사 실적이 기록되면 Lot 이력이 자동 생성됩니다.</p>
      </Panel>
    );
  }

  const filtered = lotIds.filter(
    (id) => id.toLowerCase().includes(query.toLowerCase()) || DB.lots[id].itemName.includes(query)
  );

  const stageDone = (s) => {
    if (lot.stage === "출하") return true;
    if (lot.stage === "생산") return s !== "출하";
    return s === "수입";
  };

  return (
    <div className="flex flex-col gap-4">
      <Panel title="Lot 검색">
        <div className="flex items-center gap-2 bg-slate-800 border border-slate-700 rounded px-3 py-2 focus-within:border-sky-500">
          <Search size={15} className="text-slate-500" />
          <input value={query} onChange={(e) => setQuery(e.target.value)}
            placeholder="Lot 번호 또는 품명 검색 (예: CBG0701)"
            className="flex-1 bg-transparent text-sm text-slate-100 placeholder-slate-500 focus:outline-none" />
        </div>
        <div className="flex flex-wrap gap-2 mt-3">
          {filtered.length === 0 && <p className="text-sm text-slate-500">일치하는 Lot이 없습니다. 번호를 다시 확인해 주세요.</p>}
          {filtered.map((id) => (
            <button key={id} onClick={() => setSelected(id)}
              className={`px-3 py-1.5 rounded border text-xs font-mono transition-colors ${
                selected === id ? "bg-sky-500/15 border-sky-500/50 text-sky-300" : "bg-slate-800 border-slate-700 text-slate-300 hover:border-slate-500"
              }`}>
              {id} <span className="text-slate-500 ml-1">{DB.lots[id].itemName}</span>
            </button>
          ))}
        </div>
        <p className="text-[11px] text-slate-500 mt-3">
          Lot 채번 체계: [생산사이트 A외부(OEM)/B Lab/C Pilot/D 양산][년도 A=2025, B=2026…][월 A=1월…G=7월][일 2자리][당일 일련번호] — 예: <span className="font-mono text-slate-400">CBG0701</span> = Pilot · 2026년 7월 1일 · 01호
        </p>
      </Panel>

      <Panel
        title={`Lot 이력 — ${selected}`}
        right={<Badge tone={lot.status.includes("출하완료") ? "green" : lot.status.includes("근접") || lot.status.includes("격리") ? "amber" : "blue"}>{lot.status}</Badge>}
      >
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          <div><div className="text-xs text-slate-500">품목</div><div className="text-sm text-slate-100 mt-0.5">{lot.itemName}</div></div>
          <div><div className="text-xs text-slate-500">수량</div><div className="text-sm text-slate-100 mt-0.5 tabular-nums">{lot.qty}</div></div>
          <div><div className="text-xs text-slate-500">배치번호</div><div className="text-xs text-sky-300 mt-1 font-mono">{lot.wo}</div></div>
          <div><div className="text-xs text-slate-500">현재 단계</div><div className="text-sm text-slate-100 mt-0.5">{lot.stage}</div></div>
        </div>

        {dec && (

/* ──────────────────────────── SPC / 공정능력 (Cpk) 탭 ──────────────────────────── */

function cpkGrade(cpk) {
  if (cpk >= 1.67) return { label: "우수 (≥1.67)", tone: "green" };
  if (cpk >= 1.33) return { label: "적합 (≥1.33)", tone: "blue" };
  if (cpk >= 1.0) return { label: "개선 필요 (<1.33)", tone: "amber" };
  return { label: "부적합 (<1.00)", tone: "red" };
}

function SpcTab() {
  const [item, setItem] = useState("점도");
  const cfg = SPC_CONFIG[item];
  const values = cfg.data.map((d) => d.v);
  const s = values.length >= 2 ? spcStats(values, cfg.lsl, cfg.usl) : null;
  const grade = s ? cpkGrade(s.cpk) : { label: "데이터 없음 (검사 2건 이상 필요)", tone: "gray" };
  const fmt = (v, d = 2) => (v == null ? "—" : v.toFixed(d));

  return (
    <div className="flex flex-col gap-4">
      <div className="flex flex-wrap gap-1.5">
        {Object.keys(SPC_CONFIG).map((k) => (
          <button key={k} onClick={() => setItem(k)}
            className={`px-3 py-1.5 rounded border text-xs transition-colors ${
              item === k ? "bg-sky-500/15 border-sky-500/50 text-sky-300" : "bg-slate-800 border-slate-700 text-slate-400 hover:border-slate-500"
            }`}>
            {k} <span className="text-slate-500 ml-1">{SPC_CONFIG[k].spec}</span>
          </button>
        ))}
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
        <Kpi icon={BarChart3} label="평균 (x̄)" value={s ? fmt(s.mean, item === "점도" ? 0 : 2) : "—"} unit={cfg.unit} tone="text-sky-400" />
        <Kpi icon={Activity} label="표준편차 (σ)" value={s ? fmt(s.sd, item === "점도" ? 1 : 3) : "—"} unit={cfg.unit} tone="text-violet-400" />
        <Kpi icon={Gauge} label="Cp" value={s ? fmt(s.cp) : "—"} unit={s && s.cp == null ? "(단측규격)" : ""} tone="text-slate-400" />
        <Kpi icon={Gauge} label="Cpk" value={s ? fmt(s.cpk) : "—"} tone={grade.tone === "green" ? "text-emerald-400" : grade.tone === "blue" ? "text-sky-400" : grade.tone === "amber" ? "text-amber-400" : "text-red-400"} />
        <div className="bg-slate-900 border border-slate-800 rounded-lg p-4 flex flex-col justify-center gap-2">
          <span className="text-xs text-slate-400">공정능력 판정</span>
          <Badge tone={grade.tone}>{grade.label}</Badge>
          <span className="text-[10px] text-slate-500">특별특성(CTQ) 목표 Cpk ≥ 1.67</span>
        </div>
      </div>

      <Panel title={`${item} 관리도 — 최근 ${values.length}배치`} right={<Badge tone="violet">CTQ</Badge>}>
        <ResponsiveContainer width="100%" height={280}>
          <LineChart data={cfg.data}>
            <CartesianGrid stroke="#16283E" strokeDasharray="3 3" />
            <XAxis dataKey="b" stroke="#8AA3C0" fontSize={11} />
            <YAxis stroke="#8AA3C0" fontSize={11} domain={cfg.domain} />
            <Tooltip {...chartTooltip} />
            {cfg.usl != null && <ReferenceLine y={cfg.usl} stroke="#38bdf8" strokeDasharray="4 4" label={{ value: `USL ${cfg.usl.toLocaleString()}`, fill: "#7dd3fc", fontSize: 10, position: "insideTopRight" }} />}

            {s && <ReferenceLine y={s.mean} stroke="#fbbf24" strokeDasharray="6 3" label={{ value: "x̄", fill: "#fbbf24", fontSize: 10, position: "insideLeft" }} />}

/* ──────────────────────────── 검사 성적서 통합 조회 · 인쇄 ──────────────────────────── */

function InspectionReportsTab() {
  const [type, setType] = useState("IQC");
  const dataByType = {
    IQC: DB.iqc || [],
    PQC: DB.insp?.PQC || [],
    OQC: DB.insp?.OQC || [],
  };

  const reportIds = type === "IQC"
    ? dataByType.IQC.map((r) => r.inNo || r.lot).filter(Boolean)
    : Array.from(new Set(dataByType[type].map((r) => r.lot).filter(Boolean)));
  const [sel, setSel] = useState(reportIds[0] || "");
  const [reportPage, setReportPage] = useState(1);
  const reportPageSize = 10;
  const reportPageCount = Math.max(1, Math.ceil(reportIds.length / reportPageSize));
  const safeReportPage = Math.min(reportPage, reportPageCount);
  const pagedReportIds = reportIds.slice((safeReportPage - 1) * reportPageSize, safeReportPage * reportPageSize);

  useEffect(() => {
    setSel(reportIds[0] || "");
    setReportPage(1);
  }, [type]);

  const iqc = type === "IQC" ? dataByType.IQC.find((r) => (r.inNo || r.lot) === sel) : null;
  const inspectionRows = type === "IQC" ? [] : dataByType[type].filter((r) => r.lot === sel);
  const batch = DB.batches.find((b) => b.no === sel) || {};
  const latestByItem = {};
  inspectionRows.forEach((r) => { if (!latestByItem[r.check]) latestByItem[r.check] = r; });
  const itemOrder = type === "PQC" ? PQC_KEYS : OQC_KEYS;

/* ──────────────────────────── 수입검사 (IQC) 탭 ──────────────────────────── */

function iqcTone(v) {
  if (v === "합격") return "green";
  if (v === "검사중") return "blue";
  if (v.includes("조건부")) return "amber";
  return "red"; // 불합격 / 반품
}

function IqcTab() {
  const [rows, setRows] = useState(DB.iqc);
  const today = localISODate();
  const currentMonth = today.slice(0, 7);
  const emptyForm = () => ({
    recvDate: today,
    inNoMode: "auto",
    manualInNo: "",
    lot: "",
    name: "NMP",
    supplier: "",
    qty: "",
    inspectQty: "",
    defectQty: "0 EA",
    visual: "합격",
    label: "합격",
    weight: "합격",
    coa: "합격",
    inspector: "",
    remarks: ""
  });
  const [form, setForm] = useState(emptyForm);
  const [tried, setTried] = useState(false);
  const [editingInNo, setEditingInNo] = useState(null);
  const [viewingIqc, setViewingIqc] = useState(null);
  const [materialOptions, setMaterialOptions] = useState(() => [...new Set([...IQC_MATERIALS, ...(DB.iqcMaterials || [])])]);

  const addMaterialOption = () => {
    const value = window.prompt("추가할 원재료명을 입력하세요.");
    if (value === null) return;
    const name = value.trim();
    if (!name) { window.alert("원재료명을 입력하세요."); return; }
    if (materialOptions.some((m) => m.toLowerCase() === name.toLowerCase())) {
      window.alert("이미 등록된 원재료명입니다.");
      setForm((prev) => ({ ...prev, name: materialOptions.find((m) => m.toLowerCase() === name.toLowerCase()) || prev.name }));
      return;
    }
    const next = [...materialOptions, name];
    setMaterialOptions(next);
    DB.iqcMaterials = [...(DB.iqcMaterials || []), name];
    dbSave();
    setForm((prev) => ({ ...prev, name }));
  };

  const monthRows = rows.filter((r) => String(r.recv || "").slice(0, 7) === currentMonth);
  const done = monthRows.filter((r) => r.judge !== "검사중");
  const pass = done.filter((r) => r.judge === "합격").length;
  const failed = monthRows.filter((r) => [r.visual, r.label, r.weight, r.coa].includes("불합격"));
  const returned = monthRows.filter((r) => r.judge === "반품");

  const overall = (f) => {
    const vals = [f.visual, f.label, f.weight, f.coa];
    if (vals.includes("불합격")) return "반품";
    return "합격";
  };

  const generatedInNo = nextInspectionNo("IQC", form.recvDate, rows, "inNo");
  const displayedInNo = editingInNo || (form.inNoMode === "auto" ? generatedInNo : form.manualInNo);
  const inNoOk = editingInNo || (form.inNoMode === "auto"
    ? /^IQC-\d{6}-\d{4}$/.test(generatedInNo)
    : form.manualInNo.trim().length >= 2);
  const duplicateInNo = !editingInNo && rows.some((r) => String(r.inNo || "").toUpperCase() === String(displayedInNo || "").trim().toUpperCase());
  const lotOk = form.lot.trim().length >= 2;
  const qtyPattern = /^\d+(\.\d+)?\s?(kg|g|t|EA|L|매|장|캔)$/i;
  const qtyOk = qtyPattern.test(form.qty.trim());
  const inspectQtyOk = qtyPattern.test(form.inspectQty.trim());
  const defectQtyOk = qtyPattern.test(form.defectQty.trim());
  const inspectNum = parseFloat(form.inspectQty);
  const defectNum = parseFloat(form.defectQty);
  const defectRangeOk = Number.isFinite(inspectNum) && Number.isFinite(defectNum) ? defectNum <= inspectNum : false;
  const inspectorOk = form.inspector.trim().length >= 1;
  const iqcErrors = [];
  if (tried && !inNoOk) iqcErrors.push(form.inNoMode === "auto" ? "입고번호를 생성할 수 없습니다 — 입고일자를 확인하세요" : "직접 입력할 입고번호를 2자 이상 입력하세요");
  if (tried && duplicateInNo) iqcErrors.push("이미 등록된 입고번호입니다 — 다른 번호를 입력하세요");
  if (form.lot.trim() !== "" && !lotOk) iqcErrors.push("원재료 LOT No.가 너무 짧습니다 — 2자 이상 입력");
  if (form.qty.trim() !== "" && !qtyOk) iqcErrors.push("입고수량 형식 오류 — 숫자+단위로 입력 (예: 480 kg)");
  if (form.inspectQty.trim() !== "" && !inspectQtyOk) iqcErrors.push("검사수량 형식 오류 — 숫자+단위로 입력 (예: 3 EA)");
  if (form.defectQty.trim() !== "" && !defectQtyOk) iqcErrors.push("불량수량 형식 오류 — 숫자+단위로 입력 (예: 0 EA)");
  if (inspectQtyOk && defectQtyOk && !defectRangeOk) iqcErrors.push("불량수량은 검사수량보다 클 수 없습니다");
  if (tried && form.lot.trim() === "") iqcErrors.push("원재료 LOT No.를 입력하세요");
  if (tried && form.qty.trim() === "") iqcErrors.push("입고수량을 입력하세요 (예: 480 kg)");
  if (tried && form.inspectQty.trim() === "") iqcErrors.push("검사수량을 입력하세요 (예: 3 EA)");
  if (tried && form.defectQty.trim() === "") iqcErrors.push("불량수량을 입력하세요 (예: 0 EA)");
  if (tried && !form.recvDate) iqcErrors.push("입고일자를 선택하세요");
  if (tried && !inspectorOk) iqcErrors.push("검사자를 입력하세요");
  const iqcReady = Boolean(form.recvDate) && inNoOk && !duplicateInNo && lotOk && qtyOk && inspectQtyOk && defectQtyOk && defectRangeOk && inspectorOk;

  const addRow = () => {
    if (!iqcReady) { setTried(true); return; }
    const recv = form.recvDate;
    const inNo = String(displayedInNo).trim();
    const rowData = {
      inNo, recv, lot: form.lot.trim(), code: "-", name: form.name,
      supplier: form.supplier.trim() || "-", qty: form.qty.trim(),
      inspectQty: form.inspectQty.trim(), defectQty: form.defectQty.trim(),
      visual: form.visual, label: form.label, weight: form.weight, coa: form.coa,
      remarks: form.remarks.trim(),
      judge: overall(form),
      note: overall(form) === "반품" ? "즉시 격리 → 사용차단 → 업체 통보" : "",
      inspector: form.inspector.trim(), by: form.inspector.trim()
    };
    const nr = editingInNo ? rows.map((r) => r.inNo === editingInNo ? rowData : r) : [rowData, ...rows];
    setRows(nr);
    DB.iqc = nr;
    if (overall(form) !== "합격") {
      DB.holds = [{ id: `HLD-${String(Date.now()).slice(-6)}`, target: `${form.lot.trim()} (${inNo})`, type: "원재료 Lot", gate: "IQC 게이트", reason: `수입검사 ${overall(form)} — 판정·승인 완료 전 생산 불출 차단`, since: recv, cond: "격리 후 반품 처리 확정", status: "차단중", ncr: "-" }, ...DB.holds];
    }
    auditLog("IQC", editingInNo ? "수정" : "등록", rowData.inNo, `${rowData.lot} / ${rowData.judge}`);
    dbSave();
    setEditingInNo(null);
    setForm(emptyForm());
    setTried(false);
  };

  const editIqc = (r) => {
    setEditingInNo(r.inNo);
    setForm({
      recvDate:(r.recv || today).slice(0,10), inNoMode:"auto", manualInNo:"",
      lot:r.lot, name:r.name, supplier:r.supplier === "-" ? "" : (r.supplier || ""),

      inspector:r.inspector || r.by || "",

    });

  const deleteIqc = (r) => { const reason=askDeleteReason(`수입검사 ${r.inNo}`); if(reason===null)return; const next=rows.filter(x=>x.inNo!==r.inNo); setRows(next); DB.iqc=next; auditLog("IQC","삭제",r.inNo,reason); dbSave(); };

  const judgeSelect = (key, label) => (
    <div className="flex flex-col gap-1">

                className="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-sky-500" />
            </div>
          </div>

          <div className="qmes-iqc-actions">

            <button onClick={addRow} className="qmes-iqc-submit flex items-center justify-center gap-1.5 rounded px-3 text-sm font-medium transition-colors bg-sky-600 hover:bg-sky-500 text-white"><Plus size={15} /> {editingInNo ? "수정 저장" : "등록"}</button>
          </div>
        </div>
        {iqcErrors.length > 0 && <div className="mt-2 bg-red-500/10 border border-red-500/40 rounded px-3 py-2">{iqcErrors.map((e,i)=><div key={i} className="flex items-center gap-2 text-xs text-red-300"><XCircle size={13} className="shrink-0" /> 진입 금지 — {e}</div>)}</div>}

                <col style={{width:"140px"}} /><col style={{width:"110px"}} /><col style={{width:"140px"}} /><col style={{width:"120px"}} /><col style={{width:"130px"}} />

              </tr></thead>
              <tbody>
                {rows.length === 0 && <tr><td colSpan={15} className="py-6 text-center text-sm text-slate-500">수입검사 기록이 없습니다 — 원재료 입고 시 상단에서 등록하세요.</td></tr>}
                {rows.map((r) => (
                  <tr key={r.inNo || r.lot} className="border-b border-slate-800/60 hover:bg-slate-800/30 align-top">
                    <td className="py-2.5 pr-3 font-mono text-xs text-sky-300 whitespace-nowrap">{r.inNo || "-"}</td><td className="py-2.5 pr-3 text-xs font-mono text-slate-400 whitespace-nowrap">{(r.recv || "-").slice(0,10)}</td><td className="py-2.5 pr-3 font-mono text-xs text-violet-300 whitespace-nowrap truncate">{r.lot}</td><td className="py-2.5 pr-3 text-slate-100 truncate">{r.name}</td><td className="py-2.5 pr-3 text-xs text-slate-400 truncate">{r.supplier}</td>
                    <td className="py-2.5 pr-3 text-right tabular-nums text-slate-300 text-xs whitespace-nowrap">{r.qty}</td><td className="py-2.5 pr-3 text-right tabular-nums text-slate-300 text-xs whitespace-nowrap">{r.inspectQty || "-"}</td><td className="py-2.5 pr-3 text-right tabular-nums text-slate-300 text-xs whitespace-nowrap">{r.defectQty || "-"}</td>
                    {[r.visual,r.label,r.weight,r.coa].map((v,i)=><td key={i} className="py-2.5 pr-2 text-center">{v === "합격" ? <CheckCircle2 size={14} className="text-emerald-400 inline" /> : <XCircle size={14} className="text-red-400 inline" />}</td>)}
                    <td className="py-2.5 pr-3 text-xs text-slate-300 truncate">{r.inspector || r.by || "-"}</td>
                    <td className="py-2.5 pr-3"><Badge tone={iqcTone(r.judge)}>{r.judge}</Badge>{r.note && <div className="text-[10px] text-slate-500 mt-1 max-w-[180px] leading-snug">{r.note}</div>}</td>
                    <td className="py-2.5 px-3 text-center whitespace-nowrap"><button onClick={()=>setViewingIqc(r)} className="px-2 py-1 mr-1 rounded border border-emerald-500/40 text-emerald-300 text-xs hover:bg-emerald-500/10">보기</button><button onClick={()=>editIqc(r)} className="px-2 py-1 mr-1 rounded border border-sky-500/40 text-sky-300 text-xs hover:bg-sky-500/10">수정</button><button onClick={()=>deleteIqc(r)} className="px-2 py-1 rounded border border-red-500/40 text-red-300 text-xs hover:bg-red-500/10">삭제</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Panel>

        <Panel title="업체별 IQC 합격률 (최근 6개월)">
          <ResponsiveContainer width="100%" height={230}><BarChart data={SUPPLIER_RATE} layout="vertical"><CartesianGrid stroke="#16283E" strokeDasharray="3 3" horizontal={false} /><XAxis type="number" stroke="#8AA3C0" fontSize={11} domain={[90,100]} /><YAxis type="category" dataKey="name" stroke="#8AA3C0" fontSize={10} width={78} /><Tooltip {...chartTooltip} /><ReferenceLine x={98} stroke="#f59e0b" strokeDasharray="4 4" /><Bar dataKey="rate" name="합격률(%)" fill="#33C1E8" radius={[0,4,4,0]} barSize={14} /></BarChart></ResponsiveContainer>
          <p className="text-[11px] text-slate-500 mt-2">기준선 98% 미만 업체는 CAR 발행 및 수입검사 강화 대상입니다.</p>
        </Panel>
      </div>
      {viewingIqc && <QualityInspectionViewer type="IQC" record={viewingIqc} records={rows} onClose={()=>setViewingIqc(null)} />}
    </div>
  );
}

/* ──────────────────────────── 작업지시서 탭 ──────────────────────────── */

function WoDocTab() {
  const ids = Object.keys(DB.woDocs);
  const [sel, setSel] = useState(ids[0]);
  const [edit, setEdit] = useState(false);
  const [vals, setVals] = useState({});       // 실투입량 입력
  const [lotVals, setLotVals] = useState({}); // 원재료 공급사 Lot 입력
  const [condVals, setCondVals] = useState({});
  const [errs, setErrs] = useState([]);
  const [woPage, setWoPage] = useState(1);
  const woPageSize = 10;
  const woPageCount = Math.max(1, Math.ceil(ids.length / woPageSize));
  const safeWoPage = Math.min(woPage, woPageCount);
  const pagedIds = ids.slice((safeWoPage - 1) * woPageSize, safeWoPage * woPageSize);
  const w = DB.woDocs[sel];

  if (!w) {
    return (
      <Panel title="작업지시서">
        <p className="text-sm text-slate-500">조회할 작업지시서가 없습니다. [작업지시 발행]에서 발행하면 이 화면에서 조회하고 인쇄할 수 있습니다.</p>
      </Panel>
    );
  }

  const num = (v) => { const n = parseFloat(String(v ?? "").replace(/,/g, "")); return isNaN(n) ? null : n; };
  const totalStd = w.inputs.reduce((a, r) => a + (num(r.std) || 0), 0);
  const totalAct = w.inputs.reduce((a, r) => a + (num(r.act) || 0), 0);
  const allDone = w.inputs.every((r) => r.act != null) && w.conds.every((c) => c.act && c.act !== "—");

  const startEdit = () => {
    setVals(Object.fromEntries(w.inputs.map((r, i) => [i, r.act != null ? String(r.act) : ""])));
    setLotVals(Object.fromEntries(w.inputs.map((r, i) => [i, r.lot && r.lot !== "—" ? r.lot : ""])));
    setCondVals(Object.fromEntries(w.conds.map((c, j) => [j, c.act && c.act !== "—" ? c.act : ""])));
    setErrs([]);
    setEdit(true);
  };

  const saveActs = () => {
    const e2 = [];
    const user = window.__QMES_USER__ || "-";
    const newInputs = w.inputs.map((r, i) => {
      const v = String(vals[i] ?? "").trim();
      const lotv = String(lotVals[i] ?? "").trim();
      if (v === "") return { ...r, lot: lotv || r.lot || "" };
      if (!/^\d+(\.\d+)?$/.test(v)) { e2.push(`${r.name}: 실투입량 숫자 형식 오류 — 저장 진입 금지`); return r; }
      const act = parseFloat(v);
      const std = num(r.std) || 0;
      const tol = Math.max(0.1, std * 0.01); // 계량 공차: ±0.1kg 또는 기준량의 1% 중 큰 값
      return { ...r, lot: lotv, act, ok: Math.abs(act - std) <= tol, by: user };
    });
    if (e2.length) { setErrs(e2); return; }
    const newConds = w.conds.map((c, j) => {
      const v = String(condVals[j] ?? "").trim();
      return v === "" ? c : { ...c, act: v, ok: true, by: user };
    });
    const done = newInputs.every((r) => r.act != null) && newConds.every((c) => c.act && c.act !== "—");
    const overTol = newInputs.some((r) => r.ok === false);
    DB.woDocs[sel] = { ...w, inputs: newInputs, conds: newConds, status: done ? "완료" : "실적 기록중" };

    const b = DB.batches.find((x) => x.no === sel);
    if (b) { if (done) { b.status = "완료"; b.done = b.plan; } else if (b.status === "발행") b.status = "진행중"; }

    const now = new Date();
    const time = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    const L = DB.lots[sel];
    if (L) {
      if (done && !L.steps.some((st) => st.name === "생산 실적 기록 완료")) {
        L.steps = [...L.steps, { stage: "생산", name: "생산 실적 기록 완료", time, detail: `실투입 합계 ${newInputs.reduce((a, r) => a + (num(r.act) || 0), 0).toFixed(2)}kg / 기준 ${totalStd.toFixed(2)}kg · 공정조건 전 항목 기록${overTol ? " · 계량 공차 이탈 항목 있음" : ""}`, result: overTol ? "완료 (공차 이탈 확인 필요)" : "완료", by: user }];
        L.stage = "생산";
        if (!L.status.includes("홀드")) L.status = "생산완료 — 검사 대기";
      } else if (!done) {
        L.stage = "생산";
        if (!L.status.includes("홀드")) L.status = "생산중 (실적 기록)";
      }
    }
    dbSave();
    setErrs([]);
    setEdit(false);
  };

const MATERIAL_OPTIONS = ["NMP", "BYK180 (분산제)", "AOH30 (Boehmite)", "SBS", "PVdF", "SBR"];

function getAutoWoStatus(lotNo) {
  const doc = DB.woDocs[lotNo] || {};
  if (doc.manualStatus) return doc.manualStatus;

  const inputs = doc.inputs || [];
  const pqc = (DB.insp?.PQC || []).filter((r) => r.lot === lotNo);
  const oqc = (DB.insp?.OQC || []).filter((r) => r.lot === lotNo);

  const isPass = (v) => ["OK", "합격", "적합", "PASS"].includes(String(v || "").toUpperCase());
  if (oqc.some((r) => isPass(r.judge))) return "완료";
  if (pqc.length > 0 || oqc.length > 0) return "검사중";
  if (inputs.some((it) => Number(it.act) > 0)) return "생산중";
  return "발행";
}

function saveWoManualStatus(lotNo, status) {
  const current = DB.woDocs[lotNo] || {};
  const prev = current.manualStatus || getAutoWoStatus(lotNo);

  DB.woDocs[lotNo] = {
    ...current,
    manualStatus: status,
    status: status,
    statusHistory: [
      ...(current.statusHistory || []),
      {
        from: prev,
        to: status,
        changedAt: new Date().toISOString(),
      },
    ],
  };

  dbSave();
}

function woStatusTone(status) {
  if (status === "완료") return "ok";
  if (status === "검사중") return "violet";
  if (status === "생산중") return "info";
  return "warn";
}

  const products = Object.keys(BOM);
  const [form, setForm] = useState({
    product: products[0], tank: BOM[products[0]].tanks[0], qty: "230",
    prodDate: "2026-07-12", lotNo: "", site: "C", hours: "7h", timeRange: "08:30~16:30",
    shiftType: "일반", worker: "관리자",
  });
  const [issued, setIssued] = useState(DB.batches);
  const [editingWo, setEditingWo] = useState(null);
  const [viewingWo, setViewingWo] = useState(null);
  const [issueSearch, setIssueSearch] = useState({ lot: "", item: "", date: "" });
  const [statusVersion, setStatusVersion] = useState(0);
  const [issuePage, setIssuePage] = useState(1);
  const issuePageSize = 10;
  const [planItems, setPlanItems] = useState(BOM[products[0]].items.map((it) => ({ ...it, materialLot: "", actual: "" })));

  const bom = BOM[form.product];
  const qtyNum = parseFloat(form.qty) || 0;
  const ratio = qtyNum > 0 ? qtyNum / bom.baseQty : 0;

  /* 생산일자·생산구분 기반 자동 채번 — [사이트][년][월][일][당일 순번] */
  const dateOk = /^\d{4}-\d{2}-\d{2}$/.test(form.prodDate);
  const nextNo = (() => {
    if (!dateOk) return "—";
    const [yy, mm, dd] = form.prodDate.split("-");

  })();

  const woErrors = [];
  if (!(qtyNum > 0)) woErrors.push("생산계획량 미입력 또는 0 이하");
