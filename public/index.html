<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>나모케미칼 시스템</title>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f6fa;
    }

    header{
      background:#1f6fd1;
      color:white;
      padding:15px;
      font-size:20px;
      font-weight:bold;
    }

    .container{
      padding:20px;
    }

    input, button{
      padding:8px;
      margin:5px 0;
      width:100%;
    }

    button{
      background:#1f6fd1;
      color:white;
      border:none;
      cursor:pointer;
    }

    button:hover{
      background:#1455a3;
    }

    .card{
      background:white;
      padding:15px;
      margin-bottom:15px;
      border-radius:8px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .hidden{
      display:none;
    }
  </style>
</head>
<body>

<header>나모케미칼 통합 시스템</header>

<div class="container">

  <!-- 로그인 -->
  <div id="loginBox" class="card">
    <h3>로그인</h3>
    <input id="loginEmail" placeholder="이메일"/>
    <input id="loginPw" type="password" placeholder="비밀번호"/>
    <button onclick="login()">로그인</button>
  </div>

  <!-- 회원가입 -->
  <div class="card">
    <h3>회원가입</h3>
    <input id="signupName" placeholder="이름"/>
    <input id="signupEmail" placeholder="이메일"/>
    <input id="signupPw" type="password" placeholder="비밀번호"/>
    <input id="signupDept" placeholder="부서"/>
    <button onclick="signup()">회원가입</button>
  </div>

  <!-- 메인 -->
  <div id="mainBox" class="hidden">
    <div class="card">
      <h3>사용자 정보</h3>
      <div id="userInfo"></div>
      <button onclick="logout()">로그아웃</button>
    </div>

    <div class="card">
      <h3>공지사항</h3>
      <ul id="noticeList"></ul>
    </div>
        <div class="card">
      <h3>공급업체 등록</h3>
      <input id="supName" placeholder="업체명"/>
      <input id="supManager" placeholder="담당자"/>
      <button onclick="addSupplier()">등록</button>
    </div>

    <div class="card">
      <h3>공급업체 목록</h3>
      <ul id="supplierList"></ul>
    </div>
  </div>
</div>

<script>
const API = "";

async function login(){
  const res = await fetch(API + "/api/auth/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      email:loginEmail.value,
      password:loginPw.value
    })
  });

  const data = await res.json();
  alert(data.message || data.error);

  if(res.ok){
    loadUser();
  }
}

async function signup(){
  const res = await fetch(API + "/api/auth/signup",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      name:signupName.value,
      email:signupEmail.value,
      password:signupPw.value,
      department:signupDept.value
    })
  });

  const data = await res.json();
  alert(data.message || data.error);
}

async function logout(){
  await fetch(API + "/api/auth/logout",{method:"POST"});
  location.reload();
}

async function loadUser(){
  const res = await fetch(API + "/api/auth/me");
  const data = await res.json();

  if(data.authenticated){
    loginBox.classList.add("hidden");
    mainBox.classList.remove("hidden");

    userInfo.innerText = data.user.name + " (" + data.user.email + ")";
    loadNotices();
    loadSuppliers();
  }
}
async function loadNotices(){
  const res = await fetch(API + "/api/notices");
  const data = await res.json();

  noticeList.innerHTML = "";

  data.forEach(n=>{
    const li = document.createElement("li");
    li.innerText = n.noticeDate + " - " + n.content;
    noticeList.appendChild(li);
  });
}

async function addSupplier(){
  const res = await fetch(API + "/api/suppliers",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      name:supName.value,
      manager:supManager.value
    })
  });

  const data = await res.json();
  alert(data.message || data.error);
  loadSuppliers();
}

async function loadSuppliers(){
  const res = await fetch(API + "/api/suppliers");
  const data = await res.json();

  supplierList.innerHTML = "";

  data.forEach(s=>{
    const li = document.createElement("li");
    li.innerText = s.name + " / " + s.manager;
    supplierList.appendChild(li);
  });
}

// 최초 실행
loadUser();
</script>

</body>
</html>
