<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>수입검사 성적서</title>
<style>
body{font-family:"Malgun Gothic",Arial;margin:40px;color:#000}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:28px;margin:0 0 6px}
.header span{font-size:14px}
.info{margin-bottom:18px}
.info div{margin-bottom:6px}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{border:1px solid #000;padding:8px;text-align:center}
th{background:#f2f2f2}
.footer{margin-top:40px;display:flex;justify-content:space-between}
.sign{text-align:center;width:30%}
.print-btn{position:fixed;top:20px;right:20px}
@media print {.print-btn{display:none}}
</style>
</head>
<body>
<button class="print-btn" onclick="window.print()">🖨 출력</button>

<div class="header">
  <h1>수입검사 성적서</h1>
  <span>나모케미칼(주)</span>
</div>

<div class="info">
  <div>검사일자: <span id="date"></span></div>
  <div>LOT: <span id="lot"></span></div>
  <div>협력업체: <span id="supplier"></span></div>
  <div>품목: <span id="item"></span></div>
  <div>검사자: <span id="inspector"></span></div>
</div>

<table>
  <thead>
    <tr>
      <th>No</th>
      <th>검사항목</th>
      <th>검사 기준</th>
      <th>확인 결과</th>
      <th>판정</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>1</td>
      <td>외관</td>
      <td>이물질, 파손 없을 것</td>
      <td id="visualResult">이상 없음</td>
      <td id="visualJudge">합격</td>
    </tr>
    <tr>
      <td>2</td>
      <td>CoA</td>
      <td>누락 없을 것</td>
      <td id="coaResult">첨부 확인</td>
      <td id="coaJudge">합격</td>
    </tr>
  </tbody>
</table>

<table style="margin-top:18px">
  <tr>
    <th>입고수량</th>
    <td id="qty"></td>
    <th>불량수량</th>
    <td id="fail"></td>
  </tr>
  <tr>
    <th>최종판정</th>
    <td colspan="3" id="finalJudge"></td>
  </tr>
</table>

<div class="footer">
  <div class="sign">작성자<br><br><br>_________________</div>
  <div class="sign">검토자<br><br><br>_________________</div>
  <div class="sign">승인자<br><br><br>_________________</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');

async function load() {
  const res = await fetch('/api/iqc', { credentials: 'include' });
  const rows = await res.json();
  const row = rows.find(r => String(r.id) === String(id)) || rows[0];

  if (!row) {
    alert('데이터 없음');
    return;
  }

  document.getElementById('date').innerText = row.date || '';
  document.getElementById('lot').innerText = row.lot || '';
  document.getElementById('supplier').innerText = row.supplier || '';
  document.getElementById('item').innerText = row.item || '';
  document.getElementById('inspector').innerText = row.inspector || '';
  document.getElementById('qty').innerText = row.qty || 0;
  document.getElementById('fail').innerText = row.fail || 0;
  document.getElementById('finalJudge').innerText = Number(row.fail || 0) > 0 ? '불합격' : '합격';
}
load();
</script>
</body>
</html>
