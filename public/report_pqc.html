<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>공정검사 성적서</title>
<style>
body{font-family:"Malgun Gothic",Arial;margin:40px;color:#000}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:28px;margin:0 0 6px}
.header span{font-size:14px}
.info{margin-bottom:18px}
.info div{margin-bottom:6px}
table{width:100%;border-collapse:collapse;margin-top:16px}
th,td{border:1px solid #000;padding:8px;text-align:center}
th{background:#f2f2f2}
.footer{margin-top:40px;display:flex;justify-content:space-between}
.sign{text-align:center;width:30%}
.print-btn{position:fixed;top:20px;right:20px}
@media print {.print-btn{display:none}}
</style>
</head>
<body>
<button class="print-btn" onclick="window.print()">🖨 출력</button>

<div class="header">
  <h1>공정검사 성적서</h1>
  <span>나모케미칼(주)</span>
</div>

<div class="info">
  <div>검사일자: <span id="date"></span></div>
  <div>제품명: <span id="product"></span></div>
  <div>LOT: <span id="lot"></span></div>
  <div>검사자: <span id="judgeUser"></span></div>
</div>

<table>
  <thead>
    <tr>
      <th>No</th>
      <th>검사항목</th>
      <th>검사 기준</th>
      <th>측정값</th>
      <th>판정</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>1</td><td>외관</td><td>이상 없을 것</td><td id="visual"></td><td id="judge1"></td></tr>
    <tr><td>2</td><td>점도</td><td>첨부파일 기준치와 동일</td><td id="viscosity"></td><td id="judge2"></td></tr>
    <tr><td>3</td><td>고형분</td><td>첨부파일 기준치와 동일</td><td id="solid"></td><td id="judge3"></td></tr>
    <tr><td>4</td><td>입자</td><td>첨부파일 기준치와 동일</td><td id="particle"></td><td id="judge4"></td></tr>
  </tbody>
</table>

<table style="margin-top:18px">
  <tr>
    <th>수량</th>
    <td id="qty"></td>
    <th>불량수량</th>
    <td id="fail"></td>
  </tr>
  <tr>
    <th>최종판정</th>
    <td colspan="3" id="finalJudge"></td>
  </tr>
</table>

<div class="footer">
  <div class="sign">작성자<br><br><br>_________________</div>
  <div class="sign">검토자<br><br><br>_________________</div>
  <div class="sign">승인자<br><br><br>_________________</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const id = params.get('id');

async function load() {
  const res = await fetch('/api/pqc', { credentials: 'include' });
  const rows = await res.json();
  const row = rows.find(r => String(r.id) === String(id)) || rows[0];

  if (!row) {
    alert('데이터 없음');
    return;
  }

  document.getElementById('date').innerText = row.date || '';
  document.getElementById('product').innerText = row.product || '';
  document.getElementById('lot').innerText = row.lot || '';
  document.getElementById('judgeUser').innerText = row.inspector || row.judgeUser || '';
  document.getElementById('visual').innerText = row.visual || '이상 없음';
  document.getElementById('viscosity').innerText = row.viscosity || '';
  document.getElementById('solid').innerText = row.solid || '';
  document.getElementById('particle').innerText = row.particle || '';
  document.getElementById('qty').innerText = row.qty || 0;
  document.getElementById('fail').innerText = row.fail || 0;

  const finalJudge = row.judge || (Number(row.fail || 0) > 0 ? '불합격' : '합격');
  document.getElementById('finalJudge').innerText = finalJudge;
  document.getElementById('judge1').innerText = finalJudge;
  document.getElementById('judge2').innerText = finalJudge;
  document.getElementById('judge3').innerText = finalJudge;
  document.getElementById('judge4').innerText = finalJudge;
}
load();
</script>
</body>
</html>
