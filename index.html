<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나모케미칼 품질현황 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <style>
    /* 원본 스타일은 그대로 유지 */
  </style>
</head>
<body>
  <!-- 기존 body 마크업은 그대로 유지하세요. 아래 script만 교체하면 됩니다. -->

  <script>
    const API_PATHS = {
      suppliers: '/api/suppliers',
      iqc: '/api/iqc',
      ipqc: '/api/ipqc',
      oqc: '/api/oqc',
      worklog: '/api/worklog',
      nonconform: '/api/nonconform',
      changeLogs: '/api/change-logs',
      users: '/api/admin/users'
    };

    const MAX_UPLOAD_ROWS = 2000;
    const UI_PAGE_SIZE = 200;
    const state = {
      user: { id:'', name:'', role:'guest', authenticated:false },
      db: { suppliers:[], iqc:[], ipqc:[], oqc:[], worklog:[], traceability:[], changeLogs:[], nonconform:[] },
      admin: { pendingUsers: [], users: [] },
      iqcMonthlyChart: null,
      ipqcMonthlyChart: null,
      oqcMonthlyChart: null,
      iqcDonutChart: null,
      ipqcDonutChart: null,
      oqcDonutChart: null,
      registerEditIndex: null,
      supplierEditIndex: null,
      worklogEditIndex: null,
      nonconformEditIndex: null,
      lastBarcodeReady: false,
      authMode: 'login'
    };

    const $ = id => document.getElementById(id);
    const pad = n => String(n).padStart(2,'0');
    const fmt = n => Number(n || 0).toLocaleString();
    const toText = v => v == null ? '' : String(v).trim();
    const toNumber = v => {
      if (v == null || v === '') return 0;
      const n = Number(String(v).replace(/,/g,'').trim());
      return Number.isFinite(n) ? n : 0;
    };
    const todayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    };
    const escapeHtml = str => String(str ?? '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\"/g,'&quot;')
      .replace(/'/g,'&#39;');
    const normalizeKeyword = v => toText(v).replace(/\s+/g,'').toUpperCase();

    function getApiPath(type){
      return API_PATHS[type] || `/api/${type}`;
    }

    function setSaveStatus(message, tone='ok') {
      const el = $('saveStatus');
      if (!el) return;
      el.textContent = message;
      el.className = tone === 'fail' ? 'save-status-fail' : 'save-status-ok';
    }

    async function apiRequest(url, options = {}) {
      const config = {
        method:'GET',
        credentials:'include',
        headers:{ ...(options.headers || {}) },
        ...options
      };

      if (config.body && !(config.body instanceof FormData) && !config.headers['Content-Type']) {
        config.headers['Content-Type'] = 'application/json';
      }

      let res;
      try {
        res = await fetch(url, config);
      } catch (_) {
        throw new Error(`네트워크 오류: ${url}`);
      }

      const contentType = res.headers.get('content-type') || '';
      let data = null;

      if (contentType.includes('application/json')) {
        data = await res.json().catch(() => null);
      } else {
        data = await res.text().catch(() => null);
      }

      if (!res.ok) {
        const msg = data?.error || data?.message || (typeof data === 'string' ? data : '') || `요청 실패 (${res.status})`;
        throw new Error(msg);
      }

      return data;
    }

    const api = {
      get: url => apiRequest(url),
      post: (url, body) => apiRequest(url, { method:'POST', body: body instanceof FormData ? body : JSON.stringify(body) }),
      put: (url, body) => apiRequest(url, { method:'PUT', body: JSON.stringify(body) }),
      delete: url => apiRequest(url, { method:'DELETE' })
    };

    async function loadFromServer(){
      const requests = [
        api.get(API_PATHS.suppliers),
        api.get(API_PATHS.iqc),
        api.get(API_PATHS.ipqc),
        api.get(API_PATHS.oqc),
        api.get(API_PATHS.worklog),
        api.get(API_PATHS.changeLogs),
        api.get(API_PATHS.nonconform)
      ];

      const results = await Promise.allSettled(requests);

      const pick = index => {
        const r = results[index];
        return r.status === 'fulfilled' && Array.isArray(r.value) ? r.value : [];
      };

      state.db.suppliers = pick(0);
      state.db.iqc = pick(1);
      state.db.ipqc = pick(2);
      state.db.oqc = pick(3);
      state.db.worklog = pick(4);
      state.db.changeLogs = pick(5);
      state.db.nonconform = pick(6);

      const failed = results.filter(r => r.status === 'rejected');
      refreshDashboard();

      if (String(state.user.role).toLowerCase() === 'admin') {
        await loadAllUsers();
      }

      if (failed.length) {
        console.warn('일부 API 로딩 실패', failed);
        setSaveStatus(`일부 데이터 동기화 완료: ${new Date().toLocaleString('ko-KR')}`, 'fail');
        showToast('일부 데이터만 불러왔습니다. /api/ipqc 라우트를 확인하세요.');
      } else {
        setSaveStatus(`서버 동기화 완료: ${new Date().toLocaleString('ko-KR')}`, 'ok');
        showToast('서버 데이터 동기화 완료');
      }
    }

    async function loadAllUsers() {
      try {
        const me = await api.get('/api/auth/me');
        const role = String(me?.role || '').toLowerCase();

        if (role !== 'admin') {
          showToast('관리자만 접근 가능합니다.');
          return;
        }

        state.user = {
          id: me?.id || '',
          name: me?.name || '사용자',
          role,
          authenticated: true
        };

        const rows = await api.get(API_PATHS.users);
        state.admin.users = Array.isArray(rows) ? rows : [];
        renderPendingUsers();
      } catch (err) {
        console.error(err);
        showToast(`전체 회원 조회 실패: ${err.message}`);
      }
    }

    async function saveRegisterData(){
      const type = $('registerType').value;
      try {
        const payload = buildRegisterPayload(type);
        if (!payload.date) throw new Error('검사일자를 입력하세요.');
        if (!payload.lot) throw new Error('LOT No를 입력하세요.');

        const basePath = getApiPath(type);
        if (state.registerEditIndex !== null) {
          const row = state.db[type][state.registerEditIndex];
          await api.put(`${basePath}/${row.id}`, payload);
        } else {
          await api.post(basePath, payload);
        }

        closeRegisterModal();
        await loadFromServer();
        showToast('검사 데이터 저장 완료');
      } catch (err) {
        console.error(err);
        showToast(`저장 실패: ${err.message}`);
      }
    }

    async function deleteInspection(type, index){
      const row = state.db[type]?.[index];
      if (!row) return;
      if (!confirm('이 데이터를 삭제할까요?')) return;

      try {
        await api.delete(`${getApiPath(type)}/${row.id}`);
        await loadFromServer();
        showToast('데이터 삭제 완료');
      } catch (err) {
        console.error(err);
        showToast(`삭제 실패: ${err.message}`);
      }
    }

    async function findUserId() {
      try {
        const name = prompt('이름 입력');
        if (!name) return;

        const department = prompt('부서 입력');
        if (!department) return;

        const data = await api.post('/api/auth/find-id', { name, department });
        if (data?.ok) {
          alert('ID(이메일): ' + data.email);
        } else {
          alert(data?.error || '찾기 실패');
        }
      } catch (err) {
        alert(err.message || '찾기 실패');
      }
    }

    async function changePassword() {
      try {
        const email = prompt('아이디(이메일)');
        if (!email) return;

        const currentPassword = prompt('현재 비밀번호');
        if (!currentPassword) return;

        const newPassword = prompt('새 비밀번호');
        if (!newPassword) return;

        const data = await api.post('/api/auth/change-password', { email, currentPassword, newPassword });
        if (data?.ok) {
          alert('비밀번호 변경 완료');
        } else {
          alert(data?.error || '실패');
        }
      } catch (err) {
        alert(err.message || '비밀번호 변경 실패');
      }
    }

    function showToast(msg){
      const el = $('toast');
      if (!el) return;
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(showToast.t);
      showToast.t = setTimeout(() => el.classList.remove('show'), 2200);
    }

    function refreshDashboard(){
      if (typeof refreshWeek === 'function') refreshWeek();
      if (typeof renderOverviewBoard === 'function') renderOverviewBoard();
      if (typeof renderUpgradeHistory === 'function') renderUpgradeHistory();
      if (typeof renderTables === 'function') renderTables();
      if (typeof renderNonconformTable === 'function') renderNonconformTable();
    }

    console.log('교체 포인트 적용 완료: /api/ipqc 404 대응, Promise.allSettled 적용, 중복 login 제거');
  </script>
</body>
</html>
